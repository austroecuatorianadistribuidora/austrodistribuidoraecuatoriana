<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Austro Logística v27.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FIREBASE COMPAT SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --brand: #ea580c; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #0f172a; margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        .card-pro { background: white; border-radius: 32px; padding: 25px; box-shadow: 0 4px 25px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05); }
        .btn-brand { background: var(--brand); color: white; border-radius: 22px; padding: 20px; font-weight: 800; width: 100%; border: none; cursor: pointer; text-transform: uppercase; font-size: 14px; letter-spacing: 1.5px; box-shadow: 0 12px 30px rgba(234, 88, 12, 0.25); }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(255,255,255,0.92); backdrop-filter: blur(25px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000; padding-bottom: 10px; }
        .tab { display: none; padding: 20px; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab.active { display: block; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        input { background: #f1f5f9; border-radius: 16px; padding: 18px; width: 100%; border: 2px solid transparent; font-size: 16px !important; outline: none; margin-bottom: 12px; }
        input:focus { border-color: var(--brand); background: white; }
        
        .status-pill { background: white; padding: 8px 16px; border-radius: 50px; font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 8px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .dot { width: 10px; height: 10px; border-radius: 50%; transition: all 0.5s; }
    </style>
</head>
<body>

    <!-- CABECERA -->
    <header class="p-6 pt-12 flex justify-between items-start">
        <div>
            <div class="status-pill mb-3">
                <div id="led" class="dot bg-zinc-300"></div>
                <span id="led-text" class="text-zinc-400 uppercase tracking-widest leading-none">CONECTANDO...</span>
            </div>
            <h1 class="text-4xl font-black tracking-tighter text-slate-900 leading-none">Austro Logística</h1>
        </div>
        <button onclick="location.reload(true)" class="p-3 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-90 transition-transform">
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
    </header>

    <main>
        <!-- PANEL -->
        <div id="tab-dash" class="tab active">
            <div class="card-pro bg-slate-900 text-white border-none mb-6 relative overflow-hidden shadow-2xl">
                <p class="text-[11px] font-black uppercase opacity-40 tracking-widest mb-1">Cuentas por Cobrar Austro</p>
                <h2 id="cloud-money" class="text-5xl font-black tracking-tighter leading-none">$0.00</h2>
                <div class="absolute -bottom-10 -right-10 w-48 h-48 bg-orange-500/10 rounded-full blur-3xl"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="card-pro text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Facturas</p>
                    <p id="cloud-count" class="text-4xl font-black text-slate-800">0</p>
                </div>
                <div class="card-pro text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Ganancia</p>
                    <p id="cloud-util" class="text-3xl font-black text-green-600">$0.00</p>
                </div>
            </div>

            <div class="mt-8 p-6 bg-green-50 border border-green-100 rounded-[32px] flex items-center gap-4">
                <div class="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
                <p class="text-[11px] text-green-700 font-bold uppercase leading-tight">Canal de Datos v27 Sincronizado</p>
            </div>
        </div>

        <!-- LISTADO -->
        <div id="tab-list" class="tab">
            <button onclick="openModal()" class="btn-brand mb-10">+ Registrar Nueva Factura</button>
            <div id="list-container" class="space-y-4 pb-12">
                <p class="text-center py-24 text-slate-300 font-bold uppercase text-[10px] tracking-widest leading-relaxed">Sincronizando con el servidor corporativo...</p>
            </div>
        </div>
    </main>

    <!-- NAVEGACIÓN -->
    <nav class="nav-bar">
        <button onclick="switchTab('dash')" id="nav-dash" class="text-orange-600 flex flex-col items-center gap-1.5 font-black text-[11px] uppercase">Panel</button>
        <button onclick="switchTab('list')" id="nav-list" class="text-slate-300 flex flex-col items-center gap-1.5 font-black text-[11px] uppercase">Facturas</button>
    </nav>

    <!-- MODAL -->
    <div id="modal-form" class="modal">
        <div class="bg-white rounded-[44px] p-8 max-w-md mx-auto mt-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="font-black text-xl tracking-tighter uppercase leading-none">Nuevo Registro</h3>
                    <p class="text-[9px] font-bold text-orange-500 mt-2 uppercase tracking-widest">Factura Espejo</p>
                </div>
                <button onclick="closeModal()" class="text-slate-300 text-4xl font-light">✕</button>
            </div>
            
            <input id="f-num" type="text" placeholder="N° de Factura">
            
            <div class="space-y-4 mb-8">
                <div class="flex justify-between items-center text-[11px] font-bold uppercase text-slate-500"><span>Vaso 165g</span> <input type="number" id="q0" oninput="calc()" placeholder="0" class="w-24 mb-0 !py-2 text-center font-black"></div>
                <div class="flex justify-between items-center text-[11px] font-bold uppercase text-slate-500"><span>Vaso 340g</span> <input type="number" id="q1" oninput="calc()" placeholder="0" class="w-24 mb-0 !py-2 text-center font-black"></div>
                <div class="flex justify-between items-center text-[11px] font-bold uppercase text-slate-500"><span>Emp. 1/2L</span> <input type="number" id="q2" oninput="calc()" placeholder="0" class="w-24 mb-0 !py-2 text-center font-black"></div>
                <div class="flex justify-between items-center text-[11px] font-bold uppercase text-slate-500"><span>Emp. 1L</span> <input type="number" id="q3" oninput="calc()" placeholder="0" class="w-24 mb-0 !py-2 text-center font-black"></div>
            </div>

            <div class="card-pro bg-orange-50 border-orange-100 flex justify-between items-center p-8 mb-8">
                <div>
                    <p class="text-[10px] font-black text-orange-400 uppercase leading-none mb-1 tracking-widest">Total + IVA</p>
                    <p id="total-lbl" class="text-4xl font-black text-orange-700 leading-none tracking-tighter">$0.00</p>
                </div>
            </div>

            <button id="save-btn" class="btn-brand">Sincronizar Datos</button>
            <div class="h-10"></div>
        </div>
    </div>

    <script>
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBu0b-086orBd_fQut3i9n5s0W9fLpkRFI",
            authDomain: "austrodistribuidoraecuatoriana.firebaseapp.com",
            projectId: "austrodistribuidoraecuatoriana",
            storageBucket: "austrodistribuidoraecuatoriana.firebasestorage.app",
            messagingSenderId: "711061794814",
            appId: "1:711061794814:web:65b028a387ecf277ca5aaf"
        };

        const PRODUCT_DATA = [
            { c: 0.2696, r: 0.0782 },
            { c: 0.6087, r: 0.0870 },
            { c: 0.7770, r: 0.1100 },
            { c: 1.5974, r: 0.2287 }
        ];

        let db, auth, facturas = [];

        async function init() {
            try {
                if (firebase.apps.length) return;
                firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.firestore();
                auth = firebase.auth();

                auth.signInAnonymously().then(() => {
                    document.getElementById('led').className = "dot bg-green-500 shadow-[0_0_12px_#22c55e]";
                    document.getElementById('led-text').innerText = "CONEXIÓN CORPORATIVA OK";
                    document.getElementById('led-text').className = "text-green-600 font-black text-[9px] uppercase tracking-widest";
                    startSync();
                }).catch(e => {
                    document.getElementById('led-text').innerText = "ERROR DE LLAVE GOOGLE";
                    document.getElementById('led').className = "dot bg-red-600";
                });
            } catch (e) { console.error(e); }
        }

        function startSync() {
            // Canal Final v27
            db.collection('artifacts/austro-v27/public/data/facturas').onSnapshot(snap => {
                facturas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        }

        function render() {
            const t = facturas.reduce((acc, f) => acc + (f.total || 0), 0);
            const u = facturas.reduce((acc, f) => acc + (f.util || 0), 0);
            document.getElementById('cloud-money').innerText = `$${t.toFixed(2)}`;
            document.getElementById('cloud-count').innerText = facturas.length;
            document.getElementById('cloud-util').innerText = `$${u.toFixed(2)}`;
            
            const container = document.getElementById('list-container');
            const sorted = [...facturas].sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

            container.innerHTML = sorted.map(f => `
                <div class="card-pro flex justify-between items-center border border-slate-100">
                    <div>
                        <h4 class="font-black text-slate-800 text-sm uppercase leading-none mb-1">FACTURA #${f.num}</h4>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Estado: Sincronizado</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black text-orange-600 tracking-tighter">$${(f.total || 0).toFixed(2)}</span>
                        <p class="text-[9px] font-black text-blue-500 mt-1 uppercase">UTL: $${(f.util || 0).toFixed(2)}</p>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-20 text-slate-200 font-bold uppercase text-[10px]">Sin movimientos registrados</div>';
        }

        window.calc = () => {
            let sub = 0; let ut = 0;
            for(let i=0; i<4; i++) {
                let v = parseFloat(document.getElementById('q'+i).value) || 0;
                sub += v * PRODUCT_DATA[i].c; ut += v * PRODUCT_DATA[i].r;
            }
            const total = sub * 1.15;
            document.getElementById('total-lbl').innerText = `$${total.toFixed(2)}`;
            return { total, ut };
        };

        document.getElementById('save-btn').onclick = async () => {
            const n = document.getElementById('f-num').value;
            if(!n) return alert("Ingresa el N° de factura");
            
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "SINCRONIZANDO...";
            
            const results = calc();
            try {
                await db.collection('artifacts/austro-v27/public/data/facturas').add({
                    num: n, total: results.total, util: results.ut,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeModal();
            } catch (e) { alert("Publica las Reglas en Firestore para guardar."); }
            btn.disabled = false; btn.innerText = "Sincronizar Datos";
        };

        window.switchTab = (t) => {
            document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('nav-dash').className = t === 'dash' ? 'text-orange-600 flex flex-col items-center gap-1.5 font-black text-[11px] uppercase' : 'text-slate-300 flex flex-col items-center gap-1.5 font-black text-[11px] uppercase';
            document.getElementById('nav-list').className = t === 'list' ? 'text-orange-600 flex flex-col items-center gap-1.5 font-black text-[11px] uppercase' : 'text-slate-300 flex flex-col items-center gap-1.5 font-black text-[11px] uppercase';
        };

        window.openModal = () => {
            document.getElementById('modal-form').style.display='block';
            document.getElementById('f-num').value = '';
            for(let i=0; i<4; i++) document.getElementById('q'+i).value = '';
            calc();
        };
        window.closeModal = () => document.getElementById('modal-form').style.display='none';

        window.onload = init;
    </script>
</body>
</html>
