<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logística Polaca Pro v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LIBRERÍAS FIREBASE COMPAT (Estabilidad total) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --oneui-orange: #ea580c; --oneui-bg: #f4f4f4; --oneui-card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--oneui-bg); color: #1a1a1a; margin: 0; touch-action: manipulation; overflow-x: hidden; min-height: 100vh; }
        .card-samsung { background: var(--oneui-card); border-radius: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); padding: 24px; }
        .btn-orange { background-color: var(--oneui-orange); color: white; border-radius: 24px; font-weight: 900; height: 64px; width: 100%; box-shadow: 0 10px 25px rgba(234, 88, 12, 0.2); border: none; cursor: pointer; transition: all 0.2s; }
        .btn-orange:active { transform: scale(0.95); opacity: 0.9; }
        .nav-bottom { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); position: fixed; bottom: 0; left: 0; right: 0; height: 85px; display: flex; justify-content: space-around; align-items: center; z-index: 100; padding-bottom: 10px; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        input { background: #f1f5f9; border-radius: 16px; padding: 16px; width: 100%; border: 2px solid transparent; margin-bottom: 12px; font-size: 16px !important; }
        input:focus { border-color: var(--oneui-orange); background: white; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 20px; overflow-y: auto; backdrop-filter: blur(10px); }
        .mirror-table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .mirror-table td { padding: 12px 4px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body class="pb-28">

    <!-- CABECERA INTELIGENTE -->
    <header class="p-6 pt-12 sticky top-0 bg-[#f4f4f4]/95 backdrop-blur-md z-40">
        <div class="flex justify-between items-start">
            <div>
                <div id="conn-badge" class="bg-gray-200 px-4 py-1.5 rounded-full text-[10px] font-black text-gray-500 flex items-center mb-2 shadow-sm">
                    <span id="conn-dot" class="status-dot bg-gray-400 animate-pulse"></span>
                    <span id="conn-text">CONECTANDO v11.0...</span>
                </div>
                <h1 id="view-title" class="text-4xl font-black tracking-tighter text-slate-900">Panel</h1>
            </div>
            <button onclick="forzarReparacion()" class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50">
                <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
        </div>
    </header>

    <main>
        <!-- PESTAÑA INICIO -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="card-samsung bg-orange-600 text-white mb-6 shadow-2xl shadow-orange-200 relative overflow-hidden">
                <p class="text-[11px] font-bold uppercase opacity-60 tracking-widest leading-none">Saldo Pendiente Austro</p>
                <h2 id="dash-total" class="text-5xl font-black mt-3 tracking-tighter">$0.00</h2>
                <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
            </div>
            
            <!-- TARJETA DE ERROR CRÍTICO -->
            <div id="error-card" class="hidden card-samsung bg-red-50 border-2 border-red-200 mb-8 p-6">
                <div class="flex items-center gap-3 mb-3 text-red-600">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/></svg>
                    <p class="font-black text-sm uppercase">Fallo de Llave Google</p>
                </div>
                <p id="error-msg" class="text-[11px] text-red-500 font-mono mb-6 leading-tight"></p>
                <button onclick="forzarReparacion()" class="btn-orange !h-14 !text-xs !bg-red-600 shadow-red-200">REPARAR CONEXIÓN Y LIMPIAR CACHÉ</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="card-samsung text-center border border-gray-100 bg-white">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Facturas</p>
                    <p id="dash-count" class="text-4xl font-black text-slate-800">0</p>
                </div>
                <div class="card-samsung text-center border border-gray-100 bg-white">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Utilidad</p>
                    <p id="dash-util" class="text-2xl font-black text-green-600">$0.00</p>
                </div>
            </div>
        </div>

        <!-- PESTAÑA LISTADO -->
        <div id="tab-facturas" class="tab-content">
            <button onclick="abrirNuevaFactura()" class="btn-orange mb-8 text-[13px] tracking-[0.2em] shadow-xl shadow-orange-100">+ NUEVA FACTURA ESPEJO</button>
            <div id="facturas-list" class="space-y-4 pb-24">
                <p class="text-center py-20 text-slate-300 font-bold uppercase text-[10px] tracking-widest">Sincronizando movimientos...</p>
            </div>
        </div>
    </main>

    <!-- NAVEGACIÓN SAMSUNG -->
    <nav class="nav-bottom">
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1.5 font-black text-[11px] text-orange-600 uppercase">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
            Panel
        </button>
        <button onclick="switchTab('facturas')" id="nav-facturas" class="flex flex-col items-center gap-1.5 font-black text-[11px] text-gray-300 uppercase">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
            Facturas
        </button>
    </nav>

    <!-- MODAL FACTURA -->
    <div id="modal-factura" class="modal">
        <div class="bg-white rounded-[44px] p-8 max-w-md mx-auto shadow-2xl mt-10">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="font-black text-slate-800 text-sm uppercase tracking-widest leading-none">Nueva Factura</h3>
                    <p class="text-[9px] font-bold text-orange-500 mt-1 uppercase">Austroecuatoriana S.A.S.</p>
                </div>
                <button onclick="document.getElementById('modal-factura').style.display='none'" class="text-slate-300 text-4xl font-light">✕</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase px-1 mb-1 block">N° Factura</label>
                    <input id="f-num" type="text" placeholder="Ej: 5913">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase px-1 mb-1 block">Fecha</label>
                    <input id="f-fecha" type="date">
                </div>
            </div>

            <div class="bg-slate-50 rounded-[32px] p-6 border border-slate-100 mb-6 overflow-hidden">
                <table class="mirror-table">
                    <tbody id="f-items"></tbody>
                </table>
            </div>

            <div class="bg-slate-900 text-white p-8 rounded-[40px] shadow-2xl mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4zM18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" /></svg>
                </div>
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Utilidad Austro</p>
                    <p id="f-util" class="text-lg font-black text-orange-400">$0.00</p>
                </div>
                <div class="flex justify-between items-center border-t border-white/10 pt-3">
                    <p class="text-[11px] opacity-60 font-black uppercase tracking-widest">Total Factura</p>
                    <p id="f-total" class="text-4xl font-black tracking-tighter">$0.00</p>
                </div>
            </div>

            <button id="btn-save" class="btn-orange text-[14px] tracking-[0.25em]">Sincronizar en Nube</button>
            <div class="h-10"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN MAESTRA EXTRAÍDA DE TU CONSOLA (Captura 4:02 PM)
        const MASTER_CONFIG = {
            apiKey: "AIzaSyBu0b-086orBd_fQut3i9n5s0W9fLpkRFI",
            authDomain: "austrodistribuidoraecuatoriana.firebaseapp.com",
            projectId: "austrodistribuidoraecuatoriana",
            storageBucket: "austrodistribuidoraecuatoriana.firebasestorage.app",
            messagingSenderId: "711061794814",
            appId: "1:711061794814:web:65b028a387ecf277ca5aaf"
        };

        const PRODUCTOS = [
            { n: 'VASO 165G.', c: 0.2696, r: 0.0782 },
            { n: 'VASO 340G.', c: 0.6087, r: 0.0870 },
            { n: 'EMP. 1/2L.', c: 0.7770, r: 0.1100 },
            { n: 'EMP. 1L.', c: 1.5974, r: 0.2287 }
        ];

        let db, auth;
        let facturas = [];
        let userId = null;

        async function bootstrap() {
            try {
                // Forzar limpieza si hay restos de versiones viejas en localStorage
                if (localStorage.getItem('app_v') !== '11.0') {
                    localStorage.clear();
                    localStorage.setItem('app_v', '11.0');
                }

                if (firebase.apps.length) return;
                firebase.initializeApp(MASTER_CONFIG);
                db = firebase.firestore();
                auth = firebase.auth();

                auth.signInAnonymously().then(res => {
                    userId = res.user.uid;
                    document.getElementById('conn-dot').className = "status-dot bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.6)]";
                    document.getElementById('conn-text').innerText = "NUBE CONECTADA v11.0";
                    document.getElementById('error-card').classList.add('hidden');
                    escucharDatos();
                }).catch(e => {
                    document.getElementById('error-card').classList.remove('hidden');
                    document.getElementById('error-msg').innerText = "GOOGLE RECHAZA LA CONEXIÓN: " + e.message + "\n\nDOMINIO: " + window.location.hostname;
                    document.getElementById('conn-text').innerText = "FALLO DE LLAVE";
                    document.getElementById('conn-dot').className = "status-dot bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)]";
                });
            } catch (e) { console.error(e); }
        }

        function escucharDatos() {
            // Regla 1: Ruta estricta de datos públicos
            db.collection('artifacts/austro-v11-prod/public/data/facturas').onSnapshot(snap => {
                facturas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderUI();
            }, err => {
                document.getElementById('error-card').classList.remove('hidden');
                document.getElementById('error-msg').innerText = "PERMISO DENEGADO EN FIRESTORE: Asegúrate de que las REGLAS permitan lectura/escritura.";
            });
        }

        function renderUI() {
            const total = facturas.reduce((acc, f) => acc + (f.saldo || 0), 0);
            const util = facturas.reduce((acc, f) => acc + (f.utilidad || 0), 0);
            
            document.getElementById('dash-total').innerText = `$${total.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            document.getElementById('dash-count').innerText = facturas.length;
            document.getElementById('dash-util').innerText = `$${util.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            
            const list = document.getElementById('facturas-list');
            const sorted = [...facturas].sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            
            list.innerHTML = sorted.map(f => `
                <div class="card-samsung border border-gray-100 bg-white">
                    <div class="flex justify-between items-start mb-5">
                        <div>
                            <h4 class="font-black text-slate-800 text-sm uppercase leading-tight tracking-tight">FACTURA #${f.numFactura}</h4>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">${f.fecha || 'Sin fecha'}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black text-orange-600 tracking-tighter">$${(f.total || 0).toFixed(2)}</span>
                            <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mt-1">UTL: $${(f.utilidad || 0).toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="bg-slate-50 rounded-[22px] p-4 flex justify-between items-center border border-slate-100 shadow-inner">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Saldo: <b class="text-slate-700">$${(f.saldo || 0).toFixed(2)}</b></span>
                        <span class="text-[10px] font-black text-orange-700 uppercase tracking-widest bg-orange-100 px-3 py-1 rounded-full">${f.estado}</span>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-24 text-slate-300 font-bold uppercase text-[11px] tracking-[0.2em]">Sin movimientos registrados</div>';
        }

        function abrirNuevaFactura() {
            document.getElementById('modal-factura').style.display='block';
            document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('f-items').innerHTML = PRODUCTOS.map((p, i) => `
                <tr>
                    <td class="font-bold text-slate-600 text-[10px] uppercase leading-tight">${p.n}</td>
                    <td class="w-24"><input type="number" id="cant-${i}" oninput="calcularTotal()" placeholder="0" class="!mb-0 text-center font-black !p-2 !bg-white shadow-sm"></td>
                    <td class="text-right font-mono text-slate-300 text-[10px] leading-none">$${p.c.toFixed(4)}</td>
                </tr>
            `).join('');
            calcularTotal();
        }

        function calcularTotal() {
            let sub = 0; let util = 0;
            PRODUCTOS.forEach((p, i) => {
                const q = parseFloat(document.getElementById(`cant-${i}`).value) || 0;
                sub += q * p.c; util += q * p.r;
            });
            const total = sub * 1.15;
            document.getElementById('f-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('f-util').innerText = `$${util.toFixed(2)}`;
        }

        document.getElementById('btn-save').onclick = async () => {
            const num = document.getElementById('f-num').value;
            if(!num) return alert("Ingresa N° Factura");
            
            const btn = document.getElementById('btn-save');
            btn.disabled = true; 
            btn.innerHTML = '<span class="opacity-50">SINCRO...</span>';

            const total = parseFloat(document.getElementById('f-total').innerText.replace('$',''));
            const util = parseFloat(document.getElementById('f-util').innerText.replace('$',''));

            try {
                // Regla 1: Ruta estricta
                await db.collection('artifacts/austro-v11-prod/public/data/facturas').add({
                    numFactura: num,
                    fecha: document.getElementById('f-fecha').value,
                    total: total, utilidad: util, saldo: total, estado: 'pendiente',
                    uid: userId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('modal-factura').style.display='none';
            } catch (e) { alert("Error al subir: " + e.message); }
            btn.disabled = false; 
            btn.innerText = "Sincronizar en Nube";
        };

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('view-title').innerText = t === 'dashboard' ? 'Panel' : 'Facturas';
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-orange-600', 'text-gray-300'));
            document.getElementById('nav-'+t).classList.replace('text-gray-300', 'text-orange-600');
        }

        function forzarReparacion() {
            localStorage.clear();
            sessionStorage.clear();
            // Truco para romper caché de red
            window.location.href = window.location.pathname + '?v=' + Date.now();
        }

        window.onload = bootstrap;
    </script>
</body>
</html>
