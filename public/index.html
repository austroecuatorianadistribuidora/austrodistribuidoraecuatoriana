<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logística Polaca Pro v7.0 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LIBRERÍAS FIREBASE COMPAT (Versión recomendada para máxima compatibilidad móvil) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --oneui-orange: #ea580c;
            --oneui-bg: #f4f4f4;
            --oneui-card: #ffffff;
            --oneui-text: #1a1a1a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--oneui-bg); 
            color: var(--oneui-text); 
            margin: 0; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Estética One UI Premium */
        .card-samsung {
            background: var(--oneui-card);
            border-radius: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card-samsung:active { transform: scale(0.98); }

        .btn-orange {
            background-color: var(--oneui-orange);
            color: white;
            border-radius: 24px;
            font-weight: 800;
            border: none;
            height: 60px;
            box-shadow: 0 10px 25px rgba(234, 88, 12, 0.2);
            transition: all 0.2s;
        }

        .btn-orange:disabled { opacity: 0.5; background-color: #94a3b8; box-shadow: none; }

        .nav-bottom {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(25px);
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }

        .tab-active { color: var(--oneui-orange) !important; font-weight: 900; }

        input {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 14px 18px;
            outline: none;
            width: 100%;
            font-size: 16px !important;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--oneui-orange); background: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .mirror-table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .mirror-table td { padding: 12px 6px; border-bottom: 1px solid #f1f5f9; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            z-index: 200;
            display: none;
            padding: 15px;
            overflow-y: auto;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .loader-spin {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 0px; }
    </style>

    <script>
        // TABLA TÉCNICA DE PRODUCTOS (Precisión Austroecuatoriana)
        const PRODUCTOS_DATA = [
            { id: 'P1', nombre: 'VASO 165G.', costo: 0.2696, rent: 0.0782 },
            { id: 'P2', nombre: 'VASO 340G.', costo: 0.6087, rent: 0.0870 },
            { id: 'P3', nombre: 'EMP. 1/2L.', costo: 0.7770, rent: 0.1100 },
            { id: 'P4', nombre: 'EMP. 1L.', costo: 1.5974, rent: 0.2287 }
        ];

        // LÓGICA DE NAVEGACIÓN INSTANTÁNEA
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const target = document.getElementById('tab-' + tab);
            if(target) target.classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            const activeBtn = document.getElementById('nav-' + tab);
            if(activeBtn) activeBtn.classList.add('tab-active');
            
            const titleEl = document.getElementById('view-title');
            if(titleEl) {
                const names = { dashboard: 'Panel', facturas: 'Facturas', rutas: 'Rutas' };
                titleEl.innerText = names[tab] || 'Inicio';
            }
            
            if (window.renderApp) window.renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openModal(id) {
            const el = document.getElementById(id);
            if(el) {
                el.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
            if (id === 'modal-factura') {
                const dateEl = document.getElementById('f-fecha');
                if(dateEl) dateEl.value = new Date().toISOString().split('T')[0];
                
                const tbody = document.getElementById('f-items-mirror');
                if(tbody) {
                    tbody.innerHTML = PRODUCTOS_DATA.map((p, i) => `
                        <tr>
                            <td class="font-bold text-slate-700 text-[11px] uppercase leading-tight">${p.nombre}</td>
                            <td class="w-24">
                                <input type="number" id="f-cant-${i}" oninput="window.calcF()" placeholder="0" class="text-center font-black !bg-orange-50 !py-2">
                            </td>
                            <td class="font-mono text-slate-400 text-right text-[10px]">$${p.costo.toFixed(4)}</td>
                        </tr>
                    `).join('');
                }
                window.calcF();
            }
        }

        function closeModal(id) {
            const el = document.getElementById(id);
            if(el) {
                el.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        window.calcF = () => {
            let sub = 0; let util = 0;
            PRODUCTOS_DATA.forEach((p, i) => {
                const input = document.getElementById(`f-cant-${i}`);
                const q = input ? (parseFloat(input.value) || 0) : 0;
                sub += q * p.costo;
                util += q * p.rent;
            });
            const iva = sub * 0.15;
            const total = sub + iva;
            
            const updateText = (id, val) => { const e = document.getElementById(id); if(e) e.innerText = `$${val.toFixed(2)}`; };
            updateText('f-subtotal', sub);
            updateText('f-iva', iva);
            updateText('f-total', total);
            updateText('f-utilidad', util);
        };
    </script>
</head>
<body class="pb-32">

    <div id="app">
        <!-- HEADER DE CONEXIÓN -->
        <header class="p-6 pt-10 sticky top-0 bg-[#f4f4f4]/90 backdrop-blur-xl z-40">
            <div class="flex justify-between items-center">
                <div>
                    <div id="conn-badge" class="bg-gray-200 px-3 py-1 rounded-full text-[9px] font-black text-gray-500 flex items-center gap-2 mb-1 shadow-sm">
                        <span id="conn-dot" class="status-dot bg-gray-400"></span>
                        <span id="conn-text">SINCRONIZANDO v7.0...</span>

                </div>

                    <svg id="cloud-icon" class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
            </div>
        </header>

        <main id="main-container" class="px-5 space-y-6">
            
            <!-- PANEL PRINCIPAL -->
            <section id="tab-dashboard" class="tab-content active">

                    <div class="relative z-10">
                        <p class="text-[11px] font-bold uppercase opacity-60 tracking-widest leading-none">Saldo Pendiente Cobro</p>
                        <h2 id="dash-total" class="text-5xl font-black mt-2 tracking-tighter">$0.00</h2>
                    </div>
                    <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="card-samsung p-6 border border-gray-100 flex flex-col items-center">
                        <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center mb-3">
                            <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        </div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Facturas</p>
                        <p id="dash-count" class="text-3xl font-black text-slate-800">0</p>
                    </div>
                    <div class="card-samsung p-6 border border-gray-100 flex flex-col items-center">
                        <div class="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center mb-3">
                            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7" /></svg>
                        </div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Utilidad</p>
                        <p id="dash-utilidad" class="text-2xl font-black text-slate-800">$0.00</p>
                    </div>
                </div>

                <div id="debug-box" class="hidden p-5 bg-red-50 text-red-600 rounded-3xl text-[10px] font-mono mt-4 border border-red-100 shadow-sm animate-pulse"></div>
            </section>

            <!-- GESTIÓN DE FACTURAS -->
            <section id="tab-facturas" class="tab-content">
                <button onclick="openModal('modal-factura')" class="w-full py-5 btn-orange shadow-xl shadow-orange-100 mb-8 uppercase text-[12px] tracking-[0.2em] font-black">
                    + Nueva Factura Espejo
                </button>
                <div id="facturas-list" class="space-y-5 pb-10">
                    <div class="text-center py-20 text-slate-300 font-bold uppercase text-[10px] tracking-widest">Sincronizando con la nube...</div>
                </div>
            </section>

        </main>

        <!-- NAVEGACIÓN -->
        <nav class="nav-bottom fixed bottom-0 left-0 right-0 h-24 flex justify-around items-center px-4 pb-6">
            <button onclick="switchTab('dashboard')" class="flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-dashboard">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                <span class="text-[10px] font-black uppercase tracking-tight">Panel</span>
            </button>
            <button onclick="switchTab('facturas')" class="flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-facturas">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                <span class="text-[10px] font-black uppercase tracking-tight">Facturas</span>
            </button>
        </nav>

        <!-- MODAL FACTURA -->
        <div id="modal-factura" class="modal-overlay">
            <div class="card-samsung w-full max-w-md mx-auto p-8 space-y-6 shadow-2xl animate-in slide-in-from-bottom duration-300 bg-white">
                <div class="flex justify-between items-center border-b pb-5">
                    <div>
                        <h3 class="font-black text-slate-800 text-sm uppercase tracking-widest leading-none mb-1">Nueva Factura</h3>
                        <p class="text-[9px] font-bold text-orange-500 uppercase tracking-wider">Espejo Austroecuatoriana</p>
                    </div>
                    <button onclick="closeModal('modal-factura')" class="text-slate-300 p-2 text-3xl font-light">✕</button>
                </div>
                
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase px-1 mb-1 block">N° Factura</label>
                            <input id="f-num" type="text" placeholder="Ej: 5913">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase px-1 mb-1 block">Fecha</label>
                            <input id="f-fecha" type="date">
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 rounded-3xl p-5 shadow-inner border border-slate-100 overflow-x-auto">
                        <table class="mirror-table">
                            <thead><tr><th>PRODUCTO</th><th class="text-center">CANT</th><th class="text-right">COSTE</th></tr></thead>
                            <tbody id="f-items-mirror"></tbody>
                        </table>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-blue-50 p-5 rounded-3xl text-center border border-blue-100 shadow-sm">
                            <p class="text-[9px] font-black text-blue-400 uppercase mb-1">Ganancia ($)</p>
                            <p id="f-utilidad" class="text-2xl font-black text-blue-700 leading-none">$0.00</p>
                        </div>
                        <div class="bg-slate-100 p-5 rounded-3xl text-center border border-slate-200">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Subtotal Neto</p>
                            <p id="f-subtotal" class="text-xl font-black text-slate-700 leading-none">$0.00</p>
                        </div>
                    </div>

                    <div class="bg-slate-900 p-6 rounded-[32px] text-white shadow-2xl flex justify-between items-center relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-2 opacity-5">
                            <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4zM18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" /></svg>
                        </div>
                        <div class="text-left">
                            <p class="text-[10px] font-black opacity-40 uppercase tracking-widest">IVA 15%</p>
                            <p id="f-iva" class="text-sm font-bold">$0.00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[11px] font-black opacity-60 uppercase tracking-widest mb-1">Total Factura</p>
                            <p id="f-total" class="text-4xl font-black text-orange-400 tracking-tighter leading-none">$0.00</p>
                        </div>
                    </div>

                    <button id="btn-save-final" class="w-full btn-orange uppercase text-[12px] font-black shadow-2xl tracking-[0.2em] flex items-center justify-center gap-3">
                        <span id="btn-label">Sincronizar en Nube</span>

                    <div class="h-6"></div>

    </div>

    <div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-full text-[10px] font-black opacity-0 transition-all pointer-events-none z-[1000] uppercase shadow-2xl border border-slate-700"></div>

    <script>
        // CONFIGURACIÓN MAESTRA (Fijada para tu proyecto Austroecuatoriana)
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBu0b-086orBd_fQut3i9n5s0W9fLpkRFI",
            authDomain: "austrodistribuidoraecuatoriana.firebaseapp.com",
            projectId: "austrodistribuidoraecuatoriana",
            storageBucket: "austrodistribuidoraecuatoriana.firebasestorage.app",
            messagingSenderId: "711061794814",
            appId: "1:711061794814:web:65b028a387ecf277ca5aaf"
        };

        let state = { facturas: [], user: null, activeTab: 'dashboard' };
        const COLLECTION_ID = "austro-v7-final"; // Identificador de colección única

        async function initApp() {
            const dbBox = document.getElementById('debug-box');
            try {
                if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
                const auth = firebase.auth();
                const db = firebase.firestore();

                // Autenticación según la regla de autorización que acabas de configurar
                await auth.signInAnonymously();

                auth.onAuthStateChanged((user) => {
                    if (user) {
                        state.user = user;
                        // Actualizar interfaz al conectar
                        const dot = document.getElementById('conn-dot');
                        const text = document.getElementById('conn-text');
                        const badge = document.getElementById('conn-badge');
                        const icon = document.getElementById('cloud-icon');
                        const authBox = document.getElementById('auth-status-ui');
                        
                        if(dot) dot.className = "status-dot bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]";
                        if(text) text.innerText = "NUBE CONECTADA";
                        if(badge) badge.className = "bg-green-50 px-4 py-1.5 rounded-full text-[10px] font-black text-green-600 flex items-center gap-2 mb-1 shadow-sm border border-green-100";
                        if(icon) icon.className = "w-6 h-6 text-green-600";
                        if(authBox) authBox.className = "bg-green-100 p-3 rounded-2xl shadow-sm";
                        
                        // Sincronización en tiempo real (Regla 1: Ruta estricta)
                        db.collection(`artifacts/${COLLECTION_ID}/public/data/facturas`).onSnapshot((snap) => {
                            state.facturas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                            window.renderApp();
                        }, (err) => {
                            if(dbBox) { 
                                dbBox.classList.remove('hidden'); 
                                dbBox.innerHTML = `<strong>FALLO DE PERMISO:</strong><br>Entra a Firebase > Autenticación > Ajustes y añade <b>idoraecuatoriana.web.app</b> a Dominios Autorizados.`; 
                            }
                        });
                    }
                });

                document.getElementById('btn-save-final').addEventListener('click', async () => {
                    if (!state.user) return showToast("SIN CONEXIÓN");
                    const num = document.getElementById('f-num').value;
                    if (!num) return showToast("INGRESE NÚMERO");
                    
                    const btn = document.getElementById('btn-save-final');
                    btn.disabled = true;
                    btn.innerHTML = `<span class="loader-spin"></span>`;

                    const data = {
                        numFactura: num,
                        fecha: document.getElementById('f-fecha').value,
                        total: parseFloat(document.getElementById('f-total').innerText.replace('$','')),
                        utilidad: parseFloat(document.getElementById('f-utilidad').innerText.replace('$','')),
                        subtotal: parseFloat(document.getElementById('f-subtotal').innerText.replace('$','')),
                        pagado: 0,
                        saldo: parseFloat(document.getElementById('f-total').innerText.replace('$','')),
                        estado: 'pendiente',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    try {
                        await db.collection(`artifacts/${COLLECTION_ID}/public/data/facturas`).add(data);
                        showToast("SINCRO EXITOSA");
                        closeModal('modal-factura');
                    } catch (e) {
                        alert("Error de escritura: " + e.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = `Sincronizar en Nube`;
                    }
                });

            } catch (e) {
                if(dbBox) { dbBox.classList.remove('hidden'); dbBox.innerText = "Error: " + e.message; }
            }
        }

        window.renderApp = () => {
            const tab = state.activeTab;
            if (tab === 'dashboard') {
                const totalPend = state.facturas.reduce((acc, f) => acc + (f.saldo || 0), 0);
                const totalUtil = state.facturas.reduce((acc, f) => acc + (f.utilidad || 0), 0);
                
                const dashTotalEl = document.getElementById('dash-total');
                if(dashTotalEl) dashTotalEl.innerText = `$${totalPend.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                
                const dashCountEl = document.getElementById('dash-count');
                if(dashCountEl) dashCountEl.innerText = state.facturas.filter(f => f.estado === 'pendiente').length;

                const dashUtilEl = document.getElementById('dash-utilidad');
                if(dashUtilEl) dashUtilEl.innerText = `$${totalUtil.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            }
            if (tab === 'facturas') {
                const list = document.getElementById('facturas-list');
                if(!list) return;
                
                const sorted = [...state.facturas].sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                list.innerHTML = sorted.map(f => `
                    <div class="card-samsung p-7 border border-gray-100 fade-in bg-white relative overflow-hidden">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h4 class="font-black text-slate-800 text-sm uppercase leading-tight tracking-tight">FACTURA #${f.numFactura}</h4>
                                <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">${f.fecha || 'Sin fecha'}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-2xl font-black text-orange-600 tracking-tighter">$${(f.total || 0).toFixed(2)}</span>
                                <p class="text-[9px] font-black text-blue-500 uppercase mt-1 tracking-widest">UTL: $${(f.utilidad || 0).toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                             <div class="bg-slate-50 rounded-2xl p-4 text-center border border-slate-100 shadow-inner">
                                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-tighter">Por Cobrar</p>
                                <p class="text-lg font-black text-slate-800 tracking-tighter">$${(f.saldo || 0).toFixed(2)}</p>
                             </div>
                             <div class="bg-orange-50 rounded-2xl p-4 text-center flex flex-col justify-center border border-orange-100">
                                <p class="text-[9px] font-bold text-orange-400 uppercase mb-1 tracking-tighter">Estado</p>
                                <p class="text-[11px] font-black text-orange-700 uppercase leading-none">${f.estado}</p>
                             </div>
                        </div>
                    </div>
                `).join('') || '<div class="text-center py-24 text-slate-300 font-bold uppercase text-[11px] tracking-[0.2em]">Sin movimientos registrados</div>';
            }
        };

        function showToast(m) { 
            const t = document.getElementById('toast'); 
            if(t) { 
                t.innerText = m; t.style.opacity = '1';
                setTimeout(() => { t.style.opacity = '0'; }, 3000); 
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
