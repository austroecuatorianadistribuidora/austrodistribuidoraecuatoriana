<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avena Control Pro - Gestión Integral ✨</title>
    <!-- Dependencias estables -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; background-color: #f1f5f9; color: #1e293b; }
        
        .invoice-paper { 
            background: white; 
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.25); 
            border: 1px solid #e2e8f0; 
            max-width: 850px;
            margin: auto;
        }
        
        .invoice-table th, .invoice-table td { 
            border: 1px solid #cbd5e1; 
            padding: 10px; 
            font-size: 0.7rem; 
        }
        
        .invoice-table th { 
            background-color: #f8fafc; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #475569;
        }

        .progress-bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hide-scrollbar::-webkit-scrollbar { width: 6px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN GLOBAL PRODUCTOS (SEGÚN FACTURA 5913) ---
        const today = new Date().toISOString().split('T')[0];
        const PRODUCTOS_BASE = [
            { id: 'p1', codigo: 'P000000256', nombre: '01 EMPACADO AVENA POLACA 165G', costo: 0.269565, pvd: 0.3478, color: '#f97316' },
            { id: 'p2', codigo: 'P000000247', nombre: '02 EMPACADO AVENA POLACA 340G', costo: 0.608694, pvd: 0.6956, color: '#fb923c' },
            { id: 'p3', codigo: 'P000000005', nombre: '03 EMPACADO AVENA POLACA 500G', costo: 0.777042, pvd: 0.8869, color: '#ea580c' },
            { id: 'p4', codigo: 'P000000006', nombre: '04 EMPACADO AVENA POLACA 1000G', costo: 1.597390, pvd: 1.8260, color: '#c2410c' },
        ];

        const TOTAL_GASTOS_FIJOS = 3579.80;
        const MARGEN_PROMEDIO_ESTIMADO = 0.14; 
        const VENDEDORES = ["Diego Xavier Siavichay", "Byron Armando Miranda Capa"];

        // --- FIREBASE INITIALIZATION (GLOBAL SCOPE) ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'distribuidora-avena-v3';

        // --- COMPONENTES UI GLOBALES ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white p-6 rounded-[32px] border border-gray-200 shadow-sm ${className}`}>{children}</div>
        );

        const ViewHeader = ({ title, sub, onClose }) => (
            <div className="flex justify-between items-center border-b pb-6 mb-6 text-left">
                <div>
                    <h2 className="text-3xl font-black text-slate-800 tracking-tighter uppercase leading-none">{title}</h2>
                    {sub && <p className="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">{sub}</p>}
                </div>
                <button onClick={onClose} className="p-3 bg-slate-100 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all shadow-sm">
                    <Icon name="x" size={24}/>
                </button>
            </div>
        );

        // --- VISTA: FACTURACIÓN ESPEJO ---
        const FacturacionView = ({ facturas, user, onClose }) => {
            const [modalNueva, setModalNueva] = useState(false);
            const [modalPago, setModalPago] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [form, setForm] = useState({
                numFactura: '',
                fecha: today,
                items: PRODUCTOS_BASE.map(p => ({ ...p, cantidad: 0 })),
                respaldoDoc: null
            });
            const [pagoForm, setPagoForm] = useState({ monto: '', fecha: today, comprobante: null });

            const calc = useMemo(() => {
                const subtotal = form.items.reduce((acc, it) => acc + (it.cantidad * it.costo), 0);
                const iva = subtotal * 0.15;
                const total = subtotal + iva;
                const utilidad = form.items.reduce((acc, it) => acc + (it.cantidad * (it.pvd - it.costo)), 0);
                return { subtotal, iva, total, utilidad };
            }, [form.items]);

            const guardarFactura = async (e) => {
                if (e) e.preventDefault();
                if (!user) return alert("Conexión perdida. Recargue la página.");
                if (!form.numFactura) return alert("Ingrese el número de factura");
                
                setIsSaving(true);
                try {
                    const data = {
                        numFactura: form.numFactura,
                        fecha: form.fecha,
                        items: form.items.map(it => ({ id: it.id, nombre: it.nombre, cantidad: it.cantidad, costo: it.costo, total: it.cantidad * it.costo })),
                        total: calc.total,
                        saldoPendiente: calc.total,
                        utilidadCompra: calc.utilidad,
                        estado: 'Pendiente',
                        respaldo: form.respaldoDoc,
                        createdAt: new Date().toISOString()
                    };

                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturasProveedor').add(data);
                    setModalNueva(false);
                    resetForm();
                } catch (err) {
                    console.error("Error saving invoice:", err);
                    alert("Error de conexión al guardar.");
                } finally {
                    setIsSaving(false);
                }
            };

            const registrarAbono = async (factura) => {
                const monto = parseFloat(pagoForm.monto);
                if (isNaN(monto) || monto <= 0) return;
                try {
                    const nuevoSaldo = Math.max(0, factura.saldoPendiente - monto);
                    const nuevoEstado = nuevoSaldo <= 0.05 ? 'Cancelado' : 'Abonado';
                    
                    const factRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturasProveedor').doc(factura.id);
                    await factRef.update({ saldoPendiente: nuevoSaldo, estado: nuevoEstado });
                    
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gastos').add({
                        fecha: pagoForm.fecha, 
                        monto: monto, 
                        categoria: 'Pago Proveedor', 
                        detalle: `Pago Fact #${factura.numFactura}`, 
                        comprobante: pagoForm.comprobante
                    });
                    
                    setModalPago(null);
                    setPagoForm({ monto: '', fecha: today, comprobante: null });
                } catch (err) { console.error(err); }
            };

            const resetForm = () => setForm({ numFactura: '', fecha: today, items: PRODUCTOS_BASE.map(p => ({ ...p, cantidad: 0 })), respaldoDoc: null });
            const facturasOrdenadas = useMemo(() => [...facturas].sort((a, b) => new Date(a.fecha) - new Date(b.fecha)), [facturas]);

            return (
                <div className="space-y-6 fade-in">
                    <ViewHeader title="Facturación" sub="1. Registro Manual Espejo" onClose={onClose} />
                    <div className="flex justify-end mb-4">
                        <button onClick={() => setModalNueva(true)} className="bg-orange-600 text-white px-8 py-4 rounded-2xl shadow-xl flex items-center gap-2 font-black uppercase text-xs hover:scale-105 transition-all">
                            <Icon name="file-plus" size={20}/> Nueva Factura "Espejo"
                        </button>
                    </div>

                    <div className="space-y-4 text-left">
                        {facturasOrdenadas.map(f => (
                            <Card key={f.id} className={`flex flex-col md:flex-row justify-between items-center border-l-8 ${f.estado === 'Cancelado' ? 'border-l-green-500' : 'border-l-slate-800'} gap-4`}>
                                <div className="flex-1">
                                    <h4 className="font-black text-slate-800 uppercase text-lg">Factura #{f.numFactura}</h4>
                                    <div className="flex gap-4 mt-1">
                                        <span className="text-[10px] font-black uppercase text-slate-400">{f.fecha}</span>
                                        <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded-full ${f.estado === 'Cancelado' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>{f.estado}</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-8 text-center px-4 md:border-l md:border-r border-slate-100 w-full md:w-auto font-black text-left">
                                    <div><p className="text-[8px] uppercase opacity-40">Monto</p><p className="text-slate-800">${f.total?.toFixed(2)}</p></div>
                                    <div><p className="text-[8px] uppercase opacity-40">Saldo</p><p className={f.saldoPendiente > 0 ? 'text-red-500' : 'text-green-600'}>${f.saldoPendiente?.toFixed(2)}</p></div>
                                </div>
                                <div className="flex gap-2">
                                    {f.estado !== 'Cancelado' && (
                                        <button onClick={() => setModalPago(f)} className="p-4 bg-green-50 text-green-600 rounded-2xl hover:bg-green-100 shadow-sm"><Icon name="banknote" size={24}/></button>
                                    )}
                                    <button onClick={() => { if(confirm('¿Borrar factura?')) db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturasProveedor').doc(f.id).delete() }} className="p-4 text-slate-200 hover:text-red-500 transition-colors">
                                        <Icon name="trash-2" size={24}/>
                                    </button>
                                </div>
                            </Card>
                        ))}
                    </div>

                    {modalNueva && (
                        <div className="fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-2 sm:p-10 backdrop-blur-sm overflow-hidden">
                            <div className="bg-white w-full max-w-5xl h-full max-h-[95vh] rounded-xl flex flex-col overflow-hidden relative shadow-2xl animate-in zoom-in-95">
                                <button onClick={() => setModalNueva(false)} className="absolute top-4 right-4 z-10 p-3 bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-600 rounded-full transition-all">
                                    <Icon name="x" size={24}/>
                                </button>
                                <div className="flex-1 overflow-y-auto p-4 sm:p-10 hide-scrollbar">
                                    <div className="invoice-paper p-6 sm:p-10 border rounded-sm">
                                        <div className="flex flex-col md:flex-row justify-between items-start mb-10 pb-10 border-b-2 border-slate-900">
                                            <div className="text-left space-y-1">
                                                <h3 className="text-xl font-black text-slate-900 uppercase italic leading-none mb-3 tracking-tighter">LÁCTEOS LA POLACA GUSTALAC S.A.</h3>
                                                <div className="space-y-0.5 text-slate-500 font-bold uppercase text-[9px]">
                                                    <p>VIA QUININDE MARGEN DERECHO KM13</p>
                                                    <p>RUC: 1792039754001</p>
                                                    <p>TELÉFONO: 022765404</p>
                                                </div>
                                            </div>
                                            <div className="w-full md:w-64 mt-6 md:mt-0 space-y-3 text-left">
                                                <div className="bg-slate-900 text-white p-3 rounded">
                                                    <p className="text-[8px] font-black uppercase opacity-60">FACTURA Nº</p>
                                                    <input required placeholder="003-102-0000XXXXX" className="bg-transparent text-lg font-black border-none outline-none w-full placeholder:text-slate-700" value={form.numFactura} onChange={e => setForm({...form, numFactura: e.target.value})} />
                                                </div>
                                                <div className="bg-slate-50 border p-3 rounded">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase">FECHA EMISIÓN</p>
                                                    <input type="date" required className="bg-transparent font-black border-none outline-none w-full" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 text-[10px] font-bold text-slate-600 uppercase text-left italic">
                                            <div className="space-y-1 border-r pr-8 border-slate-100">
                                                <p className="text-slate-400 mb-2 font-black italic">Distribuidor:</p>
                                                <p className="text-slate-900 font-black text-xs tracking-tight uppercase">DISTRIBUIDORA AUSTROECUATORIANA S.A.S.</p>
                                                <p>RUC: 0195174555001</p>
                                                <p>CIUDAD: CUENCA</p>
                                            </div>
                                            <div>
                                                <p className="text-slate-400 mb-2 font-black italic">Cargar Respaldo:</p>
                                                <input type="file" className="text-[9px] w-full" onChange={e => {
                                                    const r = new FileReader(); r.onload = () => setForm({...form, respaldoDoc: r.result});
                                                    if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
                                                }} />
                                            </div>
                                        </div>

                                        <div className="overflow-x-auto mb-10">
                                            <table className="w-full invoice-table">
                                                <thead>
                                                    <tr>
                                                        <th>Cod.</th>
                                                        <th>Descripción</th>
                                                        <th className="w-24 text-center">Cant.</th>
                                                        <th className="w-32 text-right">Precio Uni.</th>
                                                        <th className="w-32 text-right">Total</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {form.items.map((it, idx) => (
                                                        <tr key={it.id}>
                                                            <td className="font-mono text-slate-400 text-[10px]">{it.codigo}</td>
                                                            <td className="text-left font-black text-slate-800 text-xs uppercase">{it.nombre}</td>
                                                            <td className="p-0">
                                                                <input type="number" min="0" className="w-full text-center py-4 font-black bg-orange-50 border-none focus:ring-0" value={it.cantidad} onChange={e => {
                                                                    const ni = [...form.items];
                                                                    ni[idx].cantidad = parseInt(e.target.value) || 0;
                                                                    setForm({...form, items: ni});
                                                                }} />
                                                            </td>
                                                            <td className="text-right font-mono text-slate-500">${it.costo.toFixed(4)}</td>
                                                            <td className="text-right font-black text-slate-900">${(it.cantidad * it.costo).toFixed(2)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="flex flex-col md:flex-row justify-between gap-10">
                                            <div className="flex-1 space-y-4 text-left">
                                                <div className="bg-slate-50 p-5 rounded border w-full italic">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase mb-2">Vendedor:</p>
                                                    <p className="text-[10px] font-bold text-slate-600 uppercase">ARIAS JAIME</p>
                                                </div>
                                                <div className="bg-green-50 p-6 rounded-xl border border-green-200">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <Icon name="trending-up" className="text-green-600" size={18}/>
                                                        <p className="text-[10px] font-black text-green-700 uppercase tracking-widest">Utilidad Gana en esta compra ✨</p>
                                                    </div>
                                                    <p className="text-4xl font-black text-green-800 tracking-tighter">${calc.utilidad.toFixed(2)}</p>
                                                    <p className="text-[9px] font-bold text-green-600 uppercase mt-2">Margen bruto estimado sobre PVD</p>
                                                </div>
                                            </div>
                                            <div className="w-full md:w-80 space-y-2 text-left font-black">
                                                <div className="flex justify-between text-[10px] font-bold border-b pb-2"><span className="text-slate-400 uppercase">Subtotal 15%</span><span className="text-slate-800 font-black">${calc.subtotal.toFixed(2)}</span></div>
                                                <div className="flex justify-between text-[10px] font-bold border-b pb-2"><span className="text-slate-400 uppercase">IVA 15%</span><span className="text-slate-800 font-black">${calc.iva.toFixed(2)}</span></div>
                                                <div className="flex justify-between items-center p-4 bg-slate-900 text-white rounded mt-4 shadow-xl">
                                                    <span className="text-xs font-black uppercase tracking-tighter">VALOR TOTAL</span>
                                                    <span className="text-3xl font-black tracking-tighter">${calc.total.toFixed(2)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 border-t flex justify-end gap-4 shadow-inner">
                                    <button type="button" onClick={() => { resetForm(); setModalNueva(false); }} className="px-8 py-4 bg-white border border-slate-300 rounded-2xl font-black uppercase text-[10px] text-slate-500 hover:bg-red-50 hover:text-red-600 transition-all">Cancelar y Salir</button>
                                    <button onClick={guardarFactura} disabled={isSaving} className="px-10 py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px] shadow-xl hover:bg-orange-600 transition-all">
                                        {isSaving ? "Guardando..." : "Grabar Factura ✨"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {modalPago && (
                        <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <Card className="w-full max-w-md relative animate-in slide-in-from-bottom-5 text-left overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-green-500"></div>
                                <button onClick={() => setModalPago(null)} className="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition-colors"><Icon name="x"/></button>
                                <h3 className="text-xl font-black uppercase mb-6 text-slate-800 italic">Registrar Pago: #{modalPago.numFactura}</h3>
                                <div className="bg-slate-50 p-6 rounded-2xl mb-6 text-center border">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest text-left">Saldo Pendiente actual</p>
                                    <p className="text-4xl font-black text-slate-900 tracking-tighter">${modalPago.saldoPendiente.toFixed(2)}</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2 text-left block">Monto del Pago $</label>
                                        <input type="number" step="0.01" className="w-full bg-white border border-slate-200 p-5 rounded-[20px] font-black outline-none focus:ring-2 focus:ring-green-400 shadow-inner" value={pagoForm.monto} onChange={e => setPagoForm({...pagoForm, monto: e.target.value})} placeholder="0.00" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2 text-left block">Comprobante</label>
                                        <input type="file" accept="image/*" className="text-xs w-full" onChange={e => {
                                            const r = new FileReader(); r.onload = () => setPagoForm({...pagoForm, comprobante: r.result});
                                            if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
                                        }} />
                                    </div>
                                    <button onClick={() => registrarAbono(modalPago)} className="w-full bg-green-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-green-700 transition-all mt-4">Confirmar Transacción</button>
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        // --- VISTAS: LOGÍSTICA ---
        const LogisticaView = ({ cargas, db, appId, onClose }) => {
            const [modal, setModal] = useState(false);
            const [form, setForm] = useState({ vendedor: '', items: PRODUCTOS_BASE.map(p => ({ ...p, q: 0 })) });
            const totalCarga = useMemo(() => form.items.reduce((a, b) => a + (b.q * b.pvd), 0), [form.items]);

            return (
                <div className="space-y-6 fade-in text-left">
                    <ViewHeader title="Logística" sub="2. Despachos Diarios" onClose={onClose} />
                    <div className="flex justify-end mb-4"><button onClick={() => setModal(true)} className="bg-orange-600 text-white p-3 rounded-2xl shadow-xl hover:scale-105 transition-all"><Icon name="plus"/></button></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {cargas.map(c => (
                            <Card key={c.id} className="border-l-8 border-l-orange-400 font-black">
                                <div className="flex justify-between items-start">
                                    <div><h4 className="uppercase text-sm tracking-tighter">{c.responsable}</h4><span className="text-[9px] uppercase text-slate-400 mt-1 block tracking-widest">{c.estado} • {c.fecha}</span></div>
                                    <div className="text-right"><p className="text-[8px] uppercase opacity-40">Valor Cargado</p><p className="text-slate-800 text-xl font-black tracking-tighter">${(c.totalCargado || 0).toLocaleString()}</p></div>
                                </div>
                                <div className="mt-4 pt-4 border-t border-slate-50 flex justify-end">
                                    <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').doc(c.id).delete()} className="text-slate-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={16}/></button>
                                </div>
                            </Card>
                        ))}
                    </div>
                    {modal && (
                        <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
                            <Card className="w-full max-w-lg animate-in zoom-in-95 my-10 relative">
                                <button onClick={() => setModal(false)} className="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition-colors"><Icon name="x"/></button>
                                <h3 className="font-black text-xl mb-8 uppercase text-slate-800 italic">Nueva Salida de Ruta</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').add({
                                        responsable: form.vendedor, fecha: today, estado: 'En Tránsito', totalCargado: totalCarga,
                                        items: form.items.map(it => ({ pId: it.id, nombre: it.nombre, q: it.q, pvd: it.pvd, costo: it.costo }))
                                    });
                                    setModal(false);
                                }} className="space-y-4 font-black">
                                    <select className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none shadow-inner" onChange={e => setForm({...form, vendedor: e.target.value})} required>
                                        <option value="">Seleccionar Vendedor...</option>{VENDEDORES.map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                    {form.items.map((it, idx) => (
                                        <div key={it.id} className="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl border border-slate-100 shadow-sm text-left">
                                            <span className="flex-1 text-[10px] font-black uppercase text-slate-600">{it.nombre}</span>
                                            <input type="number" min="0" className="w-24 p-2 rounded-xl text-center font-black bg-white shadow-inner outline-none focus:ring-1 focus:ring-orange-400" placeholder="0" onChange={e => {
                                                const ni = [...form.items]; ni[idx].q = parseInt(e.target.value) || 0; setForm({...form, items: ni});
                                            }} />
                                        </div>
                                    ))}
                                    <div className="bg-slate-900 p-8 rounded-[35px] text-white flex justify-between items-center mt-6 shadow-2xl">
                                        <div className="text-left"><p className="text-[9px] opacity-40 uppercase font-black mb-1">Total Carga</p><p className="text-2xl font-black tracking-tighter">${totalCarga.toLocaleString()}</p></div>
                                        <button className="bg-orange-600 px-10 py-4 rounded-xl font-black uppercase text-[10px] shadow-lg hover:bg-orange-500 transition-all">Confirmar</button>
                                    </div>
                                    <button type="button" onClick={() => setModal(false)} className="w-full py-2 text-slate-400 font-bold uppercase text-[10px] text-center hover:text-red-500">Cancelar</button>
                                </form>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        // --- VISTA: INVENTARIO ---
        const InventarioView = ({ facturas, cargas, onClose }) => {
            const inventario = useMemo(() => {
                const stock = {};
                PRODUCTOS_BASE.forEach(p => stock[p.id] = { ...p, ingresado: 0, despachado: 0 });
                facturas.forEach(f => { if(f.items) f.items.forEach(it => { if (stock[it.id]) stock[it.id].ingresado += (it.cantidad || 0); }); });
                cargas.forEach(c => { if(c.items) c.items.forEach(it => { if (stock[it.pId]) stock[it.pId].despachado += (it.q || 0); }); });
                return Object.values(stock).map(p => ({ ...p, actual: p.ingresado - p.despachado }));
            }, [facturas, cargas]);
            return (
                <div className="space-y-6 fade-in text-center text-left">
                    <ViewHeader title="Inventario" sub="3. Control de Stock Central" onClose={onClose} />
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {inventario.map(p => (
                            <Card key={p.id} className="group hover:scale-105 transition-all cursor-default relative overflow-hidden text-left font-black">
                                <div className="absolute top-0 left-0 w-full h-1 bg-orange-600"></div>
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">{p.nombre}</p>
                                <p className={`text-5xl font-black tracking-tighter text-center ${p.actual < 100 ? 'text-red-500' : 'text-slate-800'}`}>{p.actual.toLocaleString()}</p>
                                <p className="text-[9px] font-bold text-slate-400 mt-2 uppercase italic tracking-widest text-center">Unidades en Bodega</p>
                                <div className="mt-6 pt-6 border-t border-slate-50 flex justify-between text-[9px] font-black uppercase opacity-60 italic">
                                    <div><p>Entradas</p><p className="text-green-600">+{p.ingresado}</p></div>
                                    <div className="text-right"><p>Salidas</p><p className="text-red-500">-{p.despachado}</p></div>
                                </div>
                            </Card>
                        ))}
                    </div>
                </div>
            );
        };

        // --- VISTA: CONTABILIDAD ---
        const ContabilidadView = ({ cartera, gastos, onClose }) => {
            const movimientos = useMemo(() => {
                const items = [
                    ...cartera.map(i => ({ ...i, category: 'Ingreso', val: i.monto, ref: i.cliente || 'Venta de Ruta' })),
                    ...gastos.map(e => ({ ...e, category: 'Egreso', val: -e.monto, ref: e.detalle || 'Gasto Operativo' })),
                ];
                items.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                let balance = 0;
                return items.map(it => { balance += (it.val || 0); return { ...it, balanceAcumulado: balance }; }).reverse();
            }, [cartera, gastos]);
            return (
                <div className="space-y-6 fade-in text-left">
                    <ViewHeader title="Contabilidad" sub="4. Movimientos de Caja" onClose={onClose} />
                    <Card className="p-0 overflow-hidden shadow-xl border-none">
                        <div className="overflow-x-auto text-left">
                            <table className="w-full text-xs font-bold">
                                <thead className="bg-slate-50 font-black text-slate-500 uppercase tracking-widest text-left">
                                    <tr><th className="p-6">Fecha</th><th className="p-6">Referencia</th><th className="p-6 text-left">Ingreso</th><th className="p-6 text-left">Egreso</th><th className="p-6 text-right">Balance</th></tr>
                                </thead>
                                <tbody className="text-slate-700">
                                    {movimientos.map((m, idx) => (
                                        <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50 transition-colors font-black">
                                            <td className="p-6 text-slate-400 font-mono tracking-tighter">{m.fecha || today}</td>
                                            <td className="p-6 uppercase italic font-black text-slate-900 tracking-tight">{m.ref}</td>
                                            <td className="p-6 text-green-600 font-black text-left">{m.category === 'Ingreso' ? `+$${(m.val || 0).toLocaleString()}` : '-'}</td>
                                            <td className="p-6 text-red-500 font-black text-left">{m.category === 'Egreso' ? `-$${Math.abs(m.val || 0).toLocaleString()}` : '-'}</td>
                                            <td className="p-6 text-right font-black text-slate-900 tracking-tighter">${(m.balanceAcumulado || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        // --- VISTA: GERENCIA ---
        const GerenciaView = ({ stats, facturasProv, onClose }) => {
            const utilidad = stats.utilidadBruta || 0;
            const perc = Math.min(Math.round((utilidad / TOTAL_GASTOS_FIJOS) * 100), 100);
            const ventaMetaBruta = TOTAL_GASTOS_FIJOS / MARGEN_PROMEDIO_ESTIMADO;
            const saldoPagar = facturasProv.reduce((a, b) => a + (b.saldoPendiente || 0), 0);
            return (
                <div className="space-y-6 fade-in pb-12 text-left text-slate-800 font-bold">
                    <ViewHeader title="Gerencia" sub="5. Resumen Ejecutivo" onClose={onClose} />
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-white font-black text-left">
                        <Card className="bg-slate-900 border-none shadow-2xl relative overflow-hidden group">
                            <div className="relative z-10 text-left">
                                <p className="text-[10px] font-black uppercase opacity-50 tracking-[0.2em] mb-4 italic">Inversión Mensual Fija</p>
                                <p className="text-4xl font-black tracking-tighter">${TOTAL_GASTOS_FIJOS.toLocaleString()}</p>
                            </div>
                            <Icon name="trending-up" className="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform" size={120}/>
                        </Card>
                        <Card className="bg-orange-600 border-none shadow-2xl text-left text-left">
                            <p className="text-[10px] font-black uppercase opacity-60 tracking-[0.2em] mb-4 italic">Venta Meta (Punto Equilibrio)</p>
                            <p className="text-4xl font-black tracking-tighter">${Math.round(ventaMetaBruta).toLocaleString()}</p>
                        </Card>
                        <Card className={`${utilidad >= TOTAL_GASTOS_FIJOS ? 'bg-green-600' : 'bg-red-600'} border-none shadow-2xl text-left`}>
                            <p className="text-[10px] font-black uppercase opacity-60 tracking-[0.2em] mb-4 italic">Utilidad Neta Real</p>
                            <p className="text-4xl font-black tracking-tighter">${(utilidad - TOTAL_GASTOS_FIJOS).toLocaleString()}</p>
                        </Card>
                    </div>
                    <Card className="p-10 border-none shadow-xl text-left relative overflow-hidden font-black">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-8 relative z-10">
                            <div><h3 className="font-black text-3xl uppercase tracking-tighter text-slate-800 mb-2 italic">Avance Punto de Equilibrio</h3><p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest italic leading-relaxed">Utilidad real hoy vs Inversión mensual fija.</p></div>
                            <div className="text-center md:text-right"><span className="text-7xl font-black text-slate-800">{perc}%</span><p className="text-[9px] font-black text-orange-600 uppercase mt-2 font-black">Meta de Superación</p></div>
                        </div>
                        <div className="mt-10 w-full bg-slate-100 h-16 rounded-[40px] overflow-hidden p-2 shadow-inner border border-slate-200 text-left">
                            <div className={`progress-bar h-full rounded-[30px] flex items-center justify-center text-xs font-black text-white ${perc >= 100 ? 'bg-green-500 shadow-lg' : 'bg-gradient-to-r from-orange-400 to-orange-600'}`} style={{ width: `${perc}%` }}>
                                {perc > 15 ? `$${utilidad.toLocaleString()} USD GENERADOS` : ''}
                            </div>
                        </div>
                    </Card>
                    <Card className="border-t-8 border-red-500 shadow-md bg-red-50/30 text-left text-left font-black">
                        <div className="flex items-center gap-3 mb-6 font-black"><Icon name="alert-circle" className="text-red-600" size={24}/><h3 className="font-black text-lg uppercase tracking-tighter text-red-800 italic text-left">Cuentas por Pagar Proveedores</h3></div>
                        <div className="text-center py-12"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Saldo total adeudado a Proveedores</p><p className="text-7xl font-black text-red-600 tracking-tighter">${saldoPagar.toLocaleString()}</p></div>
                    </Card>
                </div>
            );
        };

        // --- APP RAÍZ ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('facturacion'); 
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState({ cargas: [], cartera: [], gastos: [], facturas: [] });

            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) { setLoading(false); return; }
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Error Auth:", e); }
                };
                
                initAuth();
                
                const unsubAuth = auth ? auth.onAuthStateChanged(u => { 
                    setUser(u); 
                    setLoading(false); 
                }) : null;

                const timeout = setTimeout(() => setLoading(false), 5000);
                return () => { 
                    if(unsubAuth) unsubAuth(); 
                    clearTimeout(timeout); 
                };
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const collections = ['cargas', 'cartera', 'gastos', 'facturasProveedor'];
                const unsubs = collections.map(col => {
                    const collectionPath = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
                    return collectionPath.onSnapshot(snap => {
                        const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setData(prev => ({ ...prev, [col === 'facturasProveedor' ? 'facturas' : col]: items }));
                    }, err => console.error(`Error snapshot ${col}:`, err));
                });
                return () => unsubs.forEach(fn => fn());
            }, [user]);

            const stats = useMemo(() => {
                const utilidadBruta = data.cargas.reduce((total, c) => {
                    const itemsUtilidad = (c.items || []).reduce((acc, it) => acc + (it.q * (it.pvd - it.costo)), 0);
                    return total + itemsUtilidad;
                }, 0);
                return { utilidadBruta };
            }, [data.cargas]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white border-none">
                    <div className="w-12 h-12 border-4 border-orange-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-black text-orange-600 animate-pulse uppercase tracking-[0.4em] text-[10px]">Avena Pro • Conectando...</p>
                </div>
            );

            const NavItem = ({ id, icon, label }) => (
                <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 p-5 rounded-3xl transition-all ${activeTab === id ? 'bg-orange-600 text-white shadow-xl scale-105' : 'text-slate-400 hover:bg-white hover:text-slate-600'} font-black uppercase text-[11px] tracking-widest`}>
                    <Icon name={icon} size={22}/>
                    <span className="hidden md:inline">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen md:pl-72 flex text-left">
                    <aside className="hidden md:flex fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-gray-200 flex-col p-8 z-30 shadow-sm text-left">
                        <div className="flex items-center gap-3 mb-16 text-left">
                            <div className="bg-orange-600 p-2.5 rounded-2xl text-white shadow-xl rotate-3">
                                <Icon name="package" size={28}/>
                            </div>
                            <span className="font-black text-2xl tracking-tighter italic text-orange-600 uppercase leading-none">Avena Pro</span>
                        </div>
                        <nav className="space-y-2 flex-1">
                            <NavItem id="facturacion" icon="scan" label="1. Facturación" />
                            <NavItem id="logistica" icon="truck" label="2. Logística" />
                            <NavItem id="inventario" icon="archive" label="3. Inventario" />
                            <NavItem id="contabilidad" icon="book-open" label="4. Contabilidad" />
                            <NavItem id="gerencia" icon="line-chart" label="5. Gerencia ✨" />
                        </nav>
                        <div className="mt-auto p-6 bg-slate-900 rounded-[35px] text-white text-center shadow-2xl relative overflow-hidden text-center">
                            <p className="text-[8px] font-black uppercase opacity-50 tracking-widest mb-1 italic">Contas por Pagar</p>
                            <p className="text-2xl font-black text-orange-400 tracking-tighter text-center font-black">${data.facturas.reduce((a,b) => a + (b.saldoPendiente || 0), 0).toLocaleString()}</p>
                        </div>
                    </aside>
                    <main className="p-4 md:p-12 max-w-7xl mx-auto w-full pb-24 md:pb-12 text-center md:text-left text-left">
                        {activeTab === 'facturacion' && <FacturacionView facturas={data.facturas} db={db} appId={appId} user={user} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'logistica' && <LogisticaView cargas={data.cargas} db={db} appId={appId} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'inventario' && <InventarioView facturas={data.facturas} cargas={data.cargas} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'contabilidad' && <ContabilidadView cartera={data.cartera} gastos={data.gastos} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'gerencia' && <GerenciaView stats={stats} facturasProv={data.facturas} onClose={() => setActiveTab('facturacion')} />}
                    </main>
                    <nav className="md:hidden fixed bottom-4 left-4 right-4 bg-slate-900/95 backdrop-blur-md rounded-[35px] flex justify-around p-5 z-40 border border-white/10 shadow-2xl">
                        {['facturacion', 'logistica', 'inventario', 'contabilidad', 'gerencia'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={activeTab === tab ? 'text-orange-500' : 'text-slate-500'}>
                                <Icon name={tab === 'facturacion' ? 'scan' : tab === 'logistica' ? 'truck' : tab === 'inventario' ? 'archive' : tab === 'contabilidad' ? 'book-open' : 'line-chart'} size={24}/>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
