<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avena Control Pro - Gestión Integral</title>
    <!-- Dependencias estables -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        @media print { .print-hidden { display: none !important; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; background: #fff;">
            <div style="text-align: center;">
                <div style="width: 40px; height: 40px; border: 4px solid #f97316; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                <p style="color: #444; font-weight: bold;">Iniciando Avena Control Pro...</p>
                <p style="color: #888; font-size: 12px; margin-top: 10px;">Cargando calendario y logística...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONSTANTES Y CONFIGURACIÓN ---
        const today = new Date().toISOString().split('T')[0];
        const firstDayMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
        
        const PRODUCTOS_PRESUPUESTO = [
            { id: 'p1', nombre: 'VASO 165G.', costo: 0.2695, pvd: 0.3478 },
            { id: 'p2', nombre: 'VASO 340G.', costo: 0.6086, pvd: 0.6956 },
            { id: 'p3', nombre: 'EMP. 1/2L.', costo: 0.7770, pvd: 0.8869 },
            { id: 'p4', nombre: 'EMP. 1L.', costo: 1.5973, pvd: 1.8260 },
        ];

        const VENDEDORES_PREDETERMINADOS = [
            "Diego Xavier Siavichay",
            "Byron Armando Miranda Capa"
        ];

        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'distribuidora-avena-v3';
        
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configStr) {
                const firebaseConfig = JSON.parse(configStr);
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
            }
        } catch (e) { console.error("Firebase Error:", e); }

        // --- COMPONENTES ATÓMICOS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const StatCard = ({ label, value, color, sub }) => {
            const themes = { 
                green: 'bg-green-50 text-green-700', red: 'bg-red-50 text-red-700', 
                orange: 'bg-orange-50 text-orange-700', blue: 'bg-blue-50 text-blue-700' 
            };
            return (
                <div className={`p-6 rounded-3xl border border-gray-100 shadow-sm ${themes[color]}`}>
                    <p className="text-[10px] font-black uppercase opacity-60 mb-1">{label}</p>
                    <p className="text-2xl font-black">${parseFloat(value).toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                    <p className="text-[10px] font-bold mt-2 opacity-60 uppercase">{sub}</p>
                </div>
            );
        };

        // --- COMPONENTES DE VISTA ---

        const DashboardView = ({ stats }) => {
            if (!window.Recharts) return <div className="p-10 text-center">Iniciando Gráficos...</div>;
            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <h2 className="text-3xl font-black text-gray-800 tracking-tighter">Panel de Control</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <StatCard label="Ventas Netas" value={stats.vtot} color="green" sub="Recaudación Final" />
                        <StatCard label="Gasto Operativo" value={stats.gtot + stats.ntot} color="red" sub="Gastos de Ruta + Nómina" />
                        <StatCard label="Utilidad Neto" value={stats.utNeta} color={stats.utNeta >= 0 ? 'orange' : 'red'} sub="Rentabilidad Actual" />
                    </div>
                </div>
            );
        };

        const LogisticaView = ({ cargas, personal, db, appId }) => {
            const [modal, setModal] = useState(false);
            const [retModal, setRetModal] = useState(false);
            const [active, setActive] = useState(null);
            const [items, setItems] = useState([]);
            const [tmp, setTmp] = useState({ pId: 'p1', q: 0 });
            const [info, setInfo] = useState({ empNombre: '' });
            const [isEditing, setIsEditing] = useState(false);
            const [editId, setEditId] = useState(null);
            const [filterDay, setFilterDay] = useState(today); // Nuevo: Filtro de fecha en vista
            
            // Estado para el cierre de jornada
            const [rets, setRets] = useState({});
            const [gastosRuta, setGastosRuta] = useState({ combustible: 0, alimentacion: 0, hospedaje: 0, otros: 0 });
            const [fotoDeposito, setFotoDeposito] = useState("");

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFotoDeposito(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const addProductoCarga = () => {
                if (tmp.q <= 0) return;
                const pr = PRODUCTOS_PRESUPUESTO.find(p => p.id === tmp.pId);
                const existing = items.findIndex(i => i.pId === tmp.pId);
                if (existing >= 0) {
                    const nl = [...items]; 
                    nl[existing].q += tmp.q;
                    setItems(nl);
                } else {
                    setItems([...items, { ...tmp, nombre: pr.nombre, pvd: pr.pvd, costo: pr.costo }]);
                }
                setTmp({ pId: 'p1', q: 0 });
            };

            const handleOpenModal = (carga = null) => {
                if (carga) {
                    setIsEditing(true);
                    setEditId(carga.id);
                    setInfo({ empNombre: carga.responsable });
                    setItems(carga.items || []);
                } else {
                    setIsEditing(false);
                    setEditId(null);
                    setInfo({ empNombre: '' });
                    setItems([]);
                }
                setModal(true);
            };

            const registrarSalida = async () => {
                if (items.length === 0 || !info.empNombre) return;
                const totalCargado = items.reduce((a, b) => a + (b.q * b.pvd), 0);
                
                const payload = {
                    responsable: info.empNombre, 
                    items, 
                    totalCargado,
                    estado: 'En Tránsito',
                    fechaSalida: isEditing ? (cargas.find(c => c.id === editId)?.fechaSalida || new Date().toISOString()) : new Date().toISOString()
                };

                if (isEditing) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').doc(editId).update(payload);
                } else {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').add(payload);
                }
                
                setModal(false); setItems([]); setInfo({ empNombre: '' }); setIsEditing(false);
            };

            const finalizarJornada = async () => {
                const itemsLiquidados = active.items.map(it => {
                    const retorno = rets[it.pId] || 0;
                    const vendidos = it.q - retorno;
                    const valorVenta = vendidos * it.pvd;
                    const valorCosto = vendidos * it.costo;
                    return { ...it, dev: retorno, vUnid: vendidos, vVal: valorVenta, cVal: valorCosto };
                });

                const totalVentaBruta = itemsLiquidados.reduce((a, b) => a + b.vVal, 0);
                const totalGastosRuta = Object.values(gastosRuta).reduce((a, b) => a + (parseFloat(b) || 0), 0);
                const totalCostoVenta = itemsLiquidados.reduce((a, b) => a + b.cVal, 0);
                const ventaNeta = totalVentaBruta - totalGastosRuta;

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').doc(active.id).update({
                    items: itemsLiquidados,
                    estado: 'Liquidado',
                    fechaLiquida: new Date().toISOString(),
                    ventaBruta: totalVentaBruta,
                    gastosDetalle: gastosRuta,
                    totalGastos: totalGastosRuta,
                    ventaNeta: ventaNeta,
                    costoTotalVenta: totalCostoVenta,
                    fotoDeposito: fotoDeposito
                });

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cartera').add({
                    cliente: active.responsable,
                    monto: ventaNeta,
                    tipo: 'Cobro (Cierre Ruta)',
                    fecha: new Date().toISOString()
                });

                if (totalGastosRuta > 0) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gastos').add({
                        categoria: 'Gastos de Ruta',
                        monto: totalGastosRuta,
                        detalle: `Gastos de ${active.responsable} (Cierre)`,
                        fecha: today
                    });
                }

                setRetModal(false); setActive(null); setRets({}); setGastosRuta({ combustible: 0, alimentacion: 0, hospedaje: 0, otros: 0 }); setFotoDeposito("");
            };

            // Filtrar las cargas visibles por la fecha seleccionada en el calendario local
            const visibleCargas = useMemo(() => {
                return cargas.filter(c => {
                    const fechaCarga = (c.fechaSalida || c.fecha).split('T')[0];
                    return fechaCarga === filterDay;
                });
            }, [cargas, filterDay]);

            return (
                <div className="space-y-4">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b pb-4">
                        <div>
                            <h2 className="text-2xl font-black text-gray-800 tracking-tighter leading-none">Rutas y Cargas</h2>
                            <p className="text-[10px] font-bold text-gray-400 uppercase mt-1 tracking-widest">Gestión Operativa Diaria</p>
                        </div>
                        
                        <div className="flex items-center gap-2 w-full md:w-auto">
                            <div className="relative flex-1 md:flex-none">
                                <div className="absolute inset-y-0 left-3 flex items-center pointer-events-none text-orange-500">
                                    <Icon name="calendar" size={16}/>
                                </div>
                                <input 
                                    type="date" 
                                    value={filterDay} 
                                    onChange={(e) => setFilterDay(e.target.value)}
                                    className="bg-white border-none shadow-sm rounded-2xl py-3 pl-10 pr-4 font-black text-sm text-gray-700 w-full md:w-48 focus:ring-2 ring-orange-200 transition-all outline-none"
                                />
                            </div>
                            <button onClick={() => handleOpenModal()} className="bg-orange-600 text-white p-3 rounded-2xl shadow-lg flex items-center justify-center hover:bg-orange-700 transition-all active:scale-95">
                                <Icon name="plus" size={24}/>
                            </button>
                        </div>
                    </div>

                    {visibleCargas.length === 0 ? (
                        <div className="bg-white p-16 rounded-[40px] text-center border-2 border-dashed border-gray-100">
                            <div className="bg-gray-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                                <Icon name="search" size={40}/>
                            </div>
                            <p className="font-black text-gray-400 uppercase text-xs tracking-widest">No hay rutas registradas para este día</p>
                            <button onClick={() => handleOpenModal()} className="mt-4 text-orange-500 font-bold text-xs uppercase hover:underline">Registrar una carga ahora</button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {visibleCargas.sort((a,b) => new Date(b.fechaSalida) - new Date(a.fechaSalida)).map(c => (
                                <div key={c.id} className={`bg-white p-6 rounded-[35px] border shadow-sm transition-all hover:shadow-md ${c.estado === 'Liquidado' ? 'border-l-8 border-green-500' : 'border-l-8 border-orange-400'}`}>
                                    <div className="flex justify-between items-start">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-3 rounded-2xl ${c.estado === 'Liquidado' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'}`}>
                                                <Icon name={c.estado === 'Liquidado' ? "check-circle" : "clock"} />
                                            </div>
                                            <div>
                                                <h4 className="font-black text-gray-800 leading-tight text-lg">{c.responsable}</h4>
                                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">{new Date(c.fechaSalida).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                            </div>
                                        </div>
                                        <div className={`px-3 py-1 rounded-full text-[8px] font-black uppercase ${c.estado === 'Liquidado' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                            {c.estado}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 grid grid-cols-2 gap-3">
                                        <div className="bg-gray-50 p-4 rounded-3xl">
                                            <p className="text-[8px] text-gray-400 font-bold uppercase mb-1">Carga Registrada</p>
                                            <p className="font-black text-gray-800 text-xl">${c.totalCargado?.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                        </div>
                                        {c.estado === 'Liquidado' && (
                                            <div className="bg-green-50 p-4 rounded-3xl">
                                                <p className="text-[8px] text-green-600 font-bold uppercase mb-1">Venta Neta</p>
                                                <p className="font-black text-green-700 text-xl">${c.ventaNeta?.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                            </div>
                                        )}
                                    </div>

                                    <div className="mt-6 flex flex-wrap gap-2 justify-between items-center border-t pt-4">
                                        <div className="flex gap-2">
                                            <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').doc(c.id).delete()} className="p-3 text-red-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                                                <Icon name="trash-2" size={18}/>
                                            </button>
                                            {c.estado === 'En Tránsito' && (
                                                <button onClick={() => handleOpenModal(c)} className="p-3 text-blue-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all">
                                                    <Icon name="edit-3" size={18}/>
                                                </button>
                                            )}
                                        </div>

                                        {c.estado === 'En Tránsito' ? (
                                            <button onClick={() => { setActive(c); setRetModal(true); }} className="bg-gray-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg hover:bg-black transition-all flex items-center gap-2">
                                                <Icon name="check-square" size={14}/> Liquidar / Cerrar
                                            </button>
                                        ) : (
                                            c.fotoDeposito && (
                                                <button onClick={() => {
                                                    const win = window.open();
                                                    win.document.write(`<div style="background:#000; display:flex; align-items:center; justify-content:center; height:100vh;"><img src="${c.fotoDeposito}" style="max-width:90%; border-radius:10px;"/></div>`);
                                                }} className="text-blue-500 text-[10px] font-black uppercase flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-xl">
                                                    <Icon name="image" size={14}/> Comprobante
                                                </button>
                                            )
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* MODAL SALIDA / EDICIÓN DE RUTA */}
                    {modal && (
                        <div className="fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-[45px] p-8 shadow-2xl relative animate-in zoom-in-95 duration-200">
                                <h3 className="font-black text-2xl mb-6 text-gray-800 tracking-tighter">{isEditing ? "Modificar Carga" : "Registro de Carga Inicial"}</h3>
                                
                                <div className="space-y-5">
                                    <label className="block">
                                        <span className="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">Vendedor Responsable</span>
                                        <select className="w-full bg-gray-100 p-4 rounded-3xl border-none font-bold text-gray-700 shadow-inner" value={info.empNombre} onChange={e => setInfo({...info, empNombre: e.target.value})}>
                                            <option value="">Seleccionar Vendedor...</option>
                                            {VENDEDORES_PREDETERMINADOS.map(v => <option key={v} value={v}>{v}</option>)}
                                        </select>
                                    </label>

                                    <div className="bg-orange-50 p-6 rounded-[35px] border border-orange-100 space-y-4">
                                        <p className="text-[10px] font-black text-orange-600 uppercase text-center mb-1">Añadir Productos</p>
                                        <select className="w-full bg-white p-4 rounded-2xl border-none text-sm font-bold shadow-sm" value={tmp.pId} onChange={e => setTmp({...tmp, pId: e.target.value})}>
                                            {PRODUCTOS_PRESUPUESTO.map(p => <option key={p.id} value={p.id}>{p.nombre} (${p.pvd})</option>)}
                                        </select>
                                        <div className="flex gap-2">
                                            <input type="number" className="flex-1 bg-white p-4 rounded-2xl text-sm font-black shadow-sm" placeholder="Cantidad" value={tmp.q || ''} onChange={e => setTmp({...tmp, q: parseInt(e.target.value)})}/>
                                            <button onClick={addProductoCarga} className="bg-orange-600 text-white px-8 rounded-2xl font-black text-[10px] uppercase shadow-md active:scale-95 transition-all">Añadir</button>
                                        </div>
                                    </div>

                                    <div className="max-h-40 overflow-y-auto space-y-2 pr-2 hide-scrollbar">
                                        {items.length === 0 ? (
                                            <p className="text-center text-gray-300 font-bold py-4 text-xs italic">No hay productos cargados</p>
                                        ) : items.map((it, i) => (
                                            <div key={i} className="flex justify-between items-center bg-white border border-gray-100 p-4 rounded-2xl shadow-sm">
                                                <div>
                                                    <span className="text-xs font-black text-gray-700 block leading-none">{it.nombre}</span>
                                                    <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">${it.pvd} c/u</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-sm font-black bg-orange-100 text-orange-700 px-3 py-1 rounded-xl">{it.q} u.</span>
                                                    <button onClick={() => setItems(items.filter((_, idx) => idx !== i))} className="text-red-300 hover:text-red-500"><Icon name="minus-circle" size={20}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="pt-6 border-t">
                                        <div className="flex justify-between mb-6 px-2">
                                            <span className="font-black text-gray-400 text-xs uppercase tracking-widest">Valor de Carga:</span>
                                            <span className="text-2xl font-black text-gray-800">${items.reduce((a,b) => a + (b.q * b.pvd), 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                        </div>
                                        <button onClick={registrarSalida} className="w-full bg-gray-900 text-white py-5 rounded-[25px] font-black uppercase text-xs shadow-xl active:scale-95 transition-all hover:bg-black">
                                            {isEditing ? "GUARDAR CAMBIOS" : "REGISTRAR Y SALIR A RUTA"}
                                        </button>
                                        <button onClick={() => {setModal(false); setItems([]); setIsEditing(false);}} className="w-full text-gray-400 font-bold text-[10px] uppercase mt-6 text-center block">Cerrar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CIERRE Y LIQUIDACIÓN */}
                    {retModal && active && (
                        <div className="fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center backdrop-blur-sm">
                            <div className="bg-white w-full max-lg rounded-[45px] p-10 shadow-2xl overflow-y-auto max-h-[90vh] hide-scrollbar animate-in slide-in-from-bottom-10 duration-300">
                                <h3 className="font-black text-3xl mb-1 text-gray-800 text-center tracking-tighter">Cierre de Ruta</h3>
                                <p className="text-orange-600 font-black text-sm mb-8 text-center uppercase tracking-widest">{active.responsable}</p>
                                
                                <div className="space-y-8">
                                    <section>
                                        <h4 className="text-[10px] font-black text-gray-400 uppercase mb-4 border-b pb-2 tracking-widest flex items-center gap-2"><Icon name="archive" size={14}/> 1. Devoluciones de Producto</h4>
                                        <div className="space-y-3">
                                            {active.items.map(it => (
                                                <div key={it.pId} className="flex items-center gap-4 bg-gray-50 p-5 rounded-[30px] border border-gray-100 shadow-inner">
                                                    <div className="flex-1">
                                                        <p className="text-xs font-black text-gray-700 uppercase">{it.nombre}</p>
                                                        <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Salió con: {it.q} Unid.</p>
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-[8px] font-black text-orange-400 uppercase mb-1">Retorna</p>
                                                        <input type="number" placeholder="0" className="w-20 p-3 rounded-2xl border-none shadow-sm font-black text-center text-sm focus:ring-2 ring-orange-200" onChange={e => setRets({...rets, [it.pId]: parseInt(e.target.value) || 0})}/>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h4 className="text-[10px] font-black text-gray-400 uppercase mb-4 border-b pb-2 tracking-widest flex items-center gap-2"><Icon name="dollar-sign" size={14}/> 2. Gastos de Jornada</h4>
                                        <div className="grid grid-cols-2 gap-4">
                                            {['combustible', 'alimentacion', 'hospedaje', 'otros'].map(tipo => (
                                                <div key={tipo} className="bg-red-50 p-4 rounded-[25px] border border-red-100">
                                                    <p className="text-[9px] font-black text-red-400 uppercase mb-1">{tipo}</p>
                                                    <input type="number" step="0.01" className="w-full bg-transparent border-none font-black text-red-700 text-lg focus:ring-0 p-0" placeholder="0.00" value={gastosRuta[tipo] || ''} onChange={e => setGastosRuta({...gastosRuta, [tipo]: e.target.value})}/>
                                                </div>

        const NominaView = ({ filteredData, personal, roles, db, appId }) => {

            const saveStaff = async (e) => {
                e.preventDefault();
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('personal').add(empForm);
                setModal(false); setEmpForm({ nombre: '', sueldo: 964 });
            };

            const saveDay = async (e) => {
                e.preventDefault();
                const ep = personal.find(p => p.id === dayForm.empId);
                if(!ep) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('eventosNomina').add({
                    ...dayForm, empNombre: ep.nombre, monto: parseFloat(dayForm.monto)
                });
                setModal(false);
            };

            const calculateLiquidacion = async (p) => {
                const evs = filteredData.fEventos.filter(e => e.empId === p.id);
                const sales = filteredData.fCargas.filter(c => c.responsable === p.nombre && c.estado === 'Liquidado');
                const com = sales.reduce((a,b) => a + ( (b.ventaBruta || 0) * 0.03), 0);
                const ant = evs.filter(e => e.tipo === 'Anticipo').reduce((a,b) => a + b.monto, 0);
                const des = evs.filter(e => e.tipo === 'Descuento').reduce((a,b) => a + b.monto, 0);
                const seg = evs.filter(e => e.tipo === 'IESS').reduce((a,b) => a + b.monto, 0);

                const role = {
                    empId: p.id, empNombre: p.nombre, base: p.sueldo, 
                    comisiones: com, anticipos: ant, descuentos: des, seguros: seg,
                    neto: (p.sueldo + com) - (ant + des + seg),
                    fecha: new Date().toISOString(),
                    periodo: new Date().toLocaleString('es', { month: 'long', year: 'numeric' })
                };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('roles').add(role);
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-black text-gray-800 tracking-tighter">Gestión de Personal</h2>
                        <div className="bg-white p-1 rounded-2xl shadow-sm flex text-[10px] font-bold">
                            <button onClick={() => setTab('diario')} className={`px-4 py-2 rounded-xl transition-all ${tab === 'diario' ? 'bg-orange-600 text-white shadow-md' : 'text-gray-400'}`}>Diario</button>
                            <button onClick={() => setTab('staff')} className={`px-4 py-2 rounded-xl transition-all ${tab === 'staff' ? 'bg-orange-600 text-white shadow-md' : 'text-gray-400'}`}>Plantilla</button>
                            <button onClick={() => setTab('roles')} className={`px-4 py-2 rounded-xl transition-all ${tab === 'roles' ? 'bg-orange-600 text-white shadow-md' : 'text-gray-400'}`}>Roles</button>
                        </div>
                    </div>
                    {tab === 'diario' && (
                        <div className="space-y-4">
                            <div className="flex justify-end"><button onClick={() => setModal(true)} className="bg-orange-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Registrar Evento</button></div>
                            {filteredData.fEventos.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(e => (
                                <div key={e.id} className="bg-white p-5 rounded-[25px] flex justify-between items-center border shadow-sm border-l-4 border-l-orange-500">
                                    <div><p className="font-black text-sm text-gray-800 uppercase">{e.empNombre}</p><p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">{e.tipo} • {e.fecha}</p></div>
                                    <div className="flex items-center gap-4 font-black text-gray-900">-${e.monto.toLocaleString()} <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('eventosNomina').doc(e.id).delete()} className="text-red-100 hover:text-red-500 transition-colors"><Icon name="trash-2" size={16}/></button></div>
                                </div>
                            ))}
                        </div>
                    )}
                    {tab === 'staff' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <button onClick={() => setModal(true)} className="bg-white border-2 border-dashed border-gray-200 p-8 rounded-[40px] text-gray-400 font-black flex flex-col items-center gap-2 hover:border-orange-200 hover:text-orange-300 transition-all uppercase text-[10px] tracking-widest shadow-sm"><Icon name="user-plus" /> Añadir Personal</button>
                            {personal.map(p => (
                                <div key={p.id} className="bg-white p-6 rounded-[40px] border shadow-sm flex justify-between items-center transition-all hover:shadow-md">
                                    <div><h4 className="font-black text-gray-800 text-lg">{p.nombre}</h4><p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Sueldo Base: ${p.sueldo}</p></div>
                                    <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('personal').doc(p.id).delete()} className="p-3 text-red-100 hover:text-red-500 hover:bg-red-50 rounded-xl"><Icon name="trash-2" size={18}/></button>
                                </div>
                            ))}
                        </div>
                    )}
                    {tab === 'roles' && (
                        <div className="space-y-4">
                             {personal.map(p => (
                                <div key={p.id} className="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border transition-all hover:border-blue-200">
                                    <span className="font-black text-gray-700">{p.nombre}</span>
                                    <button onClick={() => calculateLiquidacion(p)} className="bg-blue-600 text-white px-5 py-2 rounded-2xl text-[10px] font-black uppercase shadow-md hover:bg-blue-700">Liquidar Mes</button>
                                </div>
                            ))}
                        </div>
                    )}
                    {modal && (
                        <div className="fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-10 shadow-2xl relative animate-in zoom-in-95">

                                {tab === 'diario' ? (
                                    <form onSubmit={saveDay} className="space-y-5">
                                        <h3 className="font-black text-2xl mb-4 text-gray-800 tracking-tighter">Evento de Nómina</h3>
                                        <select className="w-full bg-gray-100 p-4 rounded-3xl border-none font-bold" onChange={e => setDayForm({...dayForm, empId: e.target.value})} required>
                                            <option value="">Empleado...</option>{personal.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                                        </select>
                                        <select className="w-full bg-gray-100 p-4 rounded-3xl border-none font-bold" onChange={e => setDayForm({...dayForm, tipo: e.target.value})}>
                                            <option>Anticipo</option><option>Descuento</option><option>IESS</option><option>Viático</option>
                                        </select>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" step="0.01" placeholder="Monto $" className="w-full bg-gray-100 p-4 rounded-3xl font-black border-none" onChange={e => setDayForm({...dayForm, monto: e.target.value})} required />
                                            <input type="date" className="w-full bg-gray-100 p-4 rounded-3xl text-xs font-bold border-none" value={dayForm.fecha} onChange={e => setDayForm({...dayForm, fecha: e.target.value})} />
                                        </div>
                                        <button type="submit" className="w-full bg-orange-600 text-white font-black py-5 rounded-[25px] shadow-xl uppercase text-xs mt-4">Guardar Registro</button>
                                    </form>
                                ) : (
                                    <form onSubmit={saveStaff} className="space-y-5">
                                        <h3 className="font-black text-2xl mb-4 text-gray-800 tracking-tighter">Añadir Staff</h3>
                                        <input className="w-full bg-gray-100 p-4 rounded-3xl font-bold border-none" placeholder="Nombre Completo" onChange={e => setEmpForm({...empForm, nombre: e.target.value})} required />
                                        <input type="number" className="w-full bg-gray-100 p-4 rounded-3xl font-black border-none" placeholder="Sueldo Base Mensual" onChange={e => setEmpForm({...empForm, sueldo: parseFloat(e.target.value)})} required />
                                        <button type="submit" className="w-full bg-gray-900 text-white font-black py-5 rounded-[25px] shadow-xl mt-6 uppercase text-xs">Registrar Colaborador</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CarteraView = ({ cartera, db, appId }) => {
            const t = useMemo(() => {
                const i = cartera.filter(x => x.tipo.includes('Cobro')).reduce((a,b) => a+b.monto,0);
                return { i };
            }, [cartera]);
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black text-gray-800 tracking-tighter">Caja y Movimientos</h2>
                    <div className="bg-white p-10 rounded-[50px] shadow-sm border border-l-8 border-l-green-500">
                        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Ingresos en Caja</p>
                        <p className="text-5xl font-black text-green-600 tracking-tighter">${t.i.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                    </div>
                    <div className="space-y-3">
                        {cartera.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(m => (
                            <div key={m.id} className="bg-white p-5 rounded-[30px] flex justify-between items-center border shadow-sm transition-all hover:shadow-md">
                                <div><h4 className="font-black text-gray-800 text-sm mb-1 uppercase leading-none">{m.cliente}</h4><p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">{m.tipo} • {new Date(m.fecha).toLocaleDateString()}</p></div>
                                <div className="flex items-center gap-4"><span className="font-black text-green-600 text-lg">+${m.monto.toLocaleString()}</span> <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cartera').doc(m.id).delete()} className="p-2 text-gray-100 hover:text-red-400"><Icon name="trash-2" size={14}/></button></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const GastosView = ({ gastos, db, appId }) => {
            return (
                <div className="space-y-4">
                    <h2 className="text-2xl font-black text-gray-800 tracking-tighter">Registro de Egresos</h2>
                    <div className="space-y-3">
                        {gastos.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(g => (
                            <div key={g.id} className="bg-white p-5 rounded-[30px] border-l-8 border-red-500 shadow-sm flex justify-between items-center transition-all hover:shadow-md">
                                <div><h4 className="font-black text-gray-800 text-sm mb-1 uppercase leading-none">{g.categoria}</h4><p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">{g.detalle} • {new Date(g.fecha).toLocaleDateString()}</p></div>
                                <div className="flex items-center gap-4 font-black text-xl text-red-600">-${g.monto.toLocaleString()} <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gastos').doc(g.id).delete()} className="p-2 text-gray-100 hover:text-red-500 transition-all"><Icon name="trash-2" size={18}/></button></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const BalanceView = ({ stats }) => (
            <div className="space-y-6 animate-in fade-in duration-500">
                <h2 className="text-2xl font-black text-gray-800 tracking-tighter">Resultados P&G</h2>
                <div className="bg-white p-10 rounded-[60px] border shadow-sm space-y-10">
                    <div className="flex justify-between items-center font-black text-2xl text-gray-800 border-b pb-6 tracking-tighter">
                        <span className="uppercase tracking-widest text-xs text-gray-400">Ventas Finales de Ruta:</span>
                        <span className="text-green-600 font-extrabold text-3xl">${stats.vtot.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                    </div>
                    <div className="space-y-6">
                        <div className="flex justify-between items-center text-sm text-gray-500 font-bold border-b border-gray-50 pb-4">
                            <span className="uppercase tracking-widest text-[10px]">(-) Gastos de Personal:</span>
                            <span className="text-red-500 font-black">-${stats.ntot.toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between items-center text-sm text-gray-500 font-bold border-b border-gray-50 pb-4">
                            <span className="uppercase tracking-widest text-[10px]">(-) Gastos Operativos Ruta:</span>
                            <span className="text-red-500 font-black">-${stats.gtot.toLocaleString()}</span>
                        </div>
                    </div>
                    <div className={`p-10 rounded-[60px] flex flex-col md:flex-row justify-between items-center font-black text-3xl gap-4 shadow-2xl ${stats.utNeta >= 0 ? 'bg-orange-600 text-white' : 'bg-red-600 text-white'}`}>
                        <div className="text-center md:text-left"><span className="uppercase text-[10px] tracking-widest opacity-80 mb-2 block font-black">Resultado Neto Final</span><span className="text-sm font-bold opacity-90 italic">Beneficio Operativo</span></div>
                        <span className="text-6xl tracking-tighter font-extrabold">${stats.utNeta.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                    </div>
                </div>
            </div>
        );

        // --- COMPONENTE APP (ORQUESTADOR) ---

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [dateRange, setDateRange] = useState({ from: firstDayMonth, to: today });

            // Datos centralizados
            const [cargas, setCargas] = useState([]);
            const [cartera, setCartera] = useState([]);
            const [gastos, setGastos] = useState([]);
            const [roles, setRoles] = useState([]);
            const [eventosNomina, setEventosNomina] = useState([]);
            const [personal, setPersonal] = useState([]);
            const [bodega, setBodega] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) { setLoading(false); return; }
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error(e); }
                };
                initAuth();
                const unsub = auth?.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsub && unsub();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const collections = ['cargas', 'cartera', 'gastos', 'roles', 'eventosNomina', 'personal', 'bodega'];
                const unsubs = collections.map(col => {
                    return db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col)
                        .onSnapshot(snap => {
                            const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            if (col === 'cargas') setCargas(data);
                            if (col === 'cartera') setCartera(data);
                            if (col === 'gastos') setGastos(data);
                            if (col === 'roles') setRoles(data);
                            if (col === 'eventosNomina') setEventosNomina(data);
                            if (col === 'personal') setPersonal(data);
                            if (col === 'bodega') setBodega(data);
                        }, err => console.error("Snapshot Error:", err));
                });
                return () => unsubs.forEach(fn => fn());
            }, [user]);

            const stats = useMemo(() => {
                const checkDate = (d) => {
                    const dt = d?.split('T')[0];
                    return dt >= dateRange.from && dt <= dateRange.to;
                };
                const fCargas = cargas.filter(c => checkDate(c.fechaSalida || c.fecha));
                const fGastos = gastos.filter(g => checkDate(g.fecha));
                const fRoles = roles.filter(r => checkDate(r.fecha));
                const fCartera = cartera.filter(p => checkDate(p.fecha));
                const fEventos = eventosNomina.filter(e => checkDate(e.fecha));
                
                const vtot = fCartera.reduce((a, b) => a + (b.monto || 0), 0);
                const gtot = fGastos.reduce((a, b) => a + (b.monto || 0), 0);
                const ntot = fRoles.reduce((a, b) => a + (b.neto || 0), 0);
                
                return { vtot, gtot, ntot, utNeta: vtot - (gtot + ntot), fCargas, fGastos, fRoles, fCartera, fEventos };
            }, [cargas, gastos, roles, cartera, eventosNomina, dateRange]);

            const NavBtn = ({ active, onClick, icon, label }) => (
                <button onClick={onClick} className={`w-full flex items-center gap-3 p-4 rounded-3xl transition-all text-sm ${active ? 'bg-gray-900 text-white font-black shadow-2xl' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-600'}`}>
                    <Icon name={icon} size={20} /> <span className="uppercase tracking-widest text-[10px]">{label}</span>
                </button>
            );

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-orange-600 uppercase tracking-[0.2em] bg-white">Avena Control Pro...</div>;

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0 md:pl-72 bg-gray-50">
                    <aside className="hidden md:flex fixed left-0 top-0 bottom-0 w-72 bg-white border-r flex-col p-8 z-30 shadow-sm print-hidden">
                        <div className="flex items-center gap-4 mb-12"><div className="bg-orange-600 p-3 rounded-2xl text-white shadow-xl"><Icon name="package" size={28} /></div><span className="font-black text-2xl tracking-tighter">Avena Pro</span></div>
                        <div className="space-y-2 flex-1">
                            <NavBtn active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="layout" label="Resumen" />
                            <NavBtn active={activeTab === 'logistica'} onClick={() => setActiveTab('logistica')} icon="truck" label="Rutas y Cargas" />
                            <NavBtn active={activeTab === 'cartera'} onClick={() => setActiveTab('cartera')} icon="wallet" label="Caja Central" />
                            <NavBtn active={activeTab === 'nomina'} onClick={() => setActiveTab('nomina')} icon="users" label="Personal" />
                            <NavBtn active={activeTab === 'gastos'} onClick={() => setActiveTab('gastos')} icon="file-minus" label="Egresos" />
                            <NavBtn active={activeTab === 'balance'} onClick={() => setActiveTab('balance')} icon="bar-chart-3" label="Resultados" />
                        </div>
                        <div className="mt-8 p-6 bg-gray-50 rounded-[35px] border border-gray-100 space-y-3">
                            <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest text-center border-b pb-2">Periodo de Análisis</p>
                            <input type="date" value={dateRange.from} onChange={e => setDateRange({...dateRange, from: e.target.value})} className="w-full text-[10px] p-3 rounded-2xl border-none shadow-sm font-bold bg-white focus:ring-2 ring-orange-200" />
                            <input type="date" value={dateRange.to} onChange={e => setDateRange({...dateRange, to: e.target.value})} className="w-full text-[10px] p-3 rounded-2xl border-none shadow-sm font-bold bg-white focus:ring-2 ring-orange-200" />
                        </div>
                    </aside>

                    <main className="p-4 md:p-12 max-w-7xl mx-auto w-full pb-32">
                        {activeTab === 'dashboard' && <DashboardView stats={stats} />}
                        {activeTab === 'logistica' && <LogisticaView cargas={cargas} personal={personal} db={db} appId={appId} />}
                        {activeTab === 'nomina' && <NominaView filteredData={stats} personal={personal} roles={stats.fRoles} db={db} appId={appId} />}
                        {activeTab === 'cartera' && <CarteraView cartera={stats.fCartera} db={db} appId={appId} />}
                        {activeTab === 'gastos' && <GastosView gastos={stats.fGastos} db={db} appId={appId} />}
                        {activeTab === 'balance' && <BalanceView stats={stats} />}
                    </main>

                    <nav className="md:hidden fixed bottom-4 left-4 right-4 bg-gray-900/95 backdrop-blur-lg rounded-[30px] flex justify-around p-4 z-30 shadow-2xl border border-white/10 print-hidden">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-orange-500' : 'text-gray-500'}><Icon name="layout" size={24} /></button>
                        <button onClick={() => setActiveTab('logistica')} className={activeTab === 'logistica' ? 'text-orange-500' : 'text-gray-500'}><Icon name="truck" size={24} /></button>
                        <button onClick={() => setActiveTab('cartera')} className={activeTab === 'cartera' ? 'text-orange-500' : 'text-gray-500'}><Icon name="wallet" size={24} /></button>
                        <button onClick={() => setActiveTab('balance')} className={activeTab === 'balance' ? 'text-orange-500' : 'text-gray-500'}><Icon name="bar-chart-3" size={24} /></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
