<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logística Polaca Pro v13.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FIREBASE COMPAT SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --brand: #ea580c; --bg: #000000; --card: #111111; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #ffffff; margin: 0; touch-action: manipulation; overflow-x: hidden; }
        .card-samsung { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid #222; }
        .btn-main { background: var(--brand); color: white; border-radius: 18px; font-weight: 900; height: 60px; width: 100%; border: none; cursor: pointer; text-transform: uppercase; }
        .nav-bar { background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); border-top: 1px solid #222; position: fixed; bottom: 0; left: 0; right: 0; height: 75px; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .tab { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .tab.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .status { font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 6px; padding: 4px 12px; background: #222; rounded-full; width: fit-content; margin-bottom: 10px; border-radius: 20px; }
        input { background: #1a1a1a; border-radius: 12px; padding: 14px; width: 100%; border: 1px solid #333; color: white; margin-bottom: 10px; font-size: 16px !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body class="pb-24">

    <!-- CABECERA -->
    <header class="p-6 pt-10">
        <div id="conn-status" class="status">
            <span id="dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
            <span id="txt" class="text-gray-400">CARGANDO v13.0...</span>
        </div>
        <h1 id="title" class="text-4xl font-black tracking-tight text-white">Panel</h1>
    </header>

    <main>
        <!-- PESTAÑA DASHBOARD -->
        <div id="tab-dashboard" class="tab active">
            <div class="card-samsung bg-gradient-to-br from-orange-900 to-orange-600 border-none mb-6">
                <p class="text-[10px] font-bold uppercase opacity-50 tracking-widest">Saldo Pendiente Austro</p>
                <h2 id="total-val" class="text-5xl font-black mt-2 tracking-tighter">$0.00</h2>
            </div>

            <!-- BLOQUE DE ERROR -->
            <div id="error-box" class="hidden card-samsung bg-red-950/40 border-red-900/50 mb-6">
                <h3 class="text-red-500 font-black text-xs uppercase mb-2">🚨 Error de Conexión</h3>
                <p id="error-msg" class="text-[10px] text-red-300 font-mono mb-6 leading-tight"></p>
                <button onclick="document.getElementById('modal-repair').style.display='block'" class="w-full py-4 bg-white text-black rounded-2xl font-black text-[11px] uppercase">Arreglar ahora mismo</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="card-samsung text-center">
                    <p class="text-[9px] font-bold text-gray-500 uppercase mb-1">Movimientos</p>
                    <p id="count-val" class="text-3xl font-black">0</p>
                </div>
                <div class="card-samsung text-center">
                    <p class="text-[9px] font-bold text-gray-500 uppercase mb-1">Utilidad</p>
                    <p id="util-val" class="text-2xl font-black text-green-500">$0.00</p>
                </div>
            </div>
        </div>

        <!-- PESTAÑA FACTURAS -->
        <div id="tab-facturas" class="tab">
            <button onclick="document.getElementById('modal-new').style.display='block'; window.initForm();" class="btn-main mb-8">+ NUEVA FACTURA ESPEJO</button>
            <div id="list" class="space-y-4"></div>
        </div>
    </main>

    <!-- NAVBAR -->
    <nav class="nav-bar">
        <button onclick="switchTab('dashboard')" class="flex flex-col items-center text-orange-600 font-black text-[10px] uppercase">Panel</button>
        <button onclick="switchTab('facturas')" class="flex flex-col items-center text-gray-500 font-black text-[10px] uppercase">Facturas</button>
    </nav>

    <!-- MODAL REPARACIÓN MANUAL -->
    <div id="modal-repair" class="modal">
        <div class="max-w-md mx-auto">
            <h3 class="text-xl font-black mb-2">Bypass de Emergencia</h3>
            <p class="text-xs text-gray-400 mb-6">Si Google sigue dando error, pega la <b>"Clave de API web"</b> de tu consola aquí abajo:</p>
            <input id="key-input" type="text" placeholder="Pega el código AIzaSy...">
            <button onclick="saveRepairKey()" class="btn-main mb-4">FORZAR CONEXIÓN</button>
            <button onclick="localStorage.clear(); location.reload();" class="w-full py-4 bg-gray-900 rounded-2xl text-[10px] font-black uppercase mb-4 tracking-widest">Borrar memoria vieja</button>
            <button onclick="document.getElementById('modal-repair').style.display='none'" class="w-full text-gray-600 font-bold text-xs uppercase">Cerrar</button>
        </div>
    </div>

    <!-- MODAL NUEVA FACTURA -->
    <div id="modal-new" class="modal">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between mb-8">
                <h3 class="font-black text-lg uppercase tracking-tight">Nueva Factura</h3>
                <button onclick="document.getElementById('modal-new').style.display='none'" class="text-3xl text-gray-700">✕</button>
            </div>
            <input id="f-num" type="text" placeholder="N° de Factura">
            <div id="f-items" class="bg-[#111] p-5 rounded-[24px] border border-[#222] mb-6"></div>
            <div class="bg-white text-black p-8 rounded-[32px] mb-8 shadow-2xl">
                <div class="flex justify-between items-center mb-1"><span class="text-[10px] font-bold opacity-30">IVA 15% INCLUIDO</span><span id="f-util-label" class="text-xs font-black text-orange-600">$0.00</span></div>
                <div class="flex justify-between items-center"><span class="text-xs font-black">TOTAL</span><span id="f-total-label" class="text-4xl font-black tracking-tighter leading-none">$0.00</span></div>
            </div>
            <button id="btn-sync" class="btn-main">Sincronizar con la Nube</button>
        </div>
    </div>

    <script>
        const MASTER_CONFIG = {
            apiKey: "AIzaSyBu0b-086orBd_fQut3i9n5s0W9fLpkRFI",
            authDomain: "austrodistribuidoraecuatoriana.firebaseapp.com",
            projectId: "austrodistribuidoraecuatoriana",
            storageBucket: "austrodistribuidoraecuatoriana.firebasestorage.app",
            messagingSenderId: "711061794814",
            appId: "1:711061794814:web:65b028a387ecf277ca5aaf"
        };

        const PRODUCTOS = [
            { n: 'VASO 165G.', c: 0.2696, r: 0.0782 },
            { n: 'VASO 340G.', c: 0.6087, r: 0.0870 },
            { n: 'EMP. 1/2L.', c: 0.7770, r: 0.1100 },
            { n: 'EMP. 1L.', c: 1.5974, r: 0.2287 }
        ];

        let db, auth, facturas = [];

        async function start() {
            const savedKey = localStorage.getItem('master_key_v13');
            const config = {...MASTER_CONFIG};
            if(savedKey) config.apiKey = savedKey;

            try {
                if (firebase.apps.length) return;
                firebase.initializeApp(config);
                db = firebase.firestore();
                auth = firebase.auth();

                auth.signInAnonymously().then(() => {
                    document.getElementById('dot').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
                    document.getElementById('txt').innerText = "CONEXIÓN EXITOSA v13.0";
                    document.getElementById('error-box').classList.add('hidden');
                    sync();
                }).catch(e => {
                    document.getElementById('error-box').classList.remove('hidden');
                    document.getElementById('error-msg').innerText = "GOOGLE BLOQUEA: " + e.message + "\nDOMINIO: " + window.location.hostname;
                });
            } catch (e) { console.error(e); }
        }

        function sync() {
            db.collection('artifacts/v13/public/data/facturas').onSnapshot(snap => {
                facturas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        }

        function render() {
            const total = facturas.reduce((acc, f) => acc + (f.total || 0), 0);
            const util = facturas.reduce((acc, f) => acc + (f.utilidad || 0), 0);
            document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
            document.getElementById('count-val').innerText = facturas.length;
            document.getElementById('util-val').innerText = `$${util.toFixed(2)}`;
            
            document.getElementById('list').innerHTML = facturas.map(f => `
                <div class="card-samsung border border-[#222] bg-[#080808]">
                    <div class="flex justify-between items-start mb-4">
                        <div><h4 class="font-black text-sm uppercase">#${f.numFactura}</h4></div>
                        <span class="text-2xl font-black text-orange-500 tracking-tighter">$${f.total.toFixed(2)}</span>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-4 text-[10px] font-black uppercase text-gray-500 tracking-widest">Saldo: $${f.total.toFixed(2)} — ${f.estado}</div>
                </div>
            `).join('');
        }

        window.initForm = () => {
            document.getElementById('f-items').innerHTML = PRODUCTOS.map((p, i) => `
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black uppercase text-gray-500 flex-1">${p.n}</span>
                    <input type="number" id="q-${i}" oninput="calc()" placeholder="0" class="w-24 !mb-0 text-center font-black !bg-black !border-[#333]">
                </div>
            `).join('');
            calc();
        };

        window.calc = () => {
            let sub = 0; let util = 0;
            PRODUCTOS.forEach((p, i) => {
                const q = parseFloat(document.getElementById(`q-${i}`).value) || 0;
                sub += q * p.c; util += q * p.r;
            });
            document.getElementById('f-total-label').innerText = `$${(sub * 1.15).toFixed(2)}`;
            document.getElementById('f-util-label').innerText = `Ganancia Austro: $${util.toFixed(2)}`;
        };

        document.getElementById('btn-sync').onclick = async () => {
            const n = document.getElementById('f-num').value;
            if(!n) return alert("Falta N° de Factura");
            const btn = document.getElementById('btn-sync');
            btn.disabled = true; btn.innerText = "SINCRONIZANDO...";

            let sub = 0; let util = 0;
            PRODUCTOS.forEach((p, i) => {
                const q = parseFloat(document.getElementById(`q-${i}`).value) || 0;
                sub += q * p.c; util += q * p.r;
            });

            try {
                await db.collection('artifacts/v13/public/data/facturas').add({
                    numFactura: n, total: sub * 1.15, utilidad: util, estado: 'pendiente',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('modal-new').style.display='none';
            } catch (e) { alert(e.message); }
            btn.disabled = false; btn.innerText = "Sincronizar con la Nube";
        };

        function switchTab(t) {
            document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('title').innerText = t === 'dashboard' ? 'Panel' : 'Facturas';
        }

        function saveRepairKey() {
            const k = document.getElementById('key-input').value;
            if(k) { localStorage.setItem('master_key_v13', k); location.reload(); }
        }

        window.onload = start;
    </script>
</body>
</html>
