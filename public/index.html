<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidoraustroapp - Gestión Integral ✨</title>
    <!-- Dependencias estables -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; background-color: #f1f5f9; color: #1e293b; }
        
        .invoice-paper { 
            background: white; 
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.25); 
            border: 1px solid #e2e8f0; 
            max-width: 850px;
            margin: auto;
        }
        
        .invoice-table th, .invoice-table td { 
            border: 1px solid #cbd5e1; 
            padding: 10px; 
            font-size: 0.7rem; 
        }
        
        .invoice-table th { 
            background-color: #f8fafc; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #475569;
        }

        .progress-bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hide-scrollbar::-webkit-scrollbar { width: 6px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- CONFIGURACIÓN GLOBAL ---
        const today = new Date().toISOString().split('T')[0];
        const PRODUCTOS_BASE = [
            { id: 'p1', codigo: 'P000000256', nombre: '01 EMPACADO AVENA POLACA 165G', costo: 0.269565, pvd: 0.3478, color: '#f97316' },
            { id: 'p2', codigo: 'P000000247', nombre: '02 EMPACADO AVENA POLACA 340G', costo: 0.608694, pvd: 0.6956, color: '#fb923c' },
            { id: 'p3', codigo: 'P000000005', nombre: '03 EMPACADO AVENA POLACA 500G', costo: 0.777042, pvd: 0.8869, color: '#ea580c' },
            { id: 'p4', codigo: 'P000000006', nombre: '04 EMPACADO AVENA POLACA 1000G', costo: 1.597390, pvd: 1.8260, color: '#c2410c' },
        ];

        // --- GASTOS SEGÚN IMAGEN ---
        const GASTOS_VENTAS_DETALLE = [
            { concepto: "Sueldos empleados", valor: 964.00 },
            { concepto: "Combustible", valor: 350.00 },
            { concepto: "Comisiones", valor: 600.00 },
            { concepto: "Viáticos mercado local (3*20*1)", valor: 60.00 },
            { concepto: "Viáticos mercado foráneo (1*9*20)", valor: 180.00 },
            { concepto: "Depreciación de vehículos", valor: 200.00 },
            { concepto: "Intereses préstamo vehículos", valor: 172.73 },
            { concepto: "Pago de capital vehículos", valor: 683.06 },
            { concepto: "Mantenimiento y reparaciones", valor: 100.00 },
            { concepto: "Telefonía celular", valor: 30.00 }
        ];

        const GASTOS_ADMIN_DETALLE = [
            { concepto: "Honorarios profesionales", valor: 200.00 },
            { concepto: "Suministros y materiales", valor: 10.00 },
            { concepto: "Suministros de aseo y limpieza", valor: 0.00 },
            { concepto: "Gastos Varios", valor: 30.00 }
        ];

        const TOTAL_VENTAS = 3339.80;
        const TOTAL_ADMIN = 240.00;
        const TOTAL_GASTOS_FIJOS = 3579.80;
        const MARGEN_PROMEDIO_ESTIMADO = 0.14; 
        const VENDEDORES = ["Diego Xavier Siavichay", "Byron Armando Miranda Capa"];

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        if (firebaseConfig && !firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebaseConfig ? firebase.firestore() : null;
        const auth = firebaseConfig ? firebase.auth() : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'distribuidaustroapp-v1';

        // --- COMPONENTES UI GLOBALES ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white p-6 rounded-[32px] border border-gray-200 shadow-sm ${className}`}>{children}</div>
        );

        const ViewHeader = ({ title, sub, onClose }) => (
            <div className="flex justify-between items-center border-b pb-6 mb-6 text-left">
                <div>
                    <h2 className="text-3xl font-black text-slate-800 tracking-tighter uppercase leading-none">{title}</h2>
                    {sub && <p className="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">{sub}</p>}
                </div>
                <button onClick={onClose} title="Volver" className="p-3 bg-slate-100 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all shadow-sm">
                    <Icon name="x" size={24}/>
                </button>
            </div>
        );

        // --- VISTAS ---

        const FacturacionView = ({ facturas, db, appId, user, onClose }) => {
            const [modalNueva, setModalNueva] = useState(false);
            const [modalPago, setModalPago] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [form, setForm] = useState({
                numFactura: '',
                fecha: today,
                items: PRODUCTOS_BASE.map(p => ({ ...p, cantidad: 0 })),
                respaldoDoc: null
            });
            const [pagoForm, setPagoForm] = useState({ monto: '', fecha: today, comprobante: null });

            const calc = useMemo(() => {
                const subtotal = form.items.reduce((acc, it) => acc + (it.cantidad * it.costo), 0);
                const iva = subtotal * 0.15;
                const total = subtotal + iva;
                const utilidad = form.items.reduce((acc, it) => acc + (it.cantidad * (it.pvd - it.costo)), 0);
                return { subtotal, iva, total, utilidad };
            }, [form.items]);

            const handleGuardarFactura = async (e) => {
                if (e) e.preventDefault();
                if (!user) return console.error("No autenticado");
                if (!form.numFactura) return console.error("Falta número de factura");
                if (!db) return console.error("Base de datos no disponible");
                
                setIsSaving(true);
                try {
                    const data = {
                        numFactura: form.numFactura,
                        fecha: form.fecha,
                        items: form.items.map(it => ({ id: it.id, nombre: it.nombre, cantidad: it.cantidad, costo: it.costo, total: it.cantidad * it.costo })),
                        total: calc.total,
                        saldoPendiente: calc.total,
                        utilidadCompra: calc.utilidad,
                        estado: 'Pendiente',
                        respaldo: form.respaldoDoc,
                        createdAt: new Date().toISOString()
                    };

                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturasProveedor').add(data);
                    setModalNueva(false);
                    resetForm();
                } catch (err) {
                    console.error("Error al guardar factura:", err);
                } finally {
                    setIsSaving(false);
                }
            };

            const registrarAbono = async (factura) => {
                if (!user || !db) return;
                const monto = parseFloat(pagoForm.monto);
                if (isNaN(monto) || monto <= 0) return;
                try {
                    const nuevoSaldo = Math.max(0, factura.saldoPendiente - monto);
                    const nuevoEstado = nuevoSaldo <= 0.05 ? 'Cancelado' : 'Abonado';
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturasProveedor').doc(factura.id).update({
                        saldoPendiente: nuevoSaldo, estado: nuevoEstado
                    });
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gastos').add({
                        fecha: pagoForm.fecha, monto, categoria: 'Pago Proveedor', detalle: `Pago Fact #${factura.numFactura}`, comprobante: pagoForm.comprobante
                    });
                    setModalPago(null);
                    setPagoForm({ monto: '', fecha: today, comprobante: null });
                } catch (err) {
                    console.error("Error al abonar:", err);
                }
            };

            const resetForm = () => setForm({ numFactura: '', fecha: today, items: PRODUCTOS_BASE.map(p => ({ ...p, cantidad: 0 })), respaldoDoc: null });

            return (
                <div className="space-y-6 fade-in text-left">
                    <ViewHeader title="Facturación" sub="1. Registro e Ingresos Manuales" onClose={onClose} />
                    <div className="flex justify-end mb-4 text-left">
                        <button onClick={() => setModalNueva(true)} className="bg-orange-600 text-white px-8 py-4 rounded-2xl shadow-xl flex items-center gap-2 font-black uppercase text-xs hover:scale-105 transition-all">
                            <Icon name="file-plus" size={20}/> Nueva Factura Espejo
                        </button>
                    </div>

                    <div className="space-y-4">
                        {[...facturas].sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(f => (
                            <Card key={f.id} className={`flex flex-col md:flex-row justify-between items-center border-l-8 ${f.estado === 'Cancelado' ? 'border-l-green-500' : 'border-l-slate-800'} gap-4`}>
                                <div className="text-left flex-1">
                                    <h4 className="font-black text-slate-800 uppercase tracking-tighter text-lg leading-tight">Factura #{f.numFactura}</h4>
                                    <div className="flex gap-4 mt-1">
                                        <span className="text-[10px] font-black uppercase text-slate-400">{f.fecha}</span>
                                        <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded-full ${f.estado === 'Cancelado' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>{f.estado}</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-8 text-center px-4 md:border-l md:border-r border-slate-100 w-full md:w-auto font-black text-left">
                                    <div><p className="text-[8px] uppercase font-bold opacity-40 mb-1">Total</p><p className="text-slate-800">${f.total?.toFixed(2)}</p></div>
                                    <div><p className="text-[8px] uppercase font-bold opacity-40 mb-1">Pendiente</p><p className={`${f.saldoPendiente > 0 ? 'text-red-500' : 'text-green-600'}`}>${f.saldoPendiente?.toFixed(2)}</p></div>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto justify-end">
                                    {f.estado !== 'Cancelado' && (
                                        <button onClick={() => setModalPago(f)} className="p-4 bg-green-50 text-green-600 rounded-2xl hover:bg-green-100 shadow-sm"><Icon name="banknote" size={24}/></button>
                                    )}
                                    <button onClick={() => { if(confirm('¿Desea eliminar este registro?')) db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturasProveedor').doc(f.id).delete() }} className="p-4 text-slate-200 hover:text-red-500 transition-colors">
                                        <Icon name="trash-2" size={24}/>
                                    </button>
                                </div>
                            </Card>
                        ))}
                    </div>

                    {modalNueva && (
                        <div className="fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-2 sm:p-10 backdrop-blur-sm overflow-hidden">
                            <div className="bg-white w-full max-w-5xl h-full max-h-[95vh] rounded-xl flex flex-col overflow-hidden relative shadow-2xl">
                                <button onClick={() => setModalNueva(false)} className="absolute top-4 right-4 z-10 p-3 bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-600 rounded-full transition-all">
                                    <Icon name="x" size={24}/>
                                </button>
                                <div className="flex-1 overflow-y-auto p-4 sm:p-10 hide-scrollbar">
                                    <div className="invoice-paper p-6 sm:p-10 border rounded-sm">
                                        <div className="flex flex-col md:flex-row justify-between items-start mb-10 pb-10 border-b-2 border-slate-900">
                                            <div className="text-left space-y-1">
                                                <h3 className="text-xl font-black text-slate-900 uppercase italic leading-none mb-3 tracking-tighter">LÁCTEOS LA POLACA GUSTALAC S.A.</h3>
                                                <div className="space-y-0.5 text-slate-500 font-bold uppercase text-[9px]">
                                                    <p>VIA QUININDE MARGEN DERECHO KM13</p>
                                                    <p>RUC: 1792039754001</p>
                                                    <p>TELÉFONO: 022765404</p>
                                                </div>
                                            </div>
                                            <div className="w-full md:w-64 mt-6 md:mt-0 space-y-3 text-left">
                                                <div className="bg-slate-900 text-white p-3 rounded">
                                                    <p className="text-[8px] font-black uppercase opacity-60">FACTURA Nº</p>
                                                    <input required placeholder="003-102-0000XXXXX" className="bg-transparent text-lg font-black border-none outline-none w-full placeholder:text-slate-700" value={form.numFactura} onChange={e => setForm({...form, numFactura: e.target.value})} />
                                                </div>
                                                <div className="bg-slate-50 border p-3 rounded">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase">FECHA EMISIÓN</p>
                                                    <input type="date" required className="bg-transparent font-black border-none outline-none w-full" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 text-[10px] font-bold text-slate-600 uppercase text-left italic">
                                            <div className="space-y-1 border-r pr-8 border-slate-100">
                                                <p className="text-slate-400 mb-2 font-black italic">Adquiriente:</p>
                                                <p className="text-slate-900 font-black text-xs tracking-tight uppercase">DISTRIBUIDORA AUSTROECUATORIANA S.A.S.</p>
                                                <p>RUC: 0195174555001</p>
                                                <p>CIUDAD: CUENCA</p>
                                            </div>
                                            <div>
                                                <p className="text-slate-400 mb-2 font-black italic">Cargar Respaldo:</p>
                                                <input type="file" className="text-[9px] w-full" onChange={e => {
                                                    const r = new FileReader(); r.onload = () => setForm({...form, respaldoDoc: r.result});
                                                    if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
                                                }} />
                                            </div>
                                        </div>

                                        <div className="overflow-x-auto mb-10">
                                            <table className="w-full invoice-table">
                                                <thead>
                                                    <tr>
                                                        <th>Cod.</th>
                                                        <th>Descripción</th>
                                                        <th className="w-24 text-center">Cant.</th>
                                                        <th className="w-32 text-right">Precio Uni.</th>
                                                        <th className="w-32 text-right">Total</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {form.items.map((it, idx) => (
                                                        <tr key={it.id}>
                                                            <td className="font-mono text-slate-400 text-[10px]">{it.codigo}</td>
                                                            <td className="text-left font-black text-slate-800 text-xs uppercase">{it.nombre}</td>
                                                            <td className="p-0">
                                                                <input 
                                                                    type="number" 
                                                                    className="w-full text-center py-3 font-black bg-orange-50 border-none focus:ring-0" 
                                                                    value={it.cantidad === 0 ? '' : it.cantidad} 
                                                                    placeholder=""
                                                                    onChange={e => {
                                                                        const ni = [...form.items];
                                                                        ni[idx].cantidad = e.target.value === '' ? 0 : parseInt(e.target.value);
                                                                        setForm({...form, items: ni});
                                                                    }} 
                                                                />
                                                            </td>
                                                            <td className="text-right font-mono text-slate-500">${it.costo.toFixed(4)}</td>
                                                            <td className="text-right font-black text-slate-900">${(it.cantidad * it.costo).toFixed(2)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="flex flex-col md:flex-row justify-between gap-10">
                                            <div className="flex-1 space-y-4 text-left">
                                                <div className="bg-slate-50 p-5 rounded border w-full italic">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase mb-2">Vendedor:</p>
                                                    <p className="text-[10px] font-bold text-slate-600 uppercase">ARIAS JAIME</p>
                                                </div>
                                                <div className="bg-green-50 p-6 rounded-xl border border-green-200">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <Icon name="trending-up" className="text-green-600" size={18}/>
                                                        <p className="text-[10px] font-black text-green-700 uppercase tracking-widest">Utilidad Estimada ✨</p>
                                                    </div>
                                                    <p className="text-4xl font-black text-green-800 tracking-tighter">${calc.utilidad.toFixed(2)}</p>
                                                </div>
                                            </div>
                                            <div className="w-full md:w-80 space-y-2 text-left">
                                                <div className="flex justify-between items-center p-4 bg-slate-900 text-white rounded mt-4 shadow-xl">
                                                    <span className="text-xs font-black uppercase tracking-tighter">VALOR TOTAL</span>
                                                    <span className="text-3xl font-black tracking-tighter">${calc.total.toFixed(2)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 border-t flex justify-end gap-4 shadow-inner">
                                    <button type="button" onClick={() => { resetForm(); setModalNueva(false); }} className="px-8 py-4 bg-white border border-slate-300 rounded-2xl font-black uppercase text-[10px] text-slate-500 hover:bg-red-50 hover:text-red-600 transition-all">Cancelar</button>
                                    <button onClick={handleGuardarFactura} disabled={isSaving} className={`px-10 py-4 ${isSaving ? 'bg-slate-400' : 'bg-slate-900 hover:bg-orange-600'} text-white rounded-2xl font-black uppercase text-[10px] shadow-xl transition-all`}>
                                        {isSaving ? 'Grabando...' : 'Grabar Factura ✨'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LogisticaView = ({ cargas, db, appId, user, onClose }) => {
            const [modal, setModal] = useState(false);
            const [form, setForm] = useState({ vendedor: '', items: PRODUCTOS_BASE.map(p => ({ ...p, q: 0 })) });
            
            const handleGuardarCarga = async () => {
                if (!user || !db) return;
                const totalCargado = form.items.reduce((a, b) => a + (b.q * b.pvd), 0);
                if (totalCargado <= 0) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').add({
                        responsable: form.vendedor || "Ruta General",
                        fecha: today,
                        totalCargado,
                        estado: 'En Ruta',
                        items: form.items.map(it => ({ pId: it.id, nombre: it.nombre, q: it.q, pvd: it.pvd, cost: it.costo }))
                    });
                    setModal(false);
                    setForm({ vendedor: '', items: PRODUCTOS_BASE.map(p => ({ ...p, q: 0 })) });
                } catch(e) { console.error(e); }
            };

            return (
                <div className="space-y-6 fade-in text-left">
                    <ViewHeader title="Logística" sub="2. Despachos y Jornada" onClose={onClose} />
                    <div className="flex justify-end mb-4 text-left"><button onClick={() => setModal(true)} className="bg-orange-600 text-white p-3 rounded-2xl shadow-xl flex items-center gap-2 font-black uppercase text-xs"><Icon name="plus"/> Nuevo Despacho</button></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {cargas.map(c => (
                            <Card key={c.id} className="border-l-8 border-l-orange-400">
                                <div className="flex justify-between items-start text-left">
                                    <div><h4 className="font-black text-slate-800 uppercase text-sm tracking-tighter">{c.responsable}</h4><span className="text-[9px] font-black uppercase text-slate-400 mt-1 block">{c.estado} • {c.fecha}</span></div>
                                    <div className="text-right font-black"><p className="text-[8px] uppercase opacity-40">Valor</p><p className="text-slate-800 text-xl tracking-tighter">${(c.totalCargado || 0).toLocaleString()}</p></div>
                                </div>
                            </Card>
                        ))}
                    </div>
                    {modal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <Card className="max-w-2xl w-full text-left">
                                <h3 className="text-xl font-black mb-4 uppercase italic">Despacho de Ruta</h3>
                                <div className="space-y-4">
                                    <select className="w-full p-4 bg-slate-50 rounded-xl font-bold uppercase text-xs" value={form.vendedor} onChange={e => setForm({...form, vendedor: e.target.value})}>
                                        <option value="">Seleccione Vendedor</option>
                                        {VENDEDORES.map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                    <div className="space-y-2 max-h-60 overflow-y-auto pr-2 hide-scrollbar">
                                        {form.items.map((it, idx) => (
                                            <div key={it.id} className="flex justify-between items-center border-b pb-2">
                                                <span className="text-[10px] font-black uppercase flex-1">{it.nombre}</span>
                                                <input type="number" placeholder="" className="w-24 p-2 bg-orange-50 rounded text-center font-black" value={it.q === 0 ? '' : it.q} onChange={e => {
                                                    const ni = [...form.items]; ni[idx].q = e.target.value === '' ? 0 : parseInt(e.target.value); setForm({...form, items: ni});
                                                }} />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-end gap-2 pt-4">
                                        <button onClick={() => setModal(false)} className="px-6 py-2 font-bold uppercase text-xs">Cerrar</button>
                                        <button onClick={handleGuardarCarga} className="bg-orange-600 text-white px-8 py-3 rounded-xl font-black uppercase text-xs">Despachar</button>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const InventarioView = ({ facturas, cargas, onClose }) => {
            const inventario = useMemo(() => {
                const stock = {};
                PRODUCTOS_BASE.forEach(p => stock[p.id] = { ...p, ingresado: 0, despachado: 0 });
                facturas.forEach(f => { if(f.items) f.items.forEach(it => { if (stock[it.id]) stock[it.id].ingresado += (it.cantidad || 0); }); });
                cargas.forEach(c => { if(c.items) c.items.forEach(it => { if (stock[it.pId]) stock[it.pId].despachado += (it.q || 0); }); });
                return Object.values(stock).map(p => ({ ...p, actual: p.ingresado - p.despachado }));
            }, [facturas, cargas]);
            return (
                <div className="space-y-6 fade-in text-left">
                    <ViewHeader title="Inventario" sub="3. Control de Stock Central" onClose={onClose} />
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {inventario.map(p => (
                            <Card key={p.id} className="relative overflow-hidden text-left">
                                <div className="absolute top-0 left-0 w-full h-1 bg-orange-600"></div>
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-4 leading-tight">{p.nombre}</p>
                                <p className={`text-5xl font-black tracking-tighter text-center ${p.actual < 100 ? 'text-red-500' : 'text-slate-800'}`}>{p.actual.toLocaleString()}</p>
                            </Card>
                        ))}
                    </div>
                </div>
            );
        };

        const ContabilidadView = ({ cartera, gastos, onClose }) => {
            const movimientos = useMemo(() => {
                const items = [
                    ...cartera.map(i => ({ ...i, category: 'Ingreso', val: i.monto, ref: i.cliente || 'Venta de Ruta' })),
                    ...gastos.map(e => ({ ...e, category: 'Egreso', val: -e.monto, ref: e.detalle || 'Gasto Operativo' })),
                ];
                items.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                let balance = 0;
                return items.map(it => { balance += (it.val || 0); return { ...it, balanceAcumulado: balance }; }).reverse();
            }, [cartera, gastos]);
            return (
                <div className="space-y-6 fade-in text-left">
                    <ViewHeader title="Contabilidad" sub="4. Movimientos de Caja" onClose={onClose} />
                    <Card className="p-0 overflow-hidden border-none shadow-xl">
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs font-bold">
                                <thead className="bg-slate-50 text-slate-500 uppercase font-black text-left">
                                    <tr><th className="p-6">Fecha</th><th className="p-6">Detalle</th><th className="p-6">Monto</th><th className="p-6 text-right">Balance</th></tr>
                                </thead>
                                <tbody>
                                    {movimientos.map((m, idx) => (
                                        <tr key={idx} className="border-b border-slate-50">
                                            <td className="p-6 text-slate-400 font-mono">{m.fecha}</td>
                                            <td className="p-6 font-black uppercase italic">{m.ref}</td>
                                            <td className={`p-6 font-black ${m.val > 0 ? 'text-green-600' : 'text-red-500'}`}>{m.val > 0 ? '+' : ''}${m.val.toFixed(2)}</td>
                                            <td className="p-6 text-right font-black">${m.balanceAcumulado.toFixed(2)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        const GerenciaView = ({ stats, facturasProv, onClose }) => {
            const utilidad = stats.utilidadBruta || 0;
            const perc = Math.min(Math.round((utilidad / TOTAL_GASTOS_FIJOS) * 100), 100);
            return (
                <div className="space-y-6 fade-in pb-12 text-left text-slate-800 font-bold">
                    <ViewHeader title="Gerencia" sub="5. Resumen Ejecutivo" onClose={onClose} />
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-white font-black">
                        <Card className="bg-slate-900 border-none shadow-2xl text-left">
                            <p className="text-[10px] font-black uppercase opacity-50 mb-4 italic tracking-widest">Inversión Fija</p>
                            <p className="text-4xl tracking-tighter">${TOTAL_GASTOS_FIJOS.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                        </Card>
                        <Card className="bg-orange-600 border-none shadow-2xl text-left">
                            <p className="text-[10px] font-black uppercase opacity-60 mb-4 italic tracking-widest">Utilidad Bruta</p>
                            <p className="text-4xl tracking-tighter">${utilidad.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                        </Card>
                        <Card className={`${utilidad >= TOTAL_GASTOS_FIJOS ? 'bg-green-600' : 'bg-red-600'} border-none shadow-2xl text-left`}>
                            <p className="text-[10px] font-black uppercase opacity-60 mb-4 italic tracking-widest">Resultado Neto</p>
                            <p className="text-4xl tracking-tighter">${(utilidad - TOTAL_GASTOS_FIJOS).toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                        </Card>
                    </div>

                    <Card className="p-10 border-none shadow-xl text-left relative overflow-hidden">
                        <h3 className="font-black text-3xl uppercase tracking-tighter italic mb-4">Punto de Equilibrio: {perc}%</h3>
                        <div className="w-full bg-slate-100 h-16 rounded-[40px] overflow-hidden p-2 shadow-inner border border-slate-200">
                            <div className={`progress-bar h-full rounded-[30px] flex items-center justify-center text-xs font-black text-white ${perc >= 100 ? 'bg-green-500' : 'bg-gradient-to-r from-orange-400 to-orange-600'}`} style={{ width: `${perc}%` }}>
                                {perc > 15 ? `$${utilidad.toLocaleString()} GENERADOS` : ''}
                            </div>
                        </div>
                    </Card>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <Card className="bg-white border border-slate-200">
                            <h3 className="font-black uppercase text-sm mb-4 italic">Gastos de Ventas (${TOTAL_VENTAS.toFixed(2)})</h3>
                            <div className="space-y-2">
                                {GASTOS_VENTAS_DETALLE.map((i, idx) => (
                                    <div key={idx} className="flex justify-between text-[10px] uppercase font-bold border-b pb-2 border-dashed border-slate-100 italic">
                                        <span>{i.concepto}</span><span>${i.valor.toFixed(2)}</span>
                                    </div>
                                ))}
                            </div>
                        </Card>
                        <Card className="bg-white border border-slate-200">
                            <h3 className="font-black uppercase text-sm mb-4 italic">Gastos Administrativos (${TOTAL_ADMIN.toFixed(2)})</h3>
                            <div className="space-y-2">
                                {GASTOS_ADMIN_DETALLE.map((i, idx) => (
                                    <div key={idx} className="flex justify-between text-[10px] uppercase font-bold border-b pb-2 border-dashed border-slate-100 italic">
                                        <span>{i.concepto}</span><span>${i.valor.toFixed(2)}</span>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        // --- APP RAÍZ ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('facturacion'); 
            const [loading, setLoading] = useState(true);
            const [cargas, setCargas] = useState([]);
            const [cartera, setCartera] = useState([]);
            const [gastos, setGastos] = useState([]);
            const [facturasProv, setFacturasProv] = useState([]);

            useEffect(() => {
                if (!auth) { setLoading(false); return; }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Error Auth:", e); }
                };
                initAuth();
                const unsubAuth = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const cols = ['cargas', 'cartera', 'gastos', 'facturasProveedor'];
                const unsubs = cols.map(col => {
                    return db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col)
                        .onSnapshot(snap => {
                            const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            if (col === 'cargas') setCargas(data);
                            if (col === 'cartera') setCartera(data);
                            if (col === 'gastos') setGastos(data);
                            if (col === 'facturasProveedor') setFacturasProv(data);
                        });
                });
                return () => unsubs.forEach(fn => fn());
            }, [user]);

            const stats = useMemo(() => {
                const utilidadBruta = cargas.reduce((acc, c) => {
                    const itemsUtil = (c.items || []).reduce((sub, it) => sub + (it.q * (it.pvd - (it.cost || it.costo))), 0);
                    return acc + itemsUtil;
                }, 0);
                return { utilidadBruta };
            }, [cargas]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-12 h-12 border-4 border-orange-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-black text-orange-600 animate-pulse uppercase tracking-[0.4em] text-[10px]">Distribuidora Austro App • Cargando...</p>
                </div>
            );

            const NavItem = ({ id, icon, label }) => (
                <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 p-5 rounded-3xl transition-all ${activeTab === id ? 'bg-orange-600 text-white shadow-xl scale-105' : 'text-slate-400 hover:bg-white hover:text-slate-600'} font-black uppercase text-[11px] tracking-widest`}>
                    <Icon name={icon} size={22}/><span className="hidden md:inline">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen md:pl-72 flex text-left">
                    <aside className="hidden md:flex fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-gray-200 flex-col p-8 z-30 shadow-sm">
                        <div className="flex items-center gap-3 mb-16 text-left">
                            <div className="bg-orange-600 p-2.5 rounded-2xl text-white shadow-xl rotate-3"><Icon name="package" size={28}/></div>
                            <span className="font-black text-xl tracking-tighter italic text-orange-600 uppercase leading-none leading-tight">Distribuidora Austroapp</span>
                        </div>
                        <nav className="space-y-2 flex-1">
                            <NavItem id="facturacion" icon="scan" label="1. Facturación" />
                            <NavItem id="logistica" icon="truck" label="2. Logística" />
                            <NavItem id="inventario" icon="archive" label="3. Inventario" />
                            <NavItem id="contabilidad" icon="book-open" label="4. Contabilidad" />
                            <NavItem id="gerencia" icon="line-chart" label="5. Gerencia ✨" />
                        </nav>
                        <div className="mt-auto p-6 bg-slate-900 rounded-[35px] text-white text-center shadow-2xl relative overflow-hidden">
                            <p className="text-[8px] font-black uppercase opacity-50 mb-1 italic">A pagar Proveedor</p>
                            <p className="text-2xl font-black text-orange-400 tracking-tighter">${facturasProv.reduce((a,b) => a + (b.saldoPendiente || 0), 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                        </div>
                    </aside>
                    <main className="p-4 md:p-12 max-w-7xl mx-auto w-full pb-24 md:pb-12 text-left">
                        {activeTab === 'facturacion' && <FacturacionView facturas={facturasProv} db={db} appId={appId} user={user} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'logistica' && <LogisticaView cargas={cargas} db={db} appId={appId} user={user} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'inventario' && <InventarioView facturas={facturasProv} cargas={cargas} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'contabilidad' && <ContabilidadView cartera={cartera} gastos={gastos} onClose={() => setActiveTab('gerencia')} />}
                        {activeTab === 'gerencia' && <GerenciaView stats={stats} facturasProv={facturasProv} onClose={() => setActiveTab('facturacion')} />}
                    </main>
                    <nav className="md:hidden fixed bottom-4 left-4 right-4 bg-slate-900/95 backdrop-blur-md rounded-[35px] flex justify-around p-5 z-40 border border-white/10 shadow-2xl">
                        {['facturacion', 'logistica', 'inventario', 'contabilidad', 'gerencia'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={activeTab === tab ? 'text-orange-500' : 'text-slate-500'}>
                                <Icon name={tab === 'facturacion' ? 'scan' : tab === 'logistica' ? 'truck' : tab === 'inventario' ? 'archive' : tab === 'contabilidad' ? 'book-open' : 'line-chart'} size={24}/>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
