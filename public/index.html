<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Polaca 1.1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-active { color: #2563eb; border-top: 2px solid #2563eb; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 9999px; font-weight: 700; text-transform: uppercase; }
        .status-pendiente { background-color: #fef3c7; color: #92400e; }
        .status-abonado { background-color: #dbeafe; color: #1e40af; }
        .status-cancelado { background-color: #d1fae5; color: #065f46; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <div id="app">
        <header class="bg-white border-b p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">Logística Polaca <span class="text-blue-600">1.1.2</span></h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Control Maestro</p>
                </div>
            </div>
            <div id="status-indicator" class="text-[9px] font-bold px-2 py-1 rounded">CONECTANDO...</div>
        </header>

        <main class="max-w-md mx-auto p-4" id="main-content">
            <div class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="text-xs text-gray-400 mt-4 font-bold loading-pulse">INICIANDO SESIÓN SEGURA...</p>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-2xl">
            <button onclick="switchTab('dashboard')" class="nav-btn flex flex-col items-center w-full py-1 text-gray-400" id="btn-dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2"/></svg>
                <span class="text-[10px] mt-1 font-medium">Inicio</span>
            </button>
            <button onclick="switchTab('logistica')" class="nav-btn flex flex-col items-center w-full py-1 text-gray-400" id="btn-logistica">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2"/></svg>
                <span class="text-[10px] mt-1 font-medium">Carga</span>
            </button>
            <button onclick="switchTab('rutas')" class="nav-btn flex flex-col items-center w-full py-1 text-gray-400" id="btn-rutas">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" stroke-width="2" /></svg>
                <span class="text-[10px] mt-1 font-medium">Admin</span>
            </button>
        </nav>
    </div>

    <script>
        // --- CONFIGURACIÓN GLOBAL ---
        const PRODUCTOS = [
            { id: 'P000000256', nombre: 'AVENA POLACA 165G', precio: 0.269565 },
            { id: 'P000000247', nombre: 'AVENA POLACA 340G', precio: 0.608694 },
            { id: 'P000000005', nombre: 'AVENA POLACA 500G', precio: 0.777042 },
            { id: 'P000000006', nombre: 'AVENA POLACA 1000G', precio: 1.597390 }
        ];

        let db, auth, appId, user;
        let facturas = [];
        let activeTab = 'dashboard';
        let isDemoMode = false;

        // --- INICIALIZACIÓN ---
        async function initApp() {
            const indicator = document.getElementById('status-indicator');
            const main = document.getElementById('main-content');
            
            try {
                appId = 'polaca-logistica-v1';

                // CONFIGURACIÓN REAL APLICADA
                const firebaseConfig = {
                    apiKey: "AIzaSyBu0b-086orBd_fQut3i9n5s0W9fLpkRFI",
                    authDomain: "austrodistribuidoraecuatoriana.firebaseapp.com",
                    projectId: "austrodistribuidoraecuatoriana",
                    storageBucket: "austrodistribuidoraecuatoriana.firebasestorage.app",
                    messagingSenderId: "711061794814",
                    appId: "1:711061794814:web:65b028a387ecf277ca5aaf"
                };

                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();

                // Autenticación Anónima
                await auth.signInAnonymously();
                
                auth.onAuthStateChanged(u => {
                    user = u;
                    if (user) {
                        indicator.innerText = "SISTEMA ONLINE";
                        indicator.className = "text-[9px] font-bold px-2 py-1 rounded bg-green-100 text-green-600";
                        escucharFacturas();
                    }
                });

            } catch (e) {
                console.warn("Entrando a Modo Demo por error:", e.message);
                isDemoMode = true;
                indicator.innerText = "MODO LOCAL (DEMO)";
                indicator.className = "text-[9px] font-bold px-2 py-1 rounded bg-yellow-100 text-yellow-600";
                
                const localData = localStorage.getItem('polaca_demo_v112');
                if (localData) facturas = JSON.parse(localData);
                render();
            }
        }

        function escucharFacturas() {
            if (!user || isDemoMode) return;
            const path = `artifacts/${appId}/public/data/facturas`;
            
            db.collection(path).onSnapshot(snapshot => {
                const data = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(),
                    sortTime: doc.data().timestamp?.seconds || new Date(doc.data().fechaEmision).getTime() / 1000 || 0
                }));
                facturas = data.sort((a, b) => b.sortTime - a.sortTime);
                render();
            }, (error) => {
                console.error("Error de permisos:", error);
                document.getElementById('main-content').innerHTML = `
                    <div class="bg-red-50 p-6 rounded-3xl border border-red-200 mt-10">
                        <h2 class="text-red-700 font-bold mb-2">Error de Permisos</h2>
                        <p class="text-red-600 text-xs">Asegúrate de haber habilitado Firestore y la Autenticación Anónima en la consola de Firebase.</p>
                    </div>
                `;
            });
        }

        function switchTab(tab) {
            activeTab = tab;
            render();
        }

        function updateTotals() {
            let subtotal = 0;
            PRODUCTOS.forEach((p, i) => {
                const val = document.getElementById(`cant-${i}`)?.value || 0;
                subtotal += parseFloat(val) * p.precio;
            });
            const iva = subtotal * 0.15;
            const total = subtotal + iva;

            if (document.getElementById('res-total')) {
                document.getElementById('res-subtotal').innerText = `$${subtotal.toFixed(2)}`;
                document.getElementById('res-iva').innerText = `$${iva.toFixed(2)}`;
                document.getElementById('res-total').innerText = `$${total.toFixed(2)}`;
            }
        }

        async function guardarFactura() {
            if (!user && !isDemoMode) return alert("Sesión no iniciada.");
            const btn = document.getElementById('btn-save');
            const numFact = document.getElementById('f-num').value;
            if (!numFact) return alert("Ingrese número de factura");

            btn.disabled = true;
            btn.innerText = "REGISTRANDO...";

            const facturaData = {
                cliente: document.getElementById('f-cliente').value,
                ruc: document.getElementById('f-ruc').value,
                numFactura: numFact,
                fechaEmision: document.getElementById('f-fecha').value,
                estado: document.getElementById('f-estado').value,
                productos: PRODUCTOS.map((p, i) => ({
                    ...p,
                    cantidad: parseFloat(document.getElementById(`cant-${i}`).value) || 0
                })),
                total: parseFloat(document.getElementById('res-total').innerText.replace('$', '')),
                userId: user?.uid || 'demo-user',
                timestamp: isDemoMode ? { seconds: Date.now()/1000 } : firebase.firestore.FieldValue.serverTimestamp()
            };

            if (isDemoMode) {
                facturas.unshift({ id: 'L-' + Date.now(), ...facturaData });
                localStorage.setItem('polaca_demo_v112', JSON.stringify(facturas));
                setTimeout(() => switchTab('dashboard'), 500);
            } else {
                try {
                    const path = `artifacts/${appId}/public/data/facturas`;
                    await db.collection(path).add(facturaData);
                    switchTab('dashboard');
                } catch (e) {
                    alert("Error: " + e.message);
                    btn.disabled = false;
                    btn.innerText = "REINTENTAR";
                }
            }
        }

        async function actualizarEstado(id, nuevoEstado) {
            if (isDemoMode) {
                facturas = facturas.map(f => f.id === id ? {...f, estado: nuevoEstado} : f);
                localStorage.setItem('polaca_demo_v112', JSON.stringify(facturas));
                render();
            } else {
                try {
                    const path = `artifacts/${appId}/public/data/facturas`;
                    await db.collection(path).doc(id).update({ estado: nuevoEstado });
                } catch (e) { alert("Error al actualizar"); }
            }
        }

        function render() {
            const container = document.getElementById('main-content');
            if (!container) return;

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`btn-${activeTab}`)?.classList.add('tab-active');

            if (activeTab === 'dashboard') {
                const sumTotal = facturas.reduce((acc, f) => acc + (f.total || 0), 0);
                container.innerHTML = `
                    <div class="space-y-6 animate-in fade-in duration-300">
                        <div class="bg-gradient-to-br from-blue-700 to-indigo-900 p-6 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                            <div class="relative z-10">
                                <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Cartera Logística Polaca</p>
                                <p class="text-3xl font-bold mt-2">$${sumTotal.toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                                <div class="flex justify-between items-center mt-8">
                                    <div class="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-2xl text-[10px] font-bold border border-white/10 tracking-tight">${facturas.length} REGISTROS</div>
                                    <span class="text-[9px] opacity-40 font-mono">v1.1.2</span>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">Movimientos Recientes</h3>
                            ${facturas.length === 0 ? '<div class="text-center py-16 bg-white rounded-3xl border border-dashed text-gray-400 text-xs italic">No hay datos en la nube.</div>' : ''}
                            ${facturas.slice(0, 15).map(f => `
                                <div class="bg-white p-4 rounded-3xl shadow-sm flex justify-between items-center border-l-[6px] ${f.estado === 'cancelado' ? 'border-emerald-500' : f.estado === 'abonado' ? 'border-blue-500' : 'border-amber-500'}">
                                    <div class="flex-1 pr-4">
                                        <p class="text-xs font-bold text-gray-800 truncate">${f.cliente}</p>
                                        <div class="flex gap-2 mt-1.5 items-center">
                                            <span class="text-[9px] font-mono font-bold text-gray-400 bg-gray-50 px-1.5 py-0.5 rounded">${f.numFactura.split('-').pop()}</span>
                                            <span class="status-badge status-${f.estado}">${f.estado}</span>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="font-bold text-blue-700 text-sm">$${(f.total || 0).toFixed(2)}</p>
                                        <p class="text-[8px] text-gray-400 font-bold uppercase">${f.fechaEmision}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (activeTab === 'logistica') {
                container.innerHTML = `
                    <div class="space-y-4 animate-in slide-in-from-bottom duration-300">
                        <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-5">
                             <p class="text-[10px] font-black text-blue-600 uppercase border-b pb-3 tracking-widest">Nueva Carga</p>
                             <div><label class="text-[9px] text-gray-400 font-black">CLIENTE</label><input id="f-cliente" value="DISTRIBUIDORA AUSTROECUATORIANA S.A.S." class="w-full text-sm font-bold border-b outline-none focus:border-blue-500"></div>
                             <div class="grid grid-cols-2 gap-5">
                                <div><label class="text-[9px] text-gray-400 font-black">RUC</label><input id="f-ruc" value="0195174555001" class="w-full text-xs border-b outline-none"></div>
                                <div><label class="text-[9px] text-blue-600 font-black">N° FACTURA</label><input id="f-num" placeholder="000-000-000" class="w-full text-xs border-b font-bold text-blue-600 outline-none"></div>
                             </div>
                             <div class="grid grid-cols-2 gap-5">
                                <div><label class="text-[9px] text-gray-400 font-black">FECHA</label><input type="date" id="f-fecha" value="${new Date().toISOString().split('T')[0]}" class="w-full text-xs border-b outline-none"></div>
                                <div><label class="text-[9px] text-gray-400 font-black">ESTADO</label>
                                    <select id="f-estado" class="w-full text-xs border-b font-bold bg-transparent outline-none">
                                        <option value="pendiente">PENDIENTE</option><option value="abonado">ABONADO</option><option value="cancelado">CANCELADO</option>
                                    </select>
                                </div>
                             </div>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                            ${PRODUCTOS.map((p, i) => `
                                <div class="flex items-center gap-4">
                                    <div class="flex-1"><p class="text-xs font-bold text-gray-700">${p.nombre}</p></div>
                                    <input type="number" id="cant-${i}" oninput="updateTotals()" placeholder="0" class="w-20 bg-gray-50 border-2 rounded-2xl p-2 text-center text-sm font-black focus:border-blue-500 outline-none">
                                </div>
                            `).join('')}
                        </div>
                        <div class="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl">
                            <div class="flex justify-between text-xs opacity-50 font-bold"><span>SUBTOTAL</span> <span id="res-subtotal">$0.00</span></div>
                            <div class="flex justify-between text-xs opacity-50 font-bold border-b border-white/10 pb-3 mt-1"><span>IVA (15%)</span> <span id="res-iva">$0.00</span></div>
                            <div class="flex justify-between text-2xl font-black pt-4"><span>TOTAL</span> <span id="res-total" class="text-emerald-400">$0.00</span></div>
                        </div>
                        <button id="btn-save" onclick="guardarFactura()" class="w-full bg-blue-600 text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-[0.97] uppercase text-sm">Registrar en Nube</button>
                    </div>
                `;
            } else if (activeTab === 'rutas') {
                container.innerHTML = `
                    <div class="space-y-6 animate-in slide-in-from-right duration-300">
                        <h2 class="text-lg font-black text-gray-800 uppercase px-2">Administración</h2>
                        <div class="space-y-4">
                            ${facturas.map(f => `
                                <div class="bg-white p-5 rounded-[2rem] border shadow-sm">
                                    <div class="flex justify-between">
                                        <div class="flex-1">
                                            <p class="text-sm font-black text-gray-800">${f.cliente}</p>
                                            <p class="text-[10px] text-gray-400 font-bold uppercase">${f.numFactura}</p>
                                        </div>
                                        <p class="font-black text-blue-700">$${(f.total || 0).toFixed(2)}</p>
                                    </div>
                                    <div class="flex items-center gap-4 mt-5 pt-4 border-t">
                                        <select onchange="actualizarEstado('${f.id}', this.value)" class="text-[10px] font-black border-2 rounded-xl px-3 py-2 bg-gray-50 outline-none w-full">
                                            <option value="pendiente" ${f.estado === 'pendiente' ? 'selected' : ''}>PENDIENTE</option>
                                            <option value="abonado" ${f.estado === 'abonado' ? 'selected' : ''}>ABONADO</option>
                                            <option value="cancelado" ${f.estado === 'cancelado' ? 'selected' : ''}>CANCELADO</option>
                                        </select>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
