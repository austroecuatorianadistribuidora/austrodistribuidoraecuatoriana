<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avena Control Pro - Gestión Financiera Integral</title>
    <!-- Dependencias estables -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        @media print { 
            .print-hidden { display: none !important; } 
            .print-only { display: block !important; }
            body { background: white !important; }
            .no-shadow { shadow: none !important; border: 1px solid #eee !important; }
        }
        .print-only { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .bg-gradient-orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .bg-gradient-green { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .bg-gradient-indigo { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; background: #fff;">
            <div style="text-align: center;">
                <div style="width: 40px; height: 40px; border: 4px solid #f97316; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                <p style="color: #444; font-weight: bold;">Sincronizando Sistema Avena Pro...</p>
                <p style="color: #888; font-size: 12px; margin-top: 10px;">Cargando módulos de nómina y finanzas...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIGURACIÓN GLOBAL ---
        const today = new Date().toISOString().split('T')[0];
        const firstDayMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
        const currentMonthYear = new Date().toLocaleString('es-ES', { month: 'long', year: 'numeric' });
        const ADMIN_PIN = "1234";

        const GASTOS_MENSUALES_FIJOS = {
            sueldos: 964, capitalCredito: 683.06, comisionVentas: 400, combustibles: 350, 
            honorarios: 200, depreciacionVehiculos: 200, viaticosForaneo: 180, interesPrestamo: 172.73, 
            mantenimientoVehiculos: 100, varios: 100, viaticosLocal: 60, telefonia: 30, suministros: 10
        };

        const TOTAL_GASTOS_FIJOS_MENSUAL = Object.values(GASTOS_MENSUALES_FIJOS).reduce((a, b) => a + b, 0);

        const DEFAULT_PRODUCTS = [
            { id: 'p1', nombre: 'VASO 165G.', costo: 0.2696, pvd: 0.3478 },
            { id: 'p2', nombre: 'VASO 340G.', costo: 0.6087, pvd: 0.6957 },
            { id: 'p3', nombre: 'EMP. 1/2L.', costo: 0.7770, pvd: 0.8870 },
            { id: 'p4', nombre: 'EMP. 1L.', costo: 1.5974, pvd: 1.8261 },
        ];

        const INITIAL_USERS = [
            { name: "Jorge Fernando Proaño Quinde", role: "admin", password: "1234" },
            { name: "Juan Pablo Proaño Quinde", role: "admin", password: "1234" },
            { name: "Jimmy Arias", role: "admin", password: "1234" },
            { name: "Diego Xavier Siavichay", role: "vendedor", password: "1234" },
            { name: "Byron Armando Miranda Capa", role: "vendedor", password: "1234" }
        ];

        const NOMBRES_VENDEDORES = ["Diego Xavier Siavichay", "Byron Armando Miranda Capa"];

        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'distribuidora-avena-v3';
        
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configStr) {
                const firebaseConfig = JSON.parse(configStr);
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
            }
        } catch (e) { console.error("Firebase Error:", e); }

        // --- COMPONENTES ATÓMICOS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return (
                <span key={name} className="inline-flex items-center justify-center">
                    <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
                </span>
            );
        };

        const ViewHeader = ({ title, sub, onBack, colorClass = "bg-orange-600" }) => (
            <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-[40px] shadow-sm border border-gray-100 print-hidden">
                <div className="flex items-center gap-4">
                    <div className={`${colorClass} p-3 rounded-2xl text-white shadow-lg`}><Icon name="layout-grid" size={24}/></div>
                    <div>
                        <h2 className="text-2xl font-black tracking-tighter text-gray-800 uppercase leading-none">{title}</h2>
                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">{sub}</p>
                    </div>
                </div>
                {onBack && (
                    <button onClick={onBack} className="flex items-center gap-2 bg-gray-100 px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase text-gray-500 hover:bg-gray-200 transition-all active:scale-95">
                        <Icon name="arrow-left" size={14}/> Volver
                    </button>
                )}
            </div>
        );

        // --- VISTAS ---

        const DashboardView = ({ stats }) => {
            const marginTotal = stats.vtot - stats.ctot;
            const marginRatio = stats.vtot > 0 ? marginTotal / stats.vtot : 0.22;
            const breakEvenSales = (TOTAL_GASTOS_FIJOS_MENSUAL + stats.gtot) / (marginRatio || 0.01);
            const progress = Math.min((stats.vtot / breakEvenSales) * 100, 100);
            const isProfitable = stats.vtot >= breakEvenSales;

            return (
                <div className="space-y-8 animate-in fade-in duration-500">
                    <ViewHeader title="Panel Administrativo" sub="Resumen de Rentabilidad Mensual" />
                    <div className="bg-white p-8 rounded-[45px] border shadow-sm space-y-6">
                        <div className="flex flex-col md:flex-row justify-between gap-4">
                            <h3 className="text-xl font-black text-gray-800 flex items-center gap-2"><Icon name="activity" className="text-orange-500"/> Punto de Equilibrio</h3>
                            <div className={`px-5 py-2 rounded-2xl font-black text-[10px] uppercase ${isProfitable ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700 animate-pulse'}`}>
                                {isProfitable ? "GENERANDO UTILIDAD" : "ZONA DE RECUPERACIÓN"}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-gray-50 p-6 rounded-[35px] text-center border"><p className="text-[10px] font-black text-gray-400 uppercase mb-1">Ventas Reales</p><p className="text-3xl font-black text-gray-800">${stats.vtot.toLocaleString()}</p></div>
                            <div className="bg-gray-50 p-6 rounded-[35px] text-center border border-orange-100"><p className="text-[10px] font-black text-gray-400 uppercase mb-1">Meta Equilibrio</p><p className="text-3xl font-black text-gray-800">${breakEvenSales.toLocaleString(undefined, {maximumFractionDigits: 0})}</p></div>
                            <div className={`p-6 rounded-[35px] text-center border ${isProfitable ? 'bg-green-50 text-green-700 border-green-100' : 'bg-red-50 text-red-700 border-red-100'}`}><p className="text-[10px] font-black uppercase mb-1 opacity-60">Balance Neto</p><p className="text-3xl font-black">${(stats.vtot - stats.ctot - stats.gtot - TOTAL_GASTOS_FIJOS_MENSUAL).toLocaleString(undefined, {maximumFractionDigits: 0})}</p></div>
                        </div>
                        <div className="space-y-2"><div className="h-5 w-full bg-gray-100 rounded-full overflow-hidden shadow-inner p-1"><div className={`h-full transition-all duration-1000 rounded-full ${isProfitable ? 'bg-gradient-green' : 'bg-gradient-orange'}`} style={{ width: `${progress}%` }}></div></div></div>
                    </div>
                </div>
            );
        };

        const MatrizCostosView = ({ stats, onBack }) => {
            const marginTotal = stats.vtot - stats.ctot;
            const marginRatio = stats.vtot > 0 ? marginTotal / stats.vtot : 0.22;
            const metaVentasVarianza = (TOTAL_GASTOS_FIJOS_MENSUAL + stats.gtot) / (marginRatio || 0.01);
            return (
                <div className="space-y-10 animate-in fade-in duration-500">
                    <ViewHeader title="Matriz de Costos" sub="Referencia Fija y Comisiones" onBack={onBack} colorClass="bg-indigo-600" />
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <section className="bg-white p-8 rounded-[45px] border shadow-sm space-y-6">
                            <h3 className="text-xl font-black text-gray-800 flex items-center gap-2 uppercase tracking-tight"><Icon name="layers" size={24} className="text-indigo-500"/> Gastos Fijos Consolidados</h3>
                            <div className="space-y-2">
                                {Object.entries(GASTOS_MENSUALES_FIJOS).map(([k, v], i) => (
                                    <div key={i} className="flex justify-between items-center p-3.5 rounded-2xl bg-gray-50 uppercase text-[10px] font-bold">
                                        <span>{k.replace(/([A-Z])/g, ' $1')}</span>
                                        <span className="font-black font-mono text-sm">${v.toLocaleString()}</span>
                                    </div>
                                ))}
                                <div className="p-7 bg-indigo-900 text-white rounded-[35px] shadow-xl mt-6 flex justify-between items-center">
                                    <span className="text-xs font-black uppercase">Total Obligaciones</span>
                                    <span className="text-2xl font-black">${TOTAL_GASTOS_FIJOS_MENSUAL.toLocaleString()}</span>
                                </div>
                            </div>
                        </section>
                        <section className="bg-white p-8 rounded-[45px] border shadow-sm space-y-6">
                            <h3 className="text-xl font-black text-gray-800 flex items-center gap-2 uppercase tracking-tight"><Icon name="target" size={24} className="text-orange-500"/> Meta de Punto de Equilibrio</h3>
                            <div className="bg-orange-50 p-8 rounded-[40px] text-center border border-orange-100">
                                <p className="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-2">Ventas Requeridas Hoy</p>
                                <p className="text-5xl font-black text-gray-800 tracking-tighter font-mono">${metaVentasVarianza.toLocaleString(undefined, {maximumFractionDigits:0})}</p>
                                <p className="text-[10px] mt-4 text-orange-600 font-bold uppercase italic">Incluye sueldos base y comisiones mínimas estimadas</p>
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        const NominaView = ({ cargas, db, appId, onBack }) => {
            const [filterMonth, setFilterMonth] = useState(today.substring(0, 7)); // YYYY-MM
            const [selectedRol, setSelectedRol] = useState(null);

            const calculatePayroll = (vendedor) => {
                const base = 482;
                const vendedorCargas = cargas.filter(c => c.responsable === vendedor && c.estado === 'Liquidado' && (c.fechaSalida || c.fecha).startsWith(filterMonth));
                const totalVentas = vendedorCargas.reduce((a, b) => a + (b.ventaNeta || 0), 0);
                
                let comision = 0;
                if (totalVentas > 11000) {
                    comision = 100; // Bono inicial por pasar los 11k
                    const exceso = totalVentas - 11000;
                    const pasosMil = Math.floor(exceso / 1000);
                    comision += pasosMil * 50; // $50 por cada 1000 extra
                }

                return {
                    nombre: vendedor,
                    sueldoBase: base,
                    ventas: totalVentas,
                    comision: comision,
                    total: base + comision,
                    periodo: filterMonth
                };
            };

            const dataNomina = NOMBRES_VENDEDORES.map(v => calculatePayroll(v));

            return (
                <div className="space-y-8 animate-in fade-in duration-500">
                    <ViewHeader title="Nómina" sub="Cálculo de Sueldos y Comisiones" onBack={onBack} colorClass="bg-green-600" />
                    
                    <div className="flex justify-between items-center px-4">
                        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Seleccionar Periodo de Pago</p>
                        <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="p-3 rounded-2xl font-black text-xs border-none shadow-sm outline-none focus:ring-2 ring-green-400" />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {dataNomina.map((item, i) => (
                            <div key={i} className="bg-white p-8 rounded-[45px] border shadow-sm space-y-6 transition-all hover:shadow-xl group">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h4 className="font-black text-xl text-gray-800 uppercase tracking-tighter leading-none">{item.nombre}</h4>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase mt-1">Sueldo Base: ${item.sueldoBase}</p>
                                    </div>
                                    <div className="bg-green-100 text-green-600 p-3 rounded-2xl group-hover:scale-110 transition-transform"><Icon name="user" size={24}/></div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                                        <p className="text-[9px] font-black text-gray-400 uppercase mb-1">Ventas Mes</p>
                                        <p className="text-xl font-black text-gray-800">${item.ventas.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-orange-50 p-4 rounded-3xl border border-orange-100">
                                        <p className="text-[9px] font-black text-orange-400 uppercase mb-1">Comisión</p>
                                        <p className="text-xl font-black text-orange-600">+${item.comision.toLocaleString()}</p>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center pt-6 border-t">
                                    <div><p className="text-[9px] font-bold text-gray-400 uppercase">Total a Recibir</p><p className="text-3xl font-black text-gray-900 tracking-tighter font-mono">${item.total.toLocaleString()}</p></div>
                                    <button onClick={() => setSelectedRol(item)} className="bg-gray-900 text-white px-8 py-3.5 rounded-[22px] text-[10px] font-black uppercase shadow-lg active:scale-95 transition-all">Generar Rol</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* MODAL DEL ROL DE PAGOS (IMPRIMIBLE) */}
                    {selectedRol && (
                        <div className="fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center backdrop-blur-sm overflow-y-auto">
                            <div className="bg-white w-full max-w-2xl rounded-[55px] p-12 shadow-2xl relative animate-in zoom-in-95 my-10">
                                <button onClick={() => setSelectedRol(null)} className="absolute right-10 top-10 text-gray-300 hover:text-red-500 print-hidden"><Icon name="x"/></button>
                                
                                <div id="printable-rol" className="space-y-10">
                                    <div className="text-center space-y-2">
                                        <h3 className="text-3xl font-black uppercase tracking-tighter">Rol de Pagos Individual</h3>
                                        <p className="text-xs font-bold text-gray-400 uppercase tracking-[0.3em]">Avena Pro • Gestión Ecuador</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-8 border-y py-8 border-gray-100">
                                        <div>
                                            <p className="text-[10px] font-black text-gray-400 uppercase mb-1">Colaborador:</p>
                                            <p className="font-black text-lg text-gray-800 uppercase leading-none">{selectedRol.nombre}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black text-gray-400 uppercase mb-1">Periodo:</p>
                                            <p className="font-black text-lg text-gray-800 uppercase leading-none">{selectedRol.periodo}</p>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="flex justify-between p-5 bg-gray-50 rounded-3xl border border-gray-100 shadow-inner">
                                            <span className="font-bold text-gray-600 uppercase text-xs">Sueldo Base Mensual</span>
                                            <span className="font-black text-gray-800 font-mono text-lg">${selectedRol.sueldoBase.toFixed(2)}</span>
                                        </div>
                                        <div className="flex justify-between p-5 bg-gray-50 rounded-3xl border border-gray-100 shadow-inner">
                                            <span className="font-bold text-gray-600 uppercase text-xs">Ventas Realizadas (Periodo)</span>
                                            <span className="font-black text-gray-800 font-mono text-lg">${selectedRol.ventas.toLocaleString()}</span>
                                        </div>
                                        <div className="flex justify-between p-5 bg-orange-50 rounded-3xl border border-orange-100 shadow-inner">
                                            <span className="font-black text-orange-600 uppercase text-xs">Comisión Variable / Bonos</span>
                                            <span className="font-black text-orange-700 font-mono text-lg">+${selectedRol.comision.toFixed(2)}</span>
                                        </div>
                                    </div>

                                    <div className="bg-gray-900 p-8 rounded-[40px] text-white flex justify-between items-center shadow-xl">
                                        <span className="text-sm font-black uppercase tracking-widest">Líquido a Recibir</span>
                                        <span className="text-4xl font-black tracking-tighter font-mono">${selectedRol.total.toLocaleString(undefined, {minimumFractionDigits:2})}</span>
                                    </div>

                                    <div className="grid grid-cols-2 gap-10 pt-20">
                                        <div className="text-center border-t border-gray-400 pt-4">
                                            <p className="text-[10px] font-black uppercase opacity-60">Firma Colaborador</p>
                                            <p className="text-[8px] text-gray-400 mt-1 uppercase italic">C.I.: ____________________</p>
                                        </div>
                                        <div className="text-center border-t border-gray-400 pt-4">
                                            <p className="text-[10px] font-black uppercase opacity-60">Autorizado por Gerencia</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-12 flex gap-4 print-hidden">
                                    <button onClick={() => window.print()} className="flex-1 bg-gray-900 text-white py-5 rounded-[25px] font-black uppercase text-xs shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                                        <Icon name="printer" size={18}/> Imprimir Comprobante
                                    </button>
                                    <button onClick={() => setSelectedRol(null)} className="flex-1 bg-gray-100 text-gray-500 py-5 rounded-[25px] font-black uppercase text-xs">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LogisticaView = ({ cargas, products, db, appId, user, onBack }) => {
            const [modal, setModal] = useState(false);
            const [active, setActive] = useState(null);
            const [items, setItems] = useState([]);
            const [tmp, setTmp] = useState({ pId: 'p1', q: 0 });
            const [filterDay, setFilterDay] = useState(today);
            const [retModal, setRetModal] = useState(false);
            const [rets, setRets] = useState({});
            const [fotoDeposito, setFotoDeposito] = useState("");
            const [vendedorSel, setVendedorSel] = useState("");
            const [editId, setEditId] = useState(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFotoDeposito(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleOpenModal = (carga = null) => {
                if (carga) {
                    setEditId(carga.id);
                    setVendedorSel(carga.responsable);
                    setItems(carga.items || []);
                } else {
                    setEditId(null);
                    setVendedorSel("");
                    setItems([]);
                }
                setModal(true);
            };

            const addItem = () => {
                const pr = products.find(p => p.id === tmp.pId);
                const existing = items.findIndex(i => i.pId === tmp.pId);
                if (existing >= 0) {
                    const nl = [...items]; nl[existing].q += tmp.q;
                    setItems(nl);
                } else {
                    setItems([...items, { ...tmp, nombre: pr.nombre, costo: pr.costo, pvd: pr.pvd }]);
                }
                setTmp({ pId: 'p1', q: 0 });
            };

            const registrarCarga = async () => {
                if (!vendedorSel) return;
                const total = items.reduce((a,b) => a + (b.q * b.pvd), 0);
                const data = { responsable: vendedorSel, items, totalCargado: total, estado: 'En Tránsito', fechaSalida: new Date().toISOString() };
                if (editId) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').doc(editId).update(data);
                else await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').add(data);
                setModal(false); setItems([]); setVendedorSel(""); setEditId(null);
            };

            const finalizarJornada = async () => {
                const itemsLiq = active.items.map(it => {
                    const r = rets[it.pId] || 0;
                    const v = it.q - r;
                    return { ...it, dev: r, vUnid: v, vVal: v * it.pvd, cVal: v * it.costo };
                });
                const totalV = itemsLiq.reduce((a,b) => a+b.vVal, 0);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').doc(active.id).update({ items: itemsLiq, estado: 'Liquidado', ventaNeta: totalV, costoTotalVenta: itemsLiq.reduce((a,b) => a+b.cVal,0), fotoDeposito });
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cartera').add({ cliente: `Venta: ${active.responsable}`, monto: totalV, tipo: 'Cobro (Cierre Ruta)', fecha: filterDay });
                setRetModal(false); setRets({}); setActive(null); setFotoDeposito("");
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <ViewHeader title="Logística" sub="Gestión de Cargas de Vendedores" onBack={onBack} colorClass="bg-orange-500" />
                    <div className="flex justify-end gap-2 px-2"><input type="date" value={filterDay} onChange={e => setFilterDay(e.target.value)} className="p-3.5 rounded-2xl font-black text-xs border-none shadow-sm outline-none"/><button onClick={() => handleOpenModal()} className="bg-orange-600 text-white p-3.5 rounded-2xl shadow-lg active:scale-95 transition-all"><Icon name="plus" size={24}/></button></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {cargas.filter(c => (c.fechaSalida || c.fecha).startsWith(filterDay)).map(c => (
                            <div key={c.id} className={`bg-white p-8 rounded-[45px] border shadow-sm ${c.estado === 'Liquidado' ? 'border-l-8 border-green-500' : 'border-l-8 border-orange-400'}`}>
                                <div className="flex justify-between items-start"><div><h4 className="font-black text-gray-800 text-xl leading-tight uppercase">{c.responsable}</h4><p className="text-[10px] text-gray-400 font-bold uppercase mt-1">{new Date(c.fechaSalida).toLocaleTimeString()}</p></div><span className="px-4 py-1.5 rounded-full text-[9px] font-black uppercase bg-gray-100">{c.estado}</span></div>
                                <div className="mt-6 flex justify-between items-center pt-5 border-t"><div><p className="text-[9px] font-bold text-gray-400 uppercase mb-1">Carga Registrada</p><p className="text-2xl font-black text-gray-800 tracking-tighter">${(c.ventaNeta || c.totalCargado).toLocaleString()}</p></div>{c.estado === 'En Tránsito' && <button onClick={() => { setActive(c); setRetModal(true); }} className="bg-gray-900 text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase shadow-lg hover:bg-black transition-all">Cerrar Día</button>}</div>
                                <div className="flex gap-2 mt-4"><button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cargas').doc(c.id).delete()} className="p-2 text-red-100 hover:text-red-500 transition-colors"><Icon name="trash-2" size={16}/></button><button onClick={() => handleOpenModal(c)} className="p-2 text-blue-100 hover:text-blue-500"><Icon name="edit-3" size={16}/></button></div>
                            </div>
                        ))}
                    </div>
                    {modal && (
                        <div className="fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-[55px] p-12 shadow-2xl relative animate-in zoom-in-95">
                                <button onClick={() => setModal(false)} className="absolute right-10 top-10 text-gray-300 hover:text-red-500 transition-colors"><Icon name="x"/></button>
                                <h3 className="font-black text-3xl mb-8 uppercase tracking-tighter">{editId ? "Corregir Carga" : "Registrar Carga"}</h3>
                                <div className="space-y-5">
                                    <select className="w-full bg-gray-100 p-5 rounded-[30px] border-none font-black text-sm shadow-inner" value={vendedorSel} onChange={e => setVendedorSel(e.target.value)}>
                                        <option value="">Seleccionar Vendedor...</option>
                                        {NOMBRES_VENDEDORES.map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                    <div className="bg-orange-50 p-7 rounded-[40px] border border-orange-100 space-y-4">
                                        <select className="w-full p-4 rounded-2xl border-none font-bold text-xs shadow-sm bg-white" value={tmp.pId} onChange={e => setTmp({...tmp, pId: e.target.value})}>{products.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}</select>
                                        <div className="grid grid-cols-2 gap-4"><input type="number" className="w-full p-4 rounded-2xl border-none font-black text-xs shadow-sm bg-white" placeholder="Cant." value={tmp.q || ''} onChange={e => setTmp({...tmp, q: parseInt(e.target.value)})}/><button onClick={addItem} className="w-full bg-orange-600 text-white py-4 rounded-2xl font-black uppercase text-[11px] active:scale-95">Añadir</button></div>
                                    </div>
                                    <div className="space-y-2 max-h-40 overflow-y-auto">{items.map((it, i) => (<div key={i} className="flex justify-between bg-gray-50 p-4 rounded-2xl font-bold text-xs"><span>{it.q} {it.nombre}</span><button onClick={() => setItems(items.filter((_, idx) => idx !== i))} className="text-red-300"><Icon name="minus-circle" size={16}/></button></div>))}</div>
                                    <button onClick={registrarCarga} className="w-full bg-gray-900 text-white py-6 rounded-[35px] font-black uppercase text-xs shadow-xl active:scale-95">Confirmar Datos</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {retModal && active && (
                        <div className="fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-[55px] p-12 shadow-2xl overflow-y-auto max-h-[90vh] relative animate-in slide-in-from-bottom-10">
                                <button onClick={() => setRetModal(false)} className="absolute right-12 top-12 text-gray-300 hover:text-red-500"><Icon name="x"/></button>
                                <h3 className="font-black text-3xl mb-1 text-center tracking-tighter uppercase">Cierre de Jornada</h3>
                                <div className="space-y-8">
                                    {active.items.map(it => (
                                        <div key={it.pId} className="flex items-center gap-4 bg-gray-50 p-6 rounded-[35px] border shadow-inner">
                                            <div className="flex-1"><p className="text-xs font-black text-gray-700 uppercase">{it.nombre}</p><p className="text-[9px] font-bold text-gray-400 mt-1 uppercase tracking-widest italic">Salida: {it.q} u.</p></div>
                                            <div className="text-center"><input type="number" className="w-24 p-3 rounded-2xl font-black text-center text-sm shadow-sm border-none bg-white focus:ring-2 ring-orange-200" placeholder="Faltante" onChange={e => setRets({...rets, [it.pId]: parseInt(e.target.value) || 0})}/></div>
                                        </div>
                                    ))}
                                    <div className="bg-blue-50 p-10 rounded-[45px] border-2 border-dashed border-blue-200 text-center">
                                        <input type="file" id="dep-f" className="hidden" onChange={handleFile}/><label htmlFor="dep-f" className="cursor-pointer block">{fotoDeposito ? <img src={fotoDeposito} className="h-44 mx-auto rounded-3xl shadow-xl object-cover"/> : <Icon name="camera" size={32} className="text-blue-300 mx-auto mb-2" />}</label>
                                    </div>
                                    <button onClick={finalizarJornada} className="w-full bg-orange-600 text-white py-7 rounded-[35px] font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Grabar Liquidación Final</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const FacturasView = ({ facturas, products, db, appId, filterDay, onBack }) => {
            const [modal, setModal] = useState(false);
            const [fm, setFm] = useState({ num: '', fecha: today, items: [], estado: 'Pendiente' });
            const [tmp, setTmp] = useState({ pId: 'p1', q: 0, pCompra: 0.2696 });
            const [editId, setEditId] = useState(null);

            const handleOpenModal = (factura = null) => {
                if (factura) { setEditId(factura.id); setFm({ num: factura.num, fecha: factura.fecha, items: factura.items || [], estado: factura.estado }); }
                else { setEditId(null); setFm({ num: '', fecha: today, items: [], estado: 'Pendiente' }); }
                setModal(true);
            };

            const addItem = () => {
                const pr = products.find(p => p.id === tmp.pId);
                const sub = tmp.q * tmp.pCompra;
                const util = (tmp.q * pr.pvd) - sub;
                setFm({...fm, items: [...fm.items, { ...tmp, nombre: pr.nombre, subtotal: sub, utilidad: util }]});
                setTmp({ pId: 'p1', q: 0, pCompra: 0.2696 });
            };

            const save = async () => {
                if (!fm.num || fm.items.length === 0) return;
                const total = fm.items.reduce((a,b) => a+b.subtotal, 0);
                const utilTotal = fm.items.reduce((a,b) => a+b.utilidad, 0);
                const data = { ...fm, total, totalUtilidad: utilTotal, fechaReg: new Date().toISOString() };
                if (editId) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturas').doc(editId).update(data);
                else { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturas').add(data); if(fm.estado === 'Pagado') await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cartera').add({ cliente: `Pago Factura #${fm.num}`, monto: -total, tipo: 'Pago Proveedor', fecha: today }); }
                setModal(false); setEditId(null);
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <ViewHeader title="Facturas Compra" sub="Facturas de Proveedor Principal" onBack={onBack} colorClass="bg-blue-600" />
                    <div className="flex justify-end gap-2 px-2"><input type="date" value={filterDay} onChange={e => setFilterDay(e.target.value)} className="p-3.5 rounded-2xl font-black text-xs border-none shadow-sm outline-none"/><button onClick={() => handleOpenModal()} className="bg-gray-900 text-white p-3.5 rounded-2xl shadow-lg active:scale-95 transition-all"><Icon name="plus" size={24}/></button></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {facturas.filter(f => f.fecha === filterDay).map(f => (
                            <div key={f.id} className={`bg-white p-8 rounded-[45px] border shadow-sm ${f.estado === 'Pagado' ? 'border-l-8 border-green-500' : 'border-l-8 border-red-500'}`}>
                                <h4 className="font-black text-2xl uppercase tracking-tighter leading-none mb-1">#{f.num}</h4>
                                <div className="mt-4 bg-green-50 p-5 rounded-[25px] flex justify-between items-center mb-5 font-black text-green-700 font-mono"><span>Utilidad Factura:</span><span>${f.totalUtilidad?.toFixed(2)}</span></div>
                                <div className="flex justify-between items-end border-t pt-5"><p className="text-3xl font-black text-gray-800 tracking-tighter">${f.total.toLocaleString()}</p><div className="flex gap-2"><button onClick={() => handleOpenModal(f)} className="p-2 text-blue-300 hover:text-blue-500"><Icon name="edit-3"/></button><button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('facturas').doc(f.id).delete()} className="p-2 text-red-200 hover:text-red-500 transition-colors"><Icon name="trash-2"/></button></div></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const AdminSettingsView = ({ users, products, db, appId, onBack }) => {
            const [nu, setNu] = useState({ name: '', password: '', role: 'vendedor' });
            const handleUpdatePrice = async (pId, field, value) => {
                const updated = products.map(p => p.id === pId ? { ...p, [field]: parseFloat(value) } : p);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('productos').doc(pId).set(updated.find(p => p.id === pId));
            };
            const handleUpdatePassword = async (userId, newPass) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('usuarios').doc(userId).update({ password: newPass });
            };
            const handleAddUser = async () => {
                if (!nu.name || !nu.password) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('usuarios').add(nu);
                setNu({ name: '', password: '', role: 'vendedor' });
            };
            return (
                <div className="space-y-10 animate-in fade-in duration-500">
                    <ViewHeader title="Configuración" sub="Gestión de Personal y Precios" onBack={onBack} colorClass="bg-gray-900" />
                    <section className="bg-white p-8 rounded-[45px] border shadow-sm space-y-8">
                        <h3 className="text-xl font-black text-gray-800 flex items-center gap-2 uppercase tracking-tight"><Icon name="users" className="text-blue-500"/> Personal</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <div className="space-y-5">
                                <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2">Nuevo Usuario</p>
                                <input placeholder="Nombre Completo" className="w-full bg-gray-100 p-5 rounded-[25px] font-black text-sm border-none shadow-inner outline-none focus:ring-2 ring-blue-200" value={nu.name} onChange={e => setNu({...nu, name: e.target.value})}/>
                                <div className="grid grid-cols-2 gap-4"><input placeholder="Contraseña Inicial" type="text" className="w-full bg-gray-100 p-5 rounded-[25px] font-black text-sm border-none shadow-inner outline-none focus:ring-2 ring-blue-200" value={nu.password} onChange={e => setNu({...nu, password: e.target.value})}/><select className="w-full bg-gray-100 p-5 rounded-[25px] border-none font-bold text-xs shadow-inner outline-none focus:ring-2 ring-blue-200" value={nu.role} onChange={e => setNu({...nu, role: e.target.value})}><option value="vendedor">Acceso Vendedor (AC)</option><option value="admin">Administrador</option></select></div>
                                <button onClick={handleAddUser} className="w-full bg-gray-900 text-white py-5 rounded-[25px] font-black uppercase text-[10px] shadow-lg active:scale-95">Registrar</button>
                            </div>
                            <div className="max-h-[400px] overflow-y-auto space-y-3 pr-2 hide-scrollbar">{users.map(u => (
                                <div key={u.id} className="bg-gray-50 p-6 rounded-[35px] border flex flex-col gap-4">
                                    <div className="flex justify-between items-start"><div><p className="font-black text-gray-800 text-xs uppercase mb-1 leading-none">{u.name}</p><span className={`text-[8px] font-black uppercase ${u.role === 'admin' ? 'text-blue-600' : 'text-orange-600'}`}>{u.role.toUpperCase()}</span></div><button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('usuarios').doc(u.id).delete()} className="text-red-200 transition-colors hover:text-red-500"><Icon name="trash-2" size={18}/></button></div>
                                    <input type="text" className="bg-white border-none shadow-inner p-3.5 rounded-2xl font-black text-xs outline-none focus:ring-2 ring-blue-200" defaultValue={u.password} onBlur={e => handleUpdatePassword(u.id, e.target.value)}/>
                                </div>
                            ))}</div>
                        </div>
                    </section>
                </div>
            );
        };

        const CarteraView = ({ cartera, db, appId, filterDay, setFilterDay, exportExcel, onBack }) => {
            const dayMovements = cartera.filter(m => m.fecha === filterDay);
            const saldoTotal = cartera.reduce((a,b) => a + b.monto, 0);
            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <ViewHeader title="Caja Maestro" sub="Historial de Movimientos" onBack={onBack} colorClass="bg-green-600" />
                    <div className="flex justify-end gap-3 px-2">
                        <input type="date" value={filterDay} onChange={e => setFilterDay(e.target.value)} className="p-3.5 rounded-2xl font-black text-xs outline-none shadow-sm border-none"/>
                        <button onClick={exportExcel} className="bg-green-600 text-white p-3.5 rounded-2xl shadow-lg active:scale-95 transition-all"><Icon name="download" size={24}/></button>
                    </div>
                    <div className="bg-white p-16 rounded-[60px] border-l-8 border-l-green-500 shadow-sm text-center relative overflow-hidden group transition-all hover:shadow-xl">
                        <div className="absolute right-[-20px] top-[-20px] opacity-[0.03] group-hover:scale-110 transition-transform duration-1000"><Icon name="landmark" size={250}/></div>
                        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Efectivo Maestro en Caja</p>
                        <p className="text-8xl font-black tracking-tighter text-green-600 font-mono">${saldoTotal.toLocaleString(undefined, {minimumFractionDigits:2})}</p>
                    </div>
                    <div className="space-y-3">
                        {dayMovements.map(m => (
                            <div key={m.id} className="bg-white p-6 rounded-[40px] flex justify-between items-center border shadow-sm">
                                <div className="flex items-center gap-5"><div className={`p-4 rounded-3xl ${m.monto >= 0 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}><Icon name={m.monto >= 0 ? 'plus' : 'minus'}/></div><div><h4 className="font-black text-gray-800 text-sm uppercase leading-none mb-1">{m.cliente}</h4><p className="text-[9px] text-gray-400 font-bold uppercase mt-1">{m.tipo}</p></div></div>
                                <div className="flex items-center gap-6"><span className={`font-black text-2xl tracking-tighter ${m.monto >= 0 ? 'text-green-600' : 'text-red-600'}`}>{m.monto >= 0 ? '+' : '-'}${Math.abs(m.monto).toLocaleString()}</span><button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cartera').doc(m.id).delete()} className="text-gray-100 hover:text-red-400 p-2.5 transition-colors"><Icon name="trash-2" size={18}/></button></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const GateView = ({ users, onAccess }) => {
            const [selected, setSelected] = useState("");
            const [pass, setPass] = useState("");
            const [error, setError] = useState(false);
            const handleLogin = () => {
                const user = users.find(u => u.name === selected && u.password === pass);
                if (user) onAccess(user);
                else { setError(true); setPass(""); }
            };
            return (
                <div className="h-screen flex flex-col items-center justify-center p-6 bg-white animate-in fade-in duration-700">
                    <div className="bg-orange-600 p-8 rounded-[45px] text-white shadow-2xl mb-12 transform hover:rotate-3 transition-transform"><Icon name="package" size={60} /></div>
                    <h1 className="text-4xl font-black text-gray-800 mb-2 leading-none uppercase tracking-widest">Avena Pro</h1>
                    <p className="text-gray-400 font-bold uppercase text-[10px] tracking-[0.5em] mb-16">Acceso Administrativo Seguro</p>
                    <div className="w-full max-w-sm bg-white p-12 rounded-[65px] border shadow-2xl space-y-8 border-gray-100">
                        <div className="space-y-5">
                            <select className="w-full p-6 rounded-[35px] border-none font-black text-xs shadow-inner bg-gray-50 outline-none focus:ring-2 ring-orange-200 appearance-none cursor-pointer" value={selected} onChange={e => { setSelected(e.target.value); setError(false); }}>
                                <option value="">Seleccionar Administrador...</option>
                                {users.filter(u => u.role === 'admin').sort((a,b) => a.name.localeCompare(b.name)).map(u => <option key={u.id} value={u.name}>{u.name}</option>)}
                            </select>
                            <input type="password" placeholder="••••" className="w-full p-6 rounded-[35px] border-none font-black text-xs shadow-inner bg-gray-50 text-center tracking-[0.5em] outline-none focus:ring-2 ring-orange-200" value={pass} onChange={e => setPass(e.target.value)}/>
                            {error && <p className="text-center text-red-500 font-black text-[10px] uppercase">Clave Incorrecta</p>}
                            <button onClick={handleLogin} className="w-full bg-gray-900 text-white py-6 rounded-[40px] font-black uppercase text-[11px] shadow-xl active:scale-95 transition-all hover:bg-black mt-4">Entrar al Sistema</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [fbUser, setFbUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loadingAuth, setLoadingAuth] = useState(true);
            const [globalFilterDay, setGlobalFilterDay] = useState(today);
            const [users, setUsers] = useState([]);
            const [products, setProducts] = useState(DEFAULT_PRODUCTS);
            const [cargas, setCargas] = useState([]);
            const [cartera, setCartera] = useState([]);
            const [facturas, setFacturas] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) return;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                        else await auth.signInAnonymously();
                    } catch (e) { console.error("Auth error:", e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => { setFbUser(u); setLoadingAuth(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!fbUser || !db) return;
                const collections = ['usuarios', 'productos', 'cargas', 'cartera', 'facturas'];
                const unsubs = collections.map(col => {
                    const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
                    return q.onSnapshot(snap => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        if (col === 'usuarios') { if (data.length === 0) INITIAL_USERS.forEach(u => q.add(u)); setUsers(data); }
                        if (col === 'productos') { if (data.length > 0) setProducts(data); else DEFAULT_PRODUCTS.forEach(p => q.doc(p.id).set(p)); }
                        if (col === 'cargas') setCargas(data);
                        if (col === 'cartera') setCartera(data);
                        if (col === 'facturas') setFacturas(data);
                    });
                });
                return () => unsubs.forEach(fn => fn());
            }, [fbUser]);

            const stats = useMemo(() => {
                const month = globalFilterDay.substring(0, 7);
                const fCargas = cargas.filter(c => (c.fechaSalida || c.fecha).startsWith(month));
                const fCartera = cartera.filter(p => p.fecha.startsWith(month));
                const vtot = fCartera.filter(m => m.tipo === 'Cobro (Cierre Ruta)').reduce((a, b) => a + b.monto, 0);
                const gtot = fCartera.filter(m => m.tipo === 'Pago Proveedor').reduce((a, b) => a + Math.abs(b.monto), 0);
                const ctot = fCargas.reduce((a, b) => a + (b.costoTotalVenta || 0), 0);
                return { vtot, gtot, ctot };
            }, [cargas, cartera, globalFilterDay]);

            const exportExcel = () => {
                if (!window.XLSX) return;
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cartera), "Caja_Maestro");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(facturas), "Compras");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cargas), "Rutas");
                XLSX.writeFile(wb, `REPORTE_MAESTRO_${globalFilterDay}.xlsx`);
            };

            if (loadingAuth) return <div className="h-screen flex items-center justify-center bg-white"><div className="w-14 h-14 border-4 border-orange-600 border-t-transparent rounded-full animate-spin"></div></div>;
            if (!currentUser) return <GateView users={users} onAccess={setCurrentUser} />;

            const NavBtn = ({ active, onClick, icon, label }) => (
                <button onClick={onClick} className={`w-full flex items-center gap-4 p-5 rounded-[30px] transition-all ${active ? 'bg-gray-900 text-white font-black shadow-2xl scale-105' : 'text-gray-400 hover:bg-gray-100'}`}>
                    <Icon name={icon} size={22} /> <span className="uppercase tracking-[0.2em] text-[10px]">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0 md:pl-80 bg-gray-50">
                    <aside className="hidden md:flex fixed left-0 top-0 bottom-0 w-80 bg-white border-r flex-col p-8 z-30 shadow-sm print-hidden">
                        <div className="flex items-center gap-4 mb-14"><div className="bg-orange-600 p-4 rounded-3xl text-white shadow-xl"><Icon name="package" size={32} /></div><span className="font-black text-2xl tracking-tighter uppercase leading-none">Avena Pro</span></div>
                        <div className="space-y-3 flex-1">
                            <NavBtn active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="activity" label="Rentabilidad" />
                            <NavBtn active={activeTab === 'reference'} onClick={() => setActiveTab('reference')} icon="database" label="Matriz Costos" />
                            <NavBtn active={activeTab === 'nomina'} onClick={() => setActiveTab('nomina')} icon="credit-card" label="Nómina" />
                            <NavBtn active={activeTab === 'logistica'} onClick={() => setActiveTab('logistica')} icon="truck" label="Rutas" />
                            <NavBtn active={activeTab === 'cartera'} onClick={() => setActiveTab('cartera')} icon="landmark" label="Caja Maestro" />
                            <NavBtn active={activeTab === 'facturas'} onClick={() => setActiveTab('facturas')} icon="file-text" label="Compras" />
                            <NavBtn active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon="settings" label="Gestión" />
                        </div>
                        <button onClick={() => setCurrentUser(null)} className="mt-10 text-gray-300 font-black uppercase text-[10px] flex items-center gap-3 px-8 py-5 bg-gray-50 rounded-[30px] hover:text-red-500 shadow-sm active:scale-95 transition-all"><Icon name="log-out" size={16}/> Salir</button>
                    </aside>

                    <main className="p-4 md:p-14 w-full max-w-7xl mx-auto pb-40">
                        {activeTab === 'dashboard' && <DashboardView stats={stats} />}
                        {activeTab === 'reference' && <MatrizCostosView stats={stats} onBack={() => setActiveTab('dashboard')} />}
                        {activeTab === 'nomina' && <NominaView cargas={cargas} db={db} appId={appId} onBack={() => setActiveTab('dashboard')} />}
                        {activeTab === 'logistica' && <LogisticaView cargas={cargas} products={products} db={db} appId={appId} user={currentUser} onBack={() => setActiveTab('dashboard')} />}
                        {activeTab === 'cartera' && <CarteraView cartera={cartera} db={db} appId={appId} filterDay={globalFilterDay} setFilterDay={setGlobalFilterDay} exportExcel={exportExcel} onBack={() => setActiveTab('dashboard')} />}
                        {activeTab === 'facturas' && <FacturasView facturas={facturas} products={products} db={db} appId={appId} filterDay={globalFilterDay} onBack={() => setActiveTab('dashboard')} />}
                        {activeTab === 'settings' && <AdminSettingsView users={users} products={products} db={db} appId={appId} onBack={() => setActiveTab('dashboard')} />}
                    </main>

                    <nav className="md:hidden fixed bottom-6 left-6 right-6 bg-gray-900 rounded-[40px] flex justify-around p-6 z-30 shadow-2xl border border-white/10 print-hidden">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-orange-500 scale-125' : 'text-gray-500'}><Icon name="activity" size={26} /></button>
                        <button onClick={() => setActiveTab('reference')} className={activeTab === 'reference' ? 'text-orange-500 scale-125' : 'text-gray-500'}><Icon name="database" size={26} /></button>
                        <button onClick={() => setActiveTab('nomina')} className={activeTab === 'nomina' ? 'text-orange-500 scale-125' : 'text-gray-500'}><Icon name="credit-card" size={26} /></button>
                        <button onClick={() => setActiveTab('logistica')} className={activeTab === 'logistica' ? 'text-orange-500 scale-125' : 'text-gray-500'}><Icon name="truck" size={26} /></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
