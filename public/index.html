<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Polaca 1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs (v8 compatibilidad para mayor estabilidad en este entorno) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-active { color: #2563eb; border-top: 2px solid #2563eb; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 9999px; font-weight: 700; text-transform: uppercase; }
        .status-pendiente { background-color: #fef3c7; color: #92400e; }
        .status-abonado { background-color: #dbeafe; color: #1e40af; }
        .status-cancelado { background-color: #d1fae5; color: #065f46; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <div id="app">
        <!-- Header -->
        <header class="bg-white border-b p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">Logística Polaca <span class="text-blue-600">1.1</span></h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Control Administrativo</p>
                </div>
            </div>
            <div id="user-indicator" class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-400">Desconectado</div>
        </header>

        <!-- Main Content -->
        <main class="max-w-md mx-auto p-4" id="main-content">
            <div id="loading-view" class="flex flex-col items-center justify-center py-20 space-y-4">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
                <p class="text-gray-500 text-sm font-medium loading-pulse">Conectando con el sistema...</p>
            </div>
        </main>

        <!-- Navigation Bar -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-2xl">
            <button onclick="switchTab('dashboard')" class="nav-btn flex flex-col items-center w-full py-1 text-gray-400" id="btn-dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2"/></svg>
                <span class="text-[10px] mt-1 font-medium">Inicio</span>
            </button>
            <button onclick="switchTab('logistica')" class="nav-btn flex flex-col items-center w-full py-1 text-gray-400" id="btn-logistica">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2"/></svg>
                <span class="text-[10px] mt-1 font-medium">Carga</span>
            </button>
            <button onclick="switchTab('rutas')" class="nav-btn flex flex-col items-center w-full py-1 text-gray-400" id="btn-rutas">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" stroke-width="2"/><path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1m-4 0h1" stroke-width="2"/></svg>
                <span class="text-[10px] mt-1 font-medium">Estados</span>
            </button>
        </nav>
    </div>

    <script>
        // --- CONFIGURACIÓN SEGURA ---
        let db, auth, appId;
        const PRODUCTOS = [
            { id: 'P000000256', nombre: 'AVENA POLACA 165G', precio: 0.269565 },
            { id: 'P000000247', nombre: 'AVENA POLACA 340G', precio: 0.608694 },
            { id: 'P000000005', nombre: 'AVENA POLACA 500G', precio: 0.777042 },
            { id: 'P000000006', nombre: 'AVENA POLACA 1000G', precio: 1.597390 }
        ];

        let facturas = [];
        let activeTab = 'dashboard';
        let isFirebaseReady = false;

        async function initApp() {
            const main = document.getElementById('main-content');
            try {
                // Validación de Configuración
                if (typeof __firebase_config === 'undefined') {
                    throw new Error("Configuración de Firebase no encontrada.");
                }

                const firebaseConfig = JSON.parse(__firebase_config);
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                appId = typeof __app_id !== 'undefined' ? __app_id : 'polaca-logistica-v1';

                // Intento de Autenticación
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }

                auth.onAuthStateChanged(user => {
                    if (user) {
                        document.getElementById('user-indicator').innerText = user.uid.substring(0, 8);
                        isFirebaseReady = true;
                        escucharFacturas();
                        render(); // Render inicial para quitar el spinner
                    }
                });

            } catch (e) {
                console.error("Error de Inicialización:", e);
                main.innerHTML = `
                    <div class="bg-red-50 p-6 rounded-2xl border border-red-200 mt-10">
                        <h2 class="text-red-700 font-bold mb-2">Error de Conexión</h2>
                        <p class="text-red-600 text-sm">${e.message}</p>
                        <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase">Reintentar</button>
                    </div>
                `;
            }
        }

        function escucharFacturas() {
            if (!isFirebaseReady) return;
            const path = `artifacts/${appId}/public/data/facturas`;
            
            db.collection(path).onSnapshot(snapshot => {
                const data = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(),
                    sortTime: doc.data().timestamp?.seconds || new Date(doc.data().fechaEmision).getTime() / 1000 || 0
                }));
                facturas = data.sort((a, b) => b.sortTime - a.sortTime);
                render();
            }, (error) => {
                console.error("Error Firestore Snapshot:", error);
            });
        }

        function switchTab(tab) {
            activeTab = tab;
            render();
        }

        function updateTotals() {
            let subtotal = 0;
            PRODUCTOS.forEach((p, i) => {
                const input = document.getElementById(`cant-${i}`);
                if (input) {
                    const cant = parseFloat(input.value) || 0;
                    subtotal += cant * p.precio;
                }
            });
            const iva = subtotal * 0.15;
            const total = subtotal + iva;

            if (document.getElementById('res-subtotal')) {
                document.getElementById('res-subtotal').innerText = `$${subtotal.toFixed(2)}`;
                document.getElementById('res-iva').innerText = `$${iva.toFixed(2)}`;
                document.getElementById('res-total').innerText = `$${total.toFixed(2)}`;
            }
        }

        async function guardarFactura() {
            const btn = document.getElementById('btn-save');
            const numFact = document.getElementById('f-num').value;
            if (!numFact) return alert("Ingrese número de factura");

            btn.disabled = true;
            btn.innerText = "Guardando...";

            const facturaData = {
                cliente: document.getElementById('f-cliente').value,
                ruc: document.getElementById('f-ruc').value,
                numFactura: numFact,
                fechaEmision: document.getElementById('f-fecha').value,
                estado: document.getElementById('f-estado').value,
                productos: PRODUCTOS.map((p, i) => ({
                    ...p,
                    cantidad: parseFloat(document.getElementById(`cant-${i}`).value) || 0
                })),
                total: parseFloat(document.getElementById('res-total').innerText.replace('$', '')),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                const path = `artifacts/${appId}/public/data/facturas`;
                await db.collection(path).add(facturaData);
                switchTab('dashboard');
            } catch (e) {
                alert("Error al guardar en base de datos: " + e.message);
                btn.disabled = false;
                btn.innerText = "REGISTRAR CARGA";
            }
        }

        async function actualizarEstado(id, nuevoEstado) {
            try {
                const path = `artifacts/${appId}/public/data/facturas`;
                await db.collection(path).doc(id).update({ estado: nuevoEstado });
            } catch (e) {
                alert("Error al actualizar");
            }
        }

        function render() {
            const container = document.getElementById('main-content');
            if (!container) return;

            // Update Nav Classes
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('tab-active'));
            const activeBtn = document.getElementById(`btn-${activeTab}`);
            if (activeBtn) activeBtn.classList.add('tab-active');

            if (activeTab === 'dashboard') {
                const total = facturas.reduce((acc, f) => acc + (f.total || 0), 0);
                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-4 rounded-2xl shadow-sm border">
                                <p class="text-[10px] text-gray-400 font-bold uppercase">Total Sistema</p>
                                <p class="text-xl font-bold text-gray-800">$${total.toFixed(2)}</p>
                            </div>
                            <div class="bg-white p-4 rounded-2xl shadow-sm border">
                                <p class="text-[10px] text-gray-400 font-bold uppercase">Registros</p>
                                <p class="text-xl font-bold text-gray-800">${facturas.length}</p>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-center px-1">
                                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Actividad Reciente</h3>
                            </div>
                            ${facturas.length === 0 ? '<p class="text-center py-10 text-gray-400 text-xs italic bg-white rounded-2xl border border-dashed">Sin movimientos registrados</p>' : ''}
                            ${facturas.slice(0, 10).map(f => `
                                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-4 ${f.estado === 'cancelado' ? 'border-green-500' : f.estado === 'abonado' ? 'border-blue-500' : 'border-yellow-500'}">
                                    <div class="text-sm">
                                        <p class="font-bold text-gray-800 leading-tight">${f.cliente.length > 22 ? f.cliente.substring(0, 22) + '...' : f.cliente}</p>
                                        <div class="flex gap-2 items-center mt-1">
                                            <span class="text-[9px] text-gray-400 font-mono">${f.numFactura}</span>
                                            <span class="status-badge status-${f.estado || 'pendiente'}">${f.estado || 'pendiente'}</span>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="font-bold text-blue-600">$${(f.total || 0).toFixed(2)}</p>
                                        <p class="text-[9px] text-gray-400">${f.fechaEmision || ''}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (activeTab === 'logistica') {
                const hoy = new Date().toISOString().split('T')[0];
                container.innerHTML = `
                    <div class="space-y-4">
                        <h2 class="text-lg font-bold text-gray-800">Carga Factura Espejo</h2>
                        
                        <div class="bg-white p-4 rounded-2xl border shadow-sm space-y-4">
                             <p class="text-[10px] font-bold text-blue-600 uppercase border-b pb-2">Cabecera</p>
                             
                             <div>
                                <label class="text-[9px] text-gray-400 font-bold uppercase">Cliente</label>
                                <input id="f-cliente" value="DISTRIBUIDORA AUSTROECUATORIANA S.A.S." class="w-full text-sm font-bold border-b pb-1 outline-none focus:border-blue-500 bg-transparent">
                             </div>

                             <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[9px] text-gray-400 font-bold uppercase">RUC</label>
                                    <input id="f-ruc" value="0195174555001" class="w-full text-xs border-b outline-none bg-transparent">
                                </div>
                                <div>
                                    <label class="text-[9px] text-gray-400 font-bold uppercase">Factura N°</label>
                                    <input id="f-num" placeholder="003-102-..." class="w-full text-xs border-b outline-none font-bold text-blue-600 bg-transparent">
                                </div>
                             </div>

                             <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[9px] text-gray-400 font-bold uppercase">Fecha</label>
                                    <input type="date" id="f-fecha" value="${hoy}" class="w-full text-xs border-b outline-none bg-transparent">
                                </div>
                                <div>
                                    <label class="text-[9px] text-gray-400 font-bold uppercase">Estado</label>
                                    <select id="f-estado" class="w-full text-xs border-b outline-none bg-transparent font-bold">
                                        <option value="pendiente">PENDIENTE</option>
                                        <option value="abonado">ABONADO</option>
                                        <option value="cancelado">CANCELADO</option>
                                    </select>
                                </div>
                             </div>
                        </div>

                        <div class="bg-white p-4 rounded-2xl border shadow-sm space-y-4">
                            <p class="text-[10px] font-bold text-blue-600 uppercase border-b pb-2">Productos</p>
                            ${PRODUCTOS.map((p, i) => `
                                <div class="flex items-center gap-2">
                                    <div class="flex-1">
                                        <p class="text-xs font-bold text-gray-700 leading-tight">${p.nombre}</p>
                                        <p class="text-[9px] text-gray-400">$${p.precio.toFixed(4)}</p>
                                    </div>
                                    <input type="number" id="cant-${i}" oninput="updateTotals()" placeholder="0" class="w-20 bg-gray-50 border rounded-xl p-2 text-center text-sm font-bold focus:ring-1 focus:ring-blue-500 outline-none">
                                </div>
                            `).join('')}
                        </div>

                        <div class="bg-gray-800 p-5 rounded-2xl text-white shadow-xl space-y-2">
                            <div class="flex justify-between text-xs opacity-60"><span>Subtotal</span> <span id="res-subtotal">$0.00</span></div>
                            <div class="flex justify-between text-xs opacity-60 border-b border-white/10 pb-2"><span>IVA (15%)</span> <span id="res-iva">$0.00</span></div>
                            <div class="flex justify-between text-xl font-bold pt-1"><span>TOTAL</span> <span id="res-total" class="text-green-400">$0.00</span></div>
                        </div>

                        <button id="btn-save" onclick="guardarFactura()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">REGISTRAR CARGA</button>
                    </div>
                `;
            } else if (activeTab === 'rutas') {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center px-1">
                            <h2 class="text-lg font-bold text-gray-800">Control de Facturas</h2>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">${facturas.length} registros</span>
                        </div>
                        
                        <div class="space-y-3">
                            ${facturas.map(f => `
                                <div class="bg-white p-4 rounded-2xl border shadow-sm space-y-3">
                                    <div class="flex justify-between items-start">
                                        <div class="flex-1">
                                            <p class="text-sm font-bold text-gray-800 leading-tight">${f.cliente}</p>
                                            <p class="text-[10px] text-gray-400 font-mono mt-1">${f.numFactura} • ${f.fechaEmision}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-bold text-blue-600">$${(f.total || 0).toFixed(2)}</p>
                                        </div>
                                    </div>
                                    
                                    <div class="flex items-center gap-2 pt-2 border-t border-gray-50">
                                        <span class="text-[9px] font-bold text-gray-400 uppercase flex-1">Actualizar estado:</span>
                                        <select 
                                            onchange="actualizarEstado('${f.id}', this.value)" 
                                            class="text-[10px] font-bold border rounded-lg px-3 py-1.5 outline-none bg-gray-50 ${f.estado === 'cancelado' ? 'text-green-600' : f.estado === 'abonado' ? 'text-blue-600' : 'text-yellow-600'}"
                                        >
                                            <option value="pendiente" ${f.estado === 'pendiente' ? 'selected' : ''}>PENDIENTE</option>
                                            <option value="abonado" ${f.estado === 'abonado' ? 'selected' : ''}>ABONADO</option>
                                            <option value="cancelado" ${f.estado === 'cancelado' ? 'selected' : ''}>CANCELADO</option>
                                        </select>
                                    </div>
                                </div>
                            `).join('')}
                            ${facturas.length === 0 ? '<div class="text-center py-20 opacity-30 font-bold text-sm">Sin datos para gestionar</div>' : ''}
                        </div>
                    </div>
                `;
            }
        }

        // Inicio de la aplicación
        window.onload = initApp;
    </script>
</body>
</html>
