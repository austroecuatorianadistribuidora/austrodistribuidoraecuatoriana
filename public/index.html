<!DOCTYPE html>
<html>
<head>
    <title>Test de Conexión Nube v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-slate-800 p-8 rounded-[32px] shadow-2xl border border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black tracking-tight">Verificador v3.2</h1>
            <span id="conn-tag" class="px-2 py-1 bg-slate-700 rounded-lg text-[10px] font-bold text-slate-400">OFFLINE</span>
        </div>
        
        <div id="status-box" class="p-4 rounded-2xl bg-slate-900/50 mb-6 text-sm font-mono border border-slate-700/50 min-h-[100px] flex flex-col justify-center">
            <div id="log-content">Esperando inicio...</div>
        </div>

        <button onclick="ejecutarPruebaMaestra()" id="btn-main" class="w-full py-4 bg-orange-600 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-500 active:scale-95 transition-all shadow-lg shadow-orange-900/20">
            Probar Conexión Ahora
        </button>

        <div class="mt-6 space-y-2">
            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase">
                <span id="check-auth" class="w-2 h-2 rounded-full bg-slate-600"></span> Autenticación
            </div>
            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase">
                <span id="check-db" class="w-2 h-2 rounded-full bg-slate-600"></span> Escritura Firestore
            </div>
        </div>
    </div>

    <script>
        // Esta función detecta automáticamente si estamos en el entorno seguro
        function getFirebaseConfig() {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    return JSON.parse(__firebase_config);
                }
            } catch (e) { console.error("Error config", e); }
            
            // Fallback a tus llaves actuales solo si no hay globales
            return {
                apiKey: "AIzaSyBu0b-086orBd_fQut3i9n5s0W9fLpkRFI",
                authDomain: "austrodistribuidoraecuatoriana.firebaseapp.com",
                projectId: "austrodistribuidoraecuatoriana",
                storageBucket: "austrodistribuidoraecuatoriana.firebasestorage.app",
                messagingSenderId: "711061794814",
                appId: "1:711061794814:web:65b028a387ecf277ca5aaf"
            };
        }

        function printLog(msg, color = "text-slate-300") {
            const content = document.getElementById('log-content');
            if (content) content.innerHTML = `<span class="${color}">${msg}</span>`;
        }

        async function ejecutarPruebaMaestra() {
            const btn = document.getElementById('btn-main');
            if (btn) btn.disabled = true;
            
            printLog("⚙️ CONFIGURANDO...", "text-blue-400");

            try {
                const config = getFirebaseConfig();
                
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                
                const auth = firebase.auth();
                const db = firebase.firestore();

                printLog("🔑 AUTENTICANDO...", "text-orange-400");
                
                // Intento de login seguro
                let user;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    const result = await auth.signInWithCustomToken(__initial_auth_token);
                    user = result.user;
                } else {
                    const result = await auth.signInAnonymously();
                    user = result.user;
                }

                document.getElementById('check-auth').className = "w-2 h-2 rounded-full bg-green-500";
                printLog("📝 INTENTANDO ESCRITURA...", "text-yellow-400");

                // Ruta de acceso según Regla 1 (Crítico)
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'test-manual';
                const testRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('test_logs');
                
                await testRef.add({
                    fecha: new Date().toISOString(),
                    resultado: "EXITO_V32",
                    uid: user.uid
                });

                document.getElementById('check-db').className = "w-2 h-2 rounded-full bg-green-500";
                document.getElementById('conn-tag').innerText = "ONLINE";
                document.getElementById('conn-tag').className = "px-2 py-1 bg-green-900/30 rounded-lg text-[10px] font-bold text-green-500";
                
                printLog("✅ ¡CONECTADO CON ÉXITO!", "text-green-400 font-black");
                if (btn) {
                    btn.innerText = "SISTEMA LISTO";
                    btn.className = "w-full py-4 bg-green-600 rounded-2xl font-black uppercase text-white shadow-lg shadow-green-900/20";
                }

            } catch (e) {
                console.error(e);
                printLog("❌ ERROR: " + e.code + "<br><span class='text-[10px]'>" + e.message + "</span>", "text-red-400");
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = "REINTENTAR PRUEBA";
                }
            }
        }
    </script>
</body>
</html>
